<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Payment Receipt</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=20260719u">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=20260719u"></script>
<script src="assets/js/lists.js?v=20260719u"></script>
<script src="assets/js/config.js?v=20260719u"></script>
<script src="assets/js/db.js?v=20260719u"></script>
<script src="assets/js/billing.js?v=20260719u"></script>
<script src="assets/js/auth.js?v=20260719u"></script>
<script src="assets/js/ui.js?v=20260719u"></script>
<script src="assets/js/layout.js?v=20260719u"></script>
<script>
const ctx = LAYOUT.render('payments');
if(ctx && LAYOUT.guardRoles(ctx, ['admin','client'])){
  const { contentEl } = ctx;
  const params = new URLSearchParams(window.location.search);
  const paymentId = params.get('id');
  const payment = DB.get('payments', paymentId);
  const settings = DB.getSettings();

  const methodLabel = { bank:'method_bank', cash:'method_cash', other:'method_other' };
  const statusLabel = { review:'pay_review', confirmed:'pay_confirmed', rejected:'pay_rejected', not_paid:'pay_not_paid' };

  function render(){
    if(!payment){
      contentEl.innerHTML = `<div class="empty-state">${I18N.t('no_data')}</div>`;
      return;
    }
    const client = DB.get('clients', payment.clientId);
    const contract = payment.contractId ? DB.get('contracts', payment.contractId) : null;
    const statusMeta = {
      confirmed: { label:'pay_confirmed', color:'#1E8E5A' },
      review:    { label:'pay_review',    color:'#B7791F' },
      rejected:  { label:'pay_rejected',  color:'#D64550' },
      not_paid:  { label:'pay_not_paid',  color:'#D64550' },
    };
    const meta = statusMeta[payment.status] || statusMeta.review;

    contentEl.innerHTML = `
      <div class="no-print" style="display:flex; justify-content:flex-end; margin-bottom:18px;">
        <button type="button" class="btn btn-accent" id="printBtn">🖨️ <span data-i18n="print_receipt"></span></button>
      </div>

      <div class="card" id="printArea" style="position:relative; overflow:hidden;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-28deg); z-index:0; pointer-events:none; white-space:nowrap;">
          <div style="font-weight:800; font-size:64px; letter-spacing:4px; text-transform:uppercase; color:${meta.color}; opacity:0.10;">
            ${I18N.t(meta.label)}
          </div>
        </div>
        <div style="position:relative; z-index:1;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:26px; padding-bottom:20px; border-bottom:2px solid var(--navy);">
          <div style="display:flex; align-items:center; gap:12px;">
            <img src="assets/images/logo.png" style="width:52px;height:52px;">
            <div>
              <div style="font-weight:800; font-size:18px; color:var(--navy);">${settings.companyName}</div>
              <div class="text-muted" style="font-size:12px;">${settings.companyAddress}</div>
            </div>
          </div>
          <div style="text-align:end;">
            <div style="font-weight:800; font-size:16px;" data-i18n="payment_receipt_title"></div>
            <div class="text-muted" style="font-size:13px;">${payment.id}</div>
            <div class="text-muted" style="font-size:12px;">${UI.fmtDate(payment.date)}</div>
          </div>
        </div>

        <div class="grid grid-2" style="margin-bottom:24px;">
          <div>
            <h4 data-i18n="party_a" style="margin:0 0 8px;"></h4>
            <div style="display:flex; align-items:flex-start; gap:10px;">
              <img src="assets/images/logo.png" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">
              <div style="font-size:13.5px; line-height:2;">
                ${settings.companyName}<br>${settings.companyPhone}<br>${settings.companyEmail}
                ${settings.companyCr ? `<br>${I18N.t('company_cr')}: ${settings.companyCr}` : ''}
                ${settings.companyTaxNumber ? `<br>${I18N.t('company_tax_number')}: ${settings.companyTaxNumber}` : ''}
                ${settings.bankName ? `<br>${I18N.t('company_bank_name')}: ${settings.bankName}` : ''}
                ${settings.iban ? `<br>${I18N.t('company_iban')}: ${settings.iban}` : ''}
              </div>
            </div>
          </div>
          <div>
            <h4 data-i18n="party_b" style="margin:0 0 8px;"></h4>
            <div style="display:flex; align-items:flex-start; gap:10px;">
              ${client && client.logo ? `<img src="${client.logo}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">` : ''}
              <div style="font-size:13.5px; line-height:2;">
                <div style="display:flex; align-items:center; gap:8px;">
                  <strong>${client?client.name:'—'}</strong>
                  <span class="badge" style="background:${meta.color}22; color:${meta.color};">
                    ${I18N.t(meta.label)}
                  </span>
                </div>
                ${client?client.phone:''}<br>${client?client.address:''}
                ${client && client.crNumber ? `<br>${I18N.t('client_cr')}: ${client.crNumber}` : ''}
                ${client && client.taxNumber ? `<br>${I18N.t('client_tax_number')}: ${client.taxNumber}` : ''}
              </div>
            </div>
          </div>
        </div>

        <div class="grid grid-4" style="margin-bottom:24px;">
          <div><div class="text-muted" style="font-size:12px;" data-i18n="invoice_contract"></div><div style="font-weight:700;">${payment.contractId||'—'}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="payment_date"></div><div style="font-weight:700;">${UI.fmtDate(payment.date)}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="payment_method"></div><div style="font-weight:700;" data-i18n="${methodLabel[payment.method]||'method_other'}"></div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="payment_status_col"></div><div style="font-weight:700;" data-i18n="${statusLabel[payment.status]||'pay_review'}"></div></div>
        </div>

        <div class="table-wrap" style="margin-bottom:18px;">
          <table>
            <thead><tr><th data-i18n="invoice_item"></th><th data-i18n="invoice_line_total"></th></tr></thead>
            <tbody>
              <tr>
                <td>${payment.description || BILLING.paymentDescription(payment.contractId, payment.date)}</td>
                <td>${UI.fmtMoney(payment.amount, contract && contract.currency)}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style="display:flex; justify-content:flex-end;">
          <div style="min-width:260px;">
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-top:2px solid var(--navy); font-weight:800; font-size:15px;">
              <span data-i18n="payment_amount"></span><span>${UI.fmtMoney(payment.amount, contract && contract.currency)}</span>
            </div>
          </div>
        </div>

        ${payment.invoiceId ? `
        <div class="no-print" style="margin-top:18px;">
          <a class="btn btn-outline" href="invoice-template.html?id=${payment.invoiceId}" data-i18n="view_related_invoice"></a>
        </div>` : ''}
        </div>
      </div>
    `;
    I18N.apply(contentEl);
    contentEl.querySelector('#printBtn').addEventListener('click', ()=>window.print());
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
