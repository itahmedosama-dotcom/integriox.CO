<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Contract Signature</title>
<link rel="icon" href="assets/images/logo.png">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191al">
</head>
<body style="background:var(--bg);">
<div class="page" style="max-width:820px; padding:26px 16px;" id="pageContent"></div>

<script src="assets/js/i18n.js?v=202607191al"></script>
<script src="assets/js/lists.js?v=202607191al"></script>
<script src="assets/js/config.js?v=202607191al"></script>
<script src="assets/js/db.js?v=202607191al"></script>
<script src="assets/js/billing.js?v=202607191al"></script>
<script src="assets/js/ui.js?v=202607191al"></script>
<script>
// Standalone public page — intentionally does NOT go through layout.js /
// AUTH.requireAuth(), so it works without logging in. Access is gated by
// a per-contract token in the URL, not a user session.
const contentEl = document.getElementById('pageContent');
const params = new URLSearchParams(window.location.search);
const contractId = params.get('id');
const token = params.get('token');

function render(){
  const contract = contractId ? DB.get('contracts', contractId) : null;
  const settings = DB.getSettings();

  if(!contract || !token || contract.signToken !== token){
    contentEl.innerHTML = `
      <div class="card" style="text-align:center; padding:40px 20px;">
        <div style="font-size:36px; margin-bottom:10px;">🔒</div>
        <h3 style="margin-bottom:8px;" data-i18n="public_link_invalid_title"></h3>
        <p class="text-muted" data-i18n="public_link_invalid_desc"></p>
      </div>`;
    I18N.apply(contentEl);
    return;
  }

  const client = DB.get('clients', contract.clientId);
  const hasValidSignature = !!(contract.signature && contract.signature.length > 1000);

  contentEl.innerHTML = `
    <div style="display:flex; justify-content:center; margin-bottom:18px;">
      <img src="assets/images/logo.png" style="width:46px;height:46px;">
    </div>
    <div class="card" id="printArea">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--navy); padding-bottom:14px; margin-bottom:20px;">
        <div>
          <div style="font-weight:800; font-size:16px; color:var(--navy);">${settings.companyName||'Integriox'}</div>
          <div class="text-muted" style="font-size:11px;">${settings.companyAddress||''}</div>
        </div>
        <div style="text-align:end;">
          <div style="font-weight:800;" data-i18n="contract_id"></div>
          <div class="text-muted" style="font-size:12px;">${contract.id}</div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom:20px;">
        <div><div class="text-muted" style="font-size:11px;" data-i18n="contract_client"></div><div style="font-weight:700;">${client?client.name:'—'}</div></div>
        <div><div class="text-muted" style="font-size:11px;" data-i18n="contract_amount"></div><div style="font-weight:700;">${UI.fmtMoney(contract.amount, contract.currency)}</div></div>
        <div><div class="text-muted" style="font-size:11px;" data-i18n="contract_start"></div><div style="font-weight:700;">${UI.fmtDate(contract.startDate)}</div></div>
        <div><div class="text-muted" style="font-size:11px;" data-i18n="contract_end"></div><div style="font-weight:700;">${contract.endDate?UI.fmtDate(contract.endDate):'—'}</div></div>
      </div>

      ${contract.agreementDetails ? `
      <h4 data-i18n="agreement_details" style="margin:0 0 8px;"></h4>
      <div class="terms-box" style="max-height:none; margin-bottom:18px;">${contract.agreementDetails}</div>` : ''}

      <h4 data-i18n="terms_conditions" style="margin:0 0 8px;"></h4>
      <div class="terms-box" style="max-height:220px; margin-bottom:22px;">${settings.terms}</div>

      <h4 data-i18n="client_signature" style="margin:0 0 10px;"></h4>
      ${hasValidSignature ? `
        <img src="${contract.signature}" style="max-height:110px; border:1px solid var(--line); border-radius:8px; padding:8px; background:#fff;">
        <p class="hint" style="margin-top:10px;" data-i18n="public_already_signed"></p>
      ` : `
        <canvas id="sigCanvas" class="signature-pad" width="500" height="150" style="width:100%; height:130px; border:1.5px dashed var(--line); border-radius:8px;"></canvas>
        <div class="row-actions" style="margin-top:10px;">
          <button type="button" class="btn btn-outline" id="clearSig" data-i18n="clear_signature"></button>
          <button type="button" class="btn btn-primary" id="saveSig" data-i18n="public_confirm_signature"></button>
        </div>
      `}
    </div>
  `;
  I18N.apply(contentEl);

  if(!hasValidSignature){
    const canvas = document.getElementById('sigCanvas');
    const pad = UI.SignaturePad(canvas);
    document.getElementById('clearSig').addEventListener('click', ()=>pad.clear());
    document.getElementById('saveSig').addEventListener('click', ()=>{
      if(pad.isEmpty()){ UI.toast(I18N.t('err_required'), 'error'); return; }
      const dataUrl = pad.toDataURL();
      // Save the signature, then invalidate this link's token so it can't
      // be reopened later (a fresh visit will show "link invalid/expired"
      // instead of the contract) — the admin can send a brand new link if
      // the client ever needs to sign again (e.g. after "reopen for
      // signature"), which generates a fresh token automatically.
      DB.update('contracts', contract.id, { signature: dataUrl, signToken: null });
      DB.logActivity('تم توقيع العقد ' + contract.id + ' عبر رابط عام', 'Contract signed via public link ' + contract.id, 'contract');
      renderThankYou();
    });
  }
}

function renderThankYou(){
  contentEl.innerHTML = `
    <div class="card" style="text-align:center; padding:40px 20px;">
      <div style="font-size:40px; margin-bottom:10px;">✅</div>
      <h3 style="margin-bottom:8px;" data-i18n="public_sign_thanks_title"></h3>
      <p class="text-muted" data-i18n="public_sign_thanks_desc"></p>
    </div>`;
  I18N.apply(contentEl);
}

render();
</script>
</body>
</html>
