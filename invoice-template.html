<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Invoice</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191ad">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191ad"></script>
<script src="assets/js/lists.js?v=202607191ad"></script>
<script src="assets/js/config.js?v=202607191ad"></script>
<script src="assets/js/db.js?v=202607191ad"></script>
<script src="assets/js/billing.js?v=202607191ad"></script>
<script src="assets/js/auth.js?v=202607191ad"></script>
<script src="assets/js/ui.js?v=202607191ad"></script>
<script src="assets/js/layout.js?v=202607191ad"></script>
<script>
const ctx = LAYOUT.render('invoices');
if(ctx && LAYOUT.guardRoles(ctx, ['admin','client'])){
  const { contentEl } = ctx;
  const params = new URLSearchParams(window.location.search);
  const invoiceId = params.get('id');
  const invoice = DB.get('invoices', invoiceId);
  const settings = DB.getSettings();
  const theme = Object.assign({ accentColor:'#0B2545', font:'Cairo', showQr:true, showStamp:true, showWatermark:true }, settings.documentTheme || {});

  function render(){
    if(!invoice){
      contentEl.innerHTML = `<div class="empty-state">${I18N.t('no_data')}</div>`;
      return;
    }
    const client = DB.get('clients', invoice.clientId) || (invoice.clientName ? { name: invoice.clientName, phone: invoice.clientPhone, address: '' } : null);
    const contract = invoice.contractId ? DB.get('contracts', invoice.contractId) : null;
    const jobOrder = invoice.jobOrderId ? DB.get('jobOrders', invoice.jobOrderId) : null;
    const breakdown = BILLING.invoiceBreakdown(invoice.amount, contract);
    const subtotal = breakdown.subtotal;

    contentEl.innerHTML = `
      <div class="no-print" style="display:flex; justify-content:flex-end; margin-bottom:18px;">
        <button type="button" class="btn btn-accent" id="printBtn">🖨️ <span data-i18n="print_invoice"></span></button>
      </div>

      <div class="card" id="printArea" style="position:relative; overflow:hidden; --navy:${theme.accentColor}; font-family:'${theme.font}', sans-serif;">
        ${theme.showWatermark ? `
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-28deg); z-index:0; pointer-events:none; white-space:nowrap;">
          <div style="font-weight:800; font-size:64px; letter-spacing:4px; text-transform:uppercase; color:${invoice.status==='paid' ? '#1E8E5A' : '#D64550'}; opacity:0.10;">
            ${invoice.status==='paid' ? I18N.t('inv_paid') : I18N.t('inv_in_progress')}
          </div>
        </div>` : ''}
        <div style="position:relative; z-index:1;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:26px; padding-bottom:20px; border-bottom:2px solid var(--navy);">
          <div style="display:flex; align-items:center; gap:12px;">
            <img src="assets/images/logo.png" style="width:52px;height:52px;">
            <div>
              <div style="font-weight:800; font-size:18px; color:var(--navy);">${settings.companyName}</div>
              <div class="text-muted" style="font-size:12px;">${settings.companyAddress}</div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:14px;">
            <div style="text-align:end;">
              <div style="font-weight:800; font-size:16px;" data-i18n="invoices"></div>
              <div class="text-muted" style="font-size:13px;">${invoice.id}</div>
              <div class="text-muted" style="font-size:12px;">${UI.fmtDate(invoice.date)}</div>
            </div>
            ${theme.showQr ? `<div id="invoiceQr" style="width:70px;height:70px;flex-shrink:0;"></div>` : ''}
          </div>
        </div>

        <div class="grid grid-2" style="margin-bottom:24px;">
          <div>
            <h4 data-i18n="party_a" style="margin:0 0 8px;"></h4>
            <div style="display:flex; align-items:flex-start; gap:10px;">
              <img src="assets/images/logo.png" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">
              <div style="font-size:13.5px; line-height:2;">
                ${settings.companyName}<br>${settings.companyPhone}<br>${settings.companyEmail}
                ${(settings.companyCr || settings.companyTaxNumber) ? `<br>${[
                  settings.companyCr ? `${I18N.t('company_cr')}: ${settings.companyCr}` : '',
                  settings.companyTaxNumber ? `${I18N.t('company_tax_number')}: ${settings.companyTaxNumber}` : '',
                ].filter(Boolean).join('   ')}` : ''}
                ${(settings.bankName || settings.iban) ? `<br>${[
                  settings.bankName ? `${I18N.t('company_bank_name')}: ${settings.bankName}` : '',
                  settings.iban ? `${I18N.t('company_iban')}: ${settings.iban}` : '',
                ].filter(Boolean).join('   ')}` : ''}
              </div>
            </div>
          </div>
          <div>
            <h4 data-i18n="party_b" style="margin:0 0 8px;"></h4>
            <div style="display:flex; align-items:flex-start; gap:10px;">
              ${client && client.logo ? `<img src="${client.logo}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">` : ''}
              <div style="font-size:13.5px; line-height:2;">
                <div style="display:flex; align-items:center; gap:8px;">
                  <strong>${client?client.name:'—'}</strong>
                  <span class="badge" style="background:${invoice.status==='paid'?'#DCF5E7':'#FCE9EA'}; color:${invoice.status==='paid'?'#1E8E5A':'#D64550'};">
                    ${invoice.status==='paid' ? I18N.t('inv_paid') : I18N.t('inv_in_progress')}
                  </span>
                </div>
                ${client?client.phone:''}<br>${client?client.address:''}
                ${client && client.crNumber ? `<br>${I18N.t('client_cr')}: ${client.crNumber}` : ''}
                ${client && client.taxNumber ? `<br>${I18N.t('client_tax_number')}: ${client.taxNumber}` : ''}
              </div>
            </div>
          </div>
        </div>

        <div class="grid ${jobOrder ? 'grid-4' : 'grid-3'}" style="margin-bottom:24px;">
          <div><div class="text-muted" style="font-size:12px;" data-i18n="${invoice.jobOrderId ? 'job_id' : 'invoice_contract'}"></div><div style="font-weight:700;">${invoice.contractId || invoice.jobOrderId || '—'}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="invoice_date"></div><div style="font-weight:700;">${UI.fmtDate(invoice.date)}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="invoice_status"></div><div style="font-weight:700;" data-i18n="inv_${invoice.status}"></div></div>
          ${jobOrder ? `<div><div class="text-muted" style="font-size:12px;" data-i18n="job_exec_status"></div><div style="font-weight:700;" data-i18n="job_status_${jobOrder.execStatus||'pending'}"></div></div>` : ''}
        </div>

        <div class="table-wrap" style="margin-bottom:18px;">
          <table>
            <thead><tr>
              <th data-i18n="invoice_item"></th><th data-i18n="invoice_qty"></th><th data-i18n="invoice_price"></th><th data-i18n="invoice_line_total"></th>
            </tr></thead>
            <tbody>
              <tr>
                <td>${invoice.description || I18N.t('invoices')}</td>
                <td>1</td>
                <td>${UI.fmtMoney(subtotal, contract && contract.currency)}</td>
                <td>${UI.fmtMoney(subtotal, contract && contract.currency)}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style="display:flex; justify-content:flex-end;">
          <div style="min-width:260px;">
            <div style="display:flex; justify-content:space-between; padding:6px 0; font-size:13.5px;">
              <span class="text-muted" data-i18n="invoice_subtotal"></span><span>${UI.fmtMoney(subtotal, contract && contract.currency)}</span>
            </div>
            ${breakdown.taxLines.map(t=>`
            <div style="display:flex; justify-content:space-between; padding:6px 0; font-size:13.5px;">
              <span class="text-muted">${t.nameAr} (${t.rate}%)</span><span>${UI.fmtMoney(t.amount, contract && contract.currency)}</span>
            </div>`).join('')}
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-top:2px solid var(--navy); font-weight:800; font-size:15px;">
              <span data-i18n="invoice_grand_total"></span><span>${UI.fmtMoney(invoice.amount, contract && contract.currency)}</span>
            </div>
          </div>
        </div>
        ${(settings.companyStamp && theme.showStamp) ? `<div style="display:flex; justify-content:center; margin-top:14px;"><img src="${settings.companyStamp}" style="width:100px; height:100px; object-fit:contain;" alt="stamp"></div>` : ''}
        </div>
      </div>
    `;
    I18N.apply(contentEl);
    contentEl.querySelector('#printBtn').addEventListener('click', ()=>window.print());
    renderInvoiceQr(invoice, settings);
  }

  function renderInvoiceQr(invoice, settings){
    const el = document.getElementById('invoiceQr');
    if(!el) return;
    const text = [
      settings.companyName,
      I18N.t('invoice_id') + ': ' + invoice.id,
      UI.fmtDate(invoice.date),
      UI.fmtMoney(invoice.amount),
    ].join(' | ');
    loadQrLib().then(()=>{
      // eslint-disable-next-line no-undef
      new QRious({ element: (()=>{ const c = document.createElement('canvas'); el.appendChild(c); return c; })(), value: text, size: 140, background:'#fff', foreground:'#0B2545' });
      el.querySelector('canvas').style.width = '100%';
      el.querySelector('canvas').style.height = '100%';
    }).catch(()=>{});
  }
  function loadQrLib(){
    if(window.QRious) return Promise.resolve();
    return UI.loadScriptWithFallback([
      'https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js',
      'https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js',
    ]);
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
