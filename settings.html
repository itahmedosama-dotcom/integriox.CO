<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Settings</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=20260719d">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=20260719d"></script>
<script src="assets/js/lists.js?v=20260719d"></script>
<script src="assets/js/config.js?v=20260719d"></script>
<script src="assets/js/db.js?v=20260719d"></script>
<script src="assets/js/auth.js?v=20260719d"></script>
<script src="assets/js/ui.js?v=20260719d"></script>
<script src="assets/js/layout.js?v=20260719d"></script>
<script>
const ctx = LAYOUT.render('settings');
if(ctx){
  const { user: me, contentEl } = ctx;
  const statusBadge = { approved:'badge-success', pending:'badge-warning' };

  function render(){
    const settings = DB.getSettings();

    contentEl.innerHTML = `
      <div class="tabs">
        <button class="active" data-tab="general" data-i18n="general_settings"></button>
        <button data-tab="users" data-i18n="settings_tab_users"></button>
        <button data-tab="approvals" data-i18n="pending_approvals"></button>
        <button data-tab="terms" data-i18n="terms_settings"></button>
        <button data-tab="integration" data-i18n="integration_settings"></button>
        <button data-tab="backup" data-i18n="settings_tab_backup"></button>
        <button data-tab="footer" data-i18n="footer_settings"></button>
        <button data-tab="log" data-i18n="settings_tab_log"></button>
      </div>

      <div class="tab-panel" data-panel="general">
        <div class="card" style="max-width:640px;">
          <div class="card-header"><h3 class="card-title" data-i18n="company_info"></h3></div>
          <div class="field"><label data-i18n="company_name"></label><input type="text" id="sName" value="${settings.companyName}"></div>
          <div class="field-row">
            <div class="field"><label data-i18n="phone"></label><input type="tel" id="sPhone" value="${settings.companyPhone}"></div>
            <div class="field"><label data-i18n="email"></label><input type="email" id="sEmail" value="${settings.companyEmail}"></div>
          </div>
          <div class="field"><label data-i18n="client_address"></label><input type="text" id="sAddress" value="${settings.companyAddress}"></div>
          <div class="field-row">
            <div class="field"><label data-i18n="company_cr"></label><input type="text" id="sCr" value="${settings.companyCr||''}"></div>
            <div class="field"><label data-i18n="company_tax_number"></label><input type="text" id="sTaxNumber" value="${settings.companyTaxNumber||''}"></div>
          </div>
          <button class="btn btn-primary" id="saveGeneral" data-i18n="save_changes"></button>
        </div>
      </div>

      <div class="tab-panel hidden" data-panel="users">
        <div class="filters-bar">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="userSearchInput" data-i18n-ph="search">
          </div>
          <select id="userRoleFilter">
            <option value="" data-i18n="all"></option>
            <option value="admin" data-i18n="role_admin"></option>
            <option value="client" data-i18n="role_client"></option>
            <option value="technician" data-i18n="role_technician"></option>
          </select>
          <button class="btn btn-primary" id="addUserBtn" data-i18n="add_user"></button>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th data-i18n="full_name"></th><th data-i18n="username"></th><th data-i18n="email"></th><th data-i18n="phone"></th>
                <th data-i18n="user_role"></th><th data-i18n="user_status"></th><th data-i18n="actions"></th>
              </tr></thead>
              <tbody id="userRows"></tbody>
            </table>
          </div>
          <div id="userEmptyState" class="empty-state hidden"><div data-i18n="no_data"></div></div>
        </div>
      </div>

      <div class="tab-panel hidden" data-panel="approvals">
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="pending_approvals"></h3></div>
          <div id="approvalsBody"></div>
        </div>
      </div>

      <div class="tab-panel hidden" data-panel="terms">
        <div class="card" style="max-width:720px;">
          <div class="card-header"><h3 class="card-title" data-i18n="terms_settings"></h3></div>
          <p class="hint" data-i18n="terms_hint" style="margin-bottom:12px;"></p>
          <textarea id="sTerms" style="min-height:260px;">${settings.terms}</textarea>
          <button class="btn btn-primary" id="saveTerms" style="margin-top:14px;" data-i18n="save_changes"></button>
        </div>
      </div>

      <div class="tab-panel hidden" data-panel="integration">
        <div class="card" style="max-width:680px;">
          <div class="card-header"><h3 class="card-title" data-i18n="integration_settings"></h3></div>
          <p class="hint" style="margin-bottom:16px;" data-i18n="integration_intro"></p>

          <div class="field"><label data-i18n="sheet_url"></label><input type="text" id="sSheetUrl" placeholder="https://script.google.com/macros/s/XXXXX/exec" value="${settings.sheetUrl||''}"></div>

          <div class="field">
            <label data-i18n="drive_folder"></label>
            <input type="text" id="sDriveFolder" placeholder="1AbCDefGhIJkLmNoPQRstuVWxyz" value="${settings.driveFolderId||''}">
            <p class="hint" data-i18n="drive_folder_hint" style="margin-top:6px;"></p>
          </div>

          <div class="field">
            <label data-i18n="api_key"></label>
            <div style="display:flex; gap:8px;">
              <input type="password" id="sApiKey" placeholder="••••••••" style="flex:1;">
              <button type="button" class="btn btn-outline btn-sm" id="toggleApiKey" data-i18n="show_value"></button>
            </div>
            <p class="hint" data-i18n="api_key_hint" style="margin-top:6px;"></p>
            ${settings.apiKeyEnc ? `<p class="hint" data-i18n="api_key_saved_hint" style="margin-top:2px;"></p>` : ''}
          </div>

          <div class="hint" style="background:var(--sky-50); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; margin:6px 0 18px; line-height:1.8;" data-i18n="integration_local_warning"></div>
          <div class="hint" style="background:var(--warning-bg); border:1px solid var(--warning); color:var(--ink-soft); border-radius:var(--radius-sm); padding:12px 14px; margin:0 0 18px; line-height:1.8;" data-i18n="integration_deploy_hint"></div>

          ${settings.sheetUrlIsLocalOverride ? `<div class="badge badge-warning" style="margin-bottom:14px;" data-i18n="integration_local_active"></div>` : ''}

          <div style="display:flex; flex-wrap:wrap; gap:10px;">
            <button class="btn btn-danger" id="cancelPreview" data-i18n="integration_cancel_preview" ${settings.sheetUrlIsLocalOverride ? '' : 'style="display:none;"'}></button>
            <button class="btn btn-outline" id="testConnection" data-i18n="integration_test_connection"></button>
            <button class="btn btn-outline" id="syncNowBtn" data-i18n="integration_sync_now"></button>
            <button class="btn btn-outline" id="pullFromSheetBtn" data-i18n="integration_pull_now"></button>
            <button class="btn btn-outline" id="downloadConfig" data-i18n="integration_download_config"></button>
            <button class="btn btn-primary" id="saveSheet" data-i18n="integration_apply_local"></button>
          </div>
        </div>
      </div>

      <div class="tab-panel hidden" data-panel="backup">
        <div class="card" style="max-width:680px; margin-bottom:20px;">
          <div class="card-header"><h3 class="card-title" data-i18n="backup_title"></h3></div>
          <p class="hint" style="margin-bottom:8px;" data-i18n="backup_desc"></p>
          <p class="hint" style="color:var(--danger); margin-bottom:16px;" data-i18n="backup_warning"></p>
          <button class="btn btn-primary" id="downloadBackup" data-i18n="backup_download_btn"></button>
        </div>
        <div class="card" style="max-width:680px; margin-bottom:20px;">
          <div class="card-header"><h3 class="card-title" data-i18n="backup_restore_title"></h3></div>
          <p class="hint" style="margin-bottom:14px;" data-i18n="backup_restore_desc"></p>
          <input type="file" id="restoreFile" accept=".xlsx" class="hidden">
          <button class="btn btn-outline" id="restoreBackupBtn" data-i18n="backup_restore_btn"></button>
        </div>

        <div class="card" style="max-width:680px; border-color:var(--danger);">
          <div class="card-header"><h3 class="card-title" style="color:var(--danger);" data-i18n="backup_danger_title"></h3></div>

          <div style="padding-bottom:18px; margin-bottom:18px; border-bottom:1px solid var(--line);">
            <h4 style="margin:0 0 6px; font-size:14px;" data-i18n="backup_delete_collection_title"></h4>
            <p class="hint" style="margin-bottom:10px;" data-i18n="backup_delete_collection_desc"></p>
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
              <select id="deleteCollectionSelect" style="min-width:200px;">
                <option value="clients" data-i18n="col_clients"></option>
                <option value="technicians" data-i18n="col_technicians"></option>
                <option value="contracts" data-i18n="col_contracts"></option>
                <option value="visits" data-i18n="col_visits"></option>
                <option value="payments" data-i18n="col_payments"></option>
                <option value="invoices" data-i18n="col_invoices"></option>
                <option value="complaints" data-i18n="col_complaints"></option>
                <option value="users" data-i18n="col_users"></option>
                <option value="activity" data-i18n="col_activity"></option>
              </select>
              <button class="btn btn-danger" id="deleteCollectionBtn" data-i18n="backup_delete_collection_btn"></button>
            </div>
          </div>

          <div>
            <h4 style="margin:0 0 6px; font-size:14px;" data-i18n="backup_delete_all_title"></h4>
            <p class="hint" style="margin-bottom:10px; color:var(--danger);" data-i18n="backup_delete_all_desc"></p>
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
              <input type="text" id="deleteAllConfirmInput" placeholder="DELETE" style="max-width:160px;">
              <button class="btn btn-danger" id="deleteAllBtn" data-i18n="backup_delete_all_btn"></button>
            </div>
            <p class="hint" style="margin-top:6px;" data-i18n="backup_delete_all_confirm_label"></p>
          </div>
        </div>
      </div>

      <div class="tab-panel hidden" data-panel="footer">
        <div class="card" style="max-width:640px; margin-bottom:20px;">
          <div class="card-header"><h3 class="card-title" data-i18n="footer_settings"></h3></div>
          <p class="hint" data-i18n="footer_hint" style="margin-bottom:12px;"></p>
          <div class="field"><label data-i18n="footer_text_label"></label><textarea id="sFooterAr" style="min-height:70px;">${settings.footerText||''}</textarea></div>
          <div class="field"><label data-i18n="footer_text_en_label"></label><textarea id="sFooterEn" style="min-height:70px;">${settings.footerTextEn||''}</textarea></div>
          <button class="btn btn-primary" id="saveFooter" data-i18n="save_changes"></button>
        </div>
        <div class="card" style="max-width:640px;">
          <div class="card-header"><h3 class="card-title" data-i18n="whatsapp_settings"></h3></div>
          <div class="field">
            <label data-i18n="whatsapp_number_label"></label>
            <input type="text" id="sWaNumber" placeholder="9665xxxxxxxx" value="${settings.whatsappNumber||''}">
            <p class="hint" data-i18n="whatsapp_number_hint" style="margin-top:6px;"></p>
          </div>
          <div class="field"><label data-i18n="whatsapp_message_label"></label><textarea id="sWaMsgAr" style="min-height:70px;">${settings.whatsappMessage||''}</textarea></div>
          <div class="field"><label data-i18n="whatsapp_message_en_label"></label><textarea id="sWaMsgEn" style="min-height:70px;">${settings.whatsappMessageEn||''}</textarea></div>
          <button class="btn btn-primary" id="saveWhatsapp" data-i18n="save_changes"></button>
        </div>
      </div>

      <div class="tab-panel hidden" data-panel="log">
        <div class="filters-bar">
          <select id="logTypeFilter">
            <option value="" data-i18n="activity_type_all"></option>
            <option value="client" data-i18n="activity_type_client"></option>
            <option value="technician" data-i18n="activity_type_technician"></option>
            <option value="contract" data-i18n="activity_type_contract"></option>
            <option value="visit" data-i18n="activity_type_visit"></option>
            <option value="payment" data-i18n="activity_type_payment"></option>
            <option value="invoice" data-i18n="activity_type_invoice"></option>
            <option value="user" data-i18n="activity_type_user"></option>
            <option value="settings" data-i18n="activity_type_settings"></option>
            <option value="other" data-i18n="activity_type_other"></option>
          </select>
          <div class="field" style="margin:0;"><label style="font-size:11px;" data-i18n="activity_from"></label><input type="date" id="logFromDate"></div>
          <div class="field" style="margin:0;"><label style="font-size:11px;" data-i18n="activity_to"></label><input type="date" id="logToDate"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="activity_log"></h3></div>
          <div id="logBody"></div>
        </div>
      </div>
    `;
    I18N.apply(contentEl);

    contentEl.querySelectorAll('.tabs button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        contentEl.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        contentEl.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
        contentEl.querySelector(`[data-panel="${btn.dataset.tab}"]`).classList.remove('hidden');
      });
    });

    contentEl.querySelector('#saveGeneral').addEventListener('click', ()=>{
      DB.saveSettings({
        companyName: contentEl.querySelector('#sName').value.trim(),
        companyPhone: contentEl.querySelector('#sPhone').value.trim(),
        companyEmail: contentEl.querySelector('#sEmail').value.trim(),
        companyAddress: contentEl.querySelector('#sAddress').value.trim(),
        companyCr: contentEl.querySelector('#sCr').value.trim(),
        companyTaxNumber: contentEl.querySelector('#sTaxNumber').value.trim(),
      });
      UI.mountFooter(document.querySelector('.main'));
      DB.logActivity('تم تحديث بيانات الشركة', 'Company info updated', 'settings');
      UI.toast(I18N.t('saved_ok'), 'success');
    });
    contentEl.querySelector('#saveTerms').addEventListener('click', ()=>{
      DB.saveSettings({ terms: contentEl.querySelector('#sTerms').value });
      DB.logActivity('تم تحديث الشروط والأحكام', 'Terms & conditions updated', 'settings');
      UI.toast(I18N.t('saved_ok'), 'success');
    });
    contentEl.querySelector('#saveFooter').addEventListener('click', ()=>{
      DB.saveSettings({
        footerText: contentEl.querySelector('#sFooterAr').value,
        footerTextEn: contentEl.querySelector('#sFooterEn').value,
      });
      UI.mountFooter(document.querySelector('.main'));
      DB.logActivity('تم تحديث نص حقوق الملكية', 'Footer/copyright text updated', 'settings');
      UI.toast(I18N.t('saved_ok'), 'success');
    });
    contentEl.querySelector('#saveWhatsapp').addEventListener('click', ()=>{
      DB.saveSettings({
        whatsappNumber: contentEl.querySelector('#sWaNumber').value.trim(),
        whatsappMessage: contentEl.querySelector('#sWaMsgAr').value,
        whatsappMessageEn: contentEl.querySelector('#sWaMsgEn').value,
      });
      UI.mountWhatsapp();
      DB.logActivity('تم تحديث إعدادات واتساب', 'WhatsApp settings updated', 'settings');
      UI.toast(I18N.t('saved_ok'), 'success');
    });
    const apiKeyInput = contentEl.querySelector('#sApiKey');
    contentEl.querySelector('#toggleApiKey').addEventListener('click', (e)=>{
      const showing = apiKeyInput.type === 'text';
      apiKeyInput.type = showing ? 'password' : 'text';
      e.target.textContent = I18N.t(showing ? 'show_value' : 'hide_value');
    });

    function currentPlainApiKey(){
      const typed = apiKeyInput.value.trim();
      if(typed) return typed;
      return DB.decodeSecret(DB.getSettings().apiKeyEnc);
    }

    // "Apply & preview on this device" — only changes the connection used by
    // THIS browser (localStorage override), never the shipped config.js.
    contentEl.querySelector('#saveSheet').addEventListener('click', ()=>{
      const sheetUrl = contentEl.querySelector('#sSheetUrl').value.trim();
      const driveFolderId = contentEl.querySelector('#sDriveFolder').value.trim();
      const newKey = apiKeyInput.value.trim();
      const cfg = DB.shippedConfig();
      const patch = { sheetUrl, driveFolderId, sheetUrlIsLocalOverride: sheetUrl !== (cfg.sheetUrl || '') };
      if(newKey) patch.apiKeyEnc = DB.encodeSecret(newKey);
      DB.saveSettings(patch);
      DB.logActivity('تم تحديث بيانات ربط جوجل شيت (معاينة محلية)', 'Google Sheet connection updated (local preview)', 'settings');
      UI.toast(I18N.t('saved_ok'), 'success');
      apiKeyInput.value = '';
      render();
    });

    // "Cancel local preview" — drops the per-device override and falls back
    // to whatever assets/js/config.js ships for every visitor.
    const cancelBtn = contentEl.querySelector('#cancelPreview');
    if(cancelBtn){
      cancelBtn.addEventListener('click', ()=>{
        const cfg = DB.shippedConfig();
        DB.saveSettings({
          sheetUrl: cfg.sheetUrl || '',
          apiKeyEnc: cfg.apiKey ? DB.encodeSecret(cfg.apiKey) : '',
          sheetUrlIsLocalOverride: false,
        });
        UI.toast(I18N.t('saved_ok'), 'success');
        render();
      });
    }

    contentEl.querySelector('#syncNowBtn').addEventListener('click', async (e)=>{
      const btn = e.currentTarget; const original = btn.textContent;
      btn.disabled = true; btn.textContent = I18N.t('loading');
      try{
        await DB.syncNow();
        UI.toast(I18N.t('integration_sync_ok'), 'success');
        DB.logActivity('تمت مزامنة كل البيانات يدويًا مع جوجل شيت', 'Manual full sync to Google Sheet', 'settings');
      }catch(err){
        UI.toast(I18N.t('integration_sync_fail') + (err && err.message ? ' — ' + err.message : ''), 'error');
      }
      btn.disabled = false; btn.textContent = original;
    });

    contentEl.querySelector('#pullFromSheetBtn').addEventListener('click', ()=>{
      UI.confirmAction(I18N.t('integration_pull_confirm'), async ()=>{
        const btn = contentEl.querySelector('#pullFromSheetBtn'); const original = btn.textContent;
        btn.disabled = true; btn.textContent = I18N.t('loading');
        try{
          await DB.pullFromSheet();
          UI.toast(I18N.t('integration_pull_ok'), 'success');
          setTimeout(()=>window.location.reload(), 1000);
        }catch(err){
          UI.toast(I18N.t('integration_pull_fail') + (err && err.message ? ' — ' + err.message : ''), 'error');
          btn.disabled = false; btn.textContent = original;
        }
      });
    });

    contentEl.querySelector('#testConnection').addEventListener('click', async (e)=>{
      const url = contentEl.querySelector('#sSheetUrl').value.trim();
      if(!url){ UI.toast(I18N.t('integration_test_fail'), 'error'); return; }
      const btn = e.currentTarget; const original = btn.textContent;
      btn.disabled = true; btn.textContent = I18N.t('loading');
      try{
        const res = await fetch(url + (url.includes('?')?'&':'?') + 'action=ping');
        const json = await res.json();
        if(json && json.ok){
          UI.toast(I18N.t('integration_test_ok'), 'success');
        } else if(json && json.error === 'unknown action'){
          // the URL/deployment works, but the deployed Code.gs predates the
          // `ping` action added in this update — most common real cause of
          // "data isn't reaching the Sheet" reports.
          UI.toast(I18N.t('integration_test_outdated'), 'error');
        } else {
          UI.toast(I18N.t('integration_test_fail'), 'error');
        }
      }catch(err){
        UI.toast(I18N.t('integration_test_fail'), 'error');
      }
      btn.disabled = false; btn.textContent = original;
    });

    // Downloads the *file* — assets/js/config.js — with the currently typed
    // connection values baked in, ready to replace the one on the hosting.
    contentEl.querySelector('#downloadConfig').addEventListener('click', ()=>{
      const sheetUrl = contentEl.querySelector('#sSheetUrl').value.trim();
      const apiKey = currentPlainApiKey();
      const fileText = `/* ==========================================================================\n   Integriox — Site-wide connection config\n   Generated from Settings → الربط والتكامل — replace assets/js/config.js on\n   your hosting (e.g. GitHub Pages) with this file so every visitor uses it.\n   ========================================================================== */\nwindow.INTEGRIOX_CONFIG = {\n  sheetUrl: ${JSON.stringify(sheetUrl)},\n  apiKey: ${JSON.stringify(apiKey)}\n};\n`;
      const blob = new Blob([fileText], { type:'text/javascript' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'config.js';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    /* ---------- backup: export every collection to a single .xlsx ---------- */
    contentEl.querySelector('#downloadBackup').addEventListener('click', ()=>{
      loadSheetJS().then(()=>{
        const data = DB.load();
        const wb = XLSX.utils.book_new();
        ['users','clients','technicians','contracts','visits','payments','invoices','activity'].forEach(col=>{
          const rows = (data[col]||[]).map(r=>{
            const flat = {};
            Object.keys(r).forEach(k=> flat[k] = typeof r[k]==='object' ? JSON.stringify(r[k]) : r[k]);
            return flat;
          });
          const ws = XLSX.utils.json_to_sheet(rows);
          XLSX.utils.book_append_sheet(wb, ws, col);
        });
        const settingsRows = Object.keys(data.settings).map(k=>({ key:k, value: typeof data.settings[k]==='object' ? JSON.stringify(data.settings[k]) : data.settings[k] }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(settingsRows), 'settings');
        XLSX.writeFile(wb, `integriox-backup-${DB.todayISO()}.xlsx`);
        DB.logActivity('تم تحميل نسخة احتياطية', 'Backup downloaded', 'settings');
      });
    });

    contentEl.querySelector('#restoreBackupBtn').addEventListener('click', ()=>{
      contentEl.querySelector('#restoreFile').click();
    });
    contentEl.querySelector('#restoreFile').addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      if(!window.confirm(I18N.t('backup_restore_confirm'))){ e.target.value = ''; return; }
      loadSheetJS().then(()=>{
        const reader = new FileReader();
        reader.onload = (ev)=>{
          try{
            const wb = XLSX.read(new Uint8Array(ev.target.result), { type:'array' });
            const fresh = DB.resetDemo(); // start from a clean seed, then overwrite
            const newData = { settings: fresh.settings, users:[], clients:[], technicians:[], contracts:[], visits:[], payments:[], invoices:[], activity:[] };
            ['users','clients','technicians','contracts','visits','payments','invoices','activity'].forEach(col=>{
              const sheet = wb.Sheets[col];
              if(!sheet) return;
              newData[col] = XLSX.utils.sheet_to_json(sheet);
            });
            if(wb.Sheets['settings']){
              const rows = XLSX.utils.sheet_to_json(wb.Sheets['settings']);
              rows.forEach(r=>{ if(r.key) newData.settings[r.key] = r.value; });
            }
            DB.save(newData);
            UI.toast(I18N.t('backup_restore_ok'), 'success');
            DB.logActivity('تمت استعادة نسخة احتياطية', 'Backup restored', 'settings');
            setTimeout(()=>window.location.reload(), 1200);
          }catch(err){
            UI.toast(I18N.t('backup_restore_fail'), 'error');
          }
        };
        reader.readAsArrayBuffer(file);
      });
      e.target.value = '';
    });

    function loadSheetJS(){
      if(window.XLSX) return Promise.resolve();
      return new Promise((resolve, reject)=>{
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    /* ---------- danger zone ---------- */
    contentEl.querySelector('#deleteCollectionBtn').addEventListener('click', ()=>{
      const col = contentEl.querySelector('#deleteCollectionSelect').value;
      UI.confirmAction(I18N.t('backup_delete_collection_confirm'), ()=>{
        const data = DB.load();
        data[col] = [];
        DB.save(data);
        DB.logActivity('تم مسح جميع بيانات جدول: ' + col, 'Cleared all data for table: ' + col, 'settings');
        UI.toast(I18N.t('backup_delete_collection_done'), 'success');
        if(col==='users'){ setTimeout(AUTH.logout, 1200); return; }
        render();
      });
    });

    contentEl.querySelector('#deleteAllBtn').addEventListener('click', ()=>{
      const typed = contentEl.querySelector('#deleteAllConfirmInput').value.trim();
      if(typed !== 'DELETE'){ UI.toast(I18N.t('backup_delete_all_confirm_mismatch'), 'error'); return; }
      UI.confirmAction(I18N.t('backup_delete_all_desc'), ()=>{
        DB.resetDemo();
        UI.toast(I18N.t('backup_delete_all_done'), 'success');
        setTimeout(()=>{ localStorage.removeItem('integriox_session'); window.location.href = 'index.html'; }, 1200);
      });
    });

    function renderUsers(){
      const users = DB.all('users');
      const rowsEl = contentEl.querySelector('#userRows');
      function draw(){
        const f = (contentEl.querySelector('#userSearchInput').value||'').toLowerCase();
        const rf = contentEl.querySelector('#userRoleFilter').value;
        const list = users.filter(u=>{
          const matchesText = !f || u.name.toLowerCase().includes(f) || u.email.toLowerCase().includes(f) || (u.phone||'').includes(f) || (u.username||'').toLowerCase().includes(f);
          const matchesRole = !rf || u.role===rf;
          return matchesText && matchesRole;
        });
        contentEl.querySelector('#userEmptyState').classList.toggle('hidden', list.length>0);
        rowsEl.innerHTML = list.map(u=>`<tr>
          <td class="cell-name"><div class="avatar">${UI.initials(u.name)}</div>${u.name}</td>
          <td>${u.username||'—'}</td>
          <td>${u.email}</td>
          <td>${u.phone||'—'}</td>
          <td>${AUTH.roleLabel(u.role)}</td>
          <td><span class="badge ${statusBadge[u.status]||'badge-mute'}" data-i18n="status_${u.status==='approved'?'approved':'pending'}"></span></td>
          <td class="row-actions">
            ${u.status==='pending' ? `<button class="btn btn-sm btn-accent" data-approve="${u.id}" data-i18n="approve"></button>` : ''}
            <button class="btn btn-sm btn-outline" data-edit="${u.id}" data-i18n="edit"></button>
            ${u.id!==me.id ? `<button class="btn btn-sm btn-danger" data-del="${u.id}" data-i18n="delete"></button>` : ''}
          </td>
        </tr>`).join('');
        I18N.apply(rowsEl);
        rowsEl.querySelectorAll('[data-approve]').forEach(b=>b.addEventListener('click', ()=>{
          const target = DB.get('users', b.dataset.approve);
          DB.update('users', b.dataset.approve, { status:'approved' });
          DB.logActivity('تم قبول حساب ' + (target?target.name:''), 'Account approved: ' + (target?target.name:''), 'user');
          UI.toast(I18N.t('saved_ok'), 'success'); render();
        }));
        rowsEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openUserForm(DB.get('users', b.dataset.edit))));
        rowsEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
          const target = DB.get('users', b.dataset.del);
          UI.confirmAction(I18N.t('confirm_delete'), ()=>{
            DB.remove('users', b.dataset.del);
            DB.logActivity('تم حذف المستخدم ' + (target?target.name:''), 'User deleted: ' + (target?target.name:''), 'user');
            UI.toast(I18N.t('deleted_ok'), 'success'); render();
          });
        }));
      }
      contentEl.querySelector('#userSearchInput').addEventListener('input', draw);
      contentEl.querySelector('#userRoleFilter').addEventListener('change', draw);
      contentEl.querySelector('#addUserBtn').addEventListener('click', ()=>openUserForm(null));
      draw();
    }

    function openUserForm(u){
      const editing = !!u;
      const overlay = UI.openModal(`
        <div class="modal-head"><h3 data-i18n="${editing?'edit':'add_user'}"></h3><button class="close-x" id="mClose">&times;</button></div>
        <div class="modal-body">
          <div class="field"><label data-i18n="full_name"></label><input type="text" id="fName" value="${editing?u.name:''}"></div>
          <div class="field-row">
            <div class="field"><label data-i18n="email"></label><input type="email" id="fEmail" value="${editing?u.email:''}" ${editing?'disabled':''}></div>
            <div class="field"><label data-i18n="phone"></label><input type="tel" id="fPhone" value="${editing?(u.phone||''):''}"></div>
          </div>
          <div class="field"><label data-i18n="username_optional"></label><input type="text" id="fUsername" value="${editing?(u.username||''):''}"></div>
          <div class="field">
            <label data-i18n="password"></label>
            <input type="password" id="fPassword" placeholder="${editing ? '••••••••' : ''}">
          </div>
          <div class="field">
            <label data-i18n="user_role"></label>
            <select id="fRole">
              <option value="admin" data-i18n="role_admin" ${editing && u.role==='admin'?'selected':''}></option>
              <option value="client" data-i18n="role_client" ${editing && u.role==='client'?'selected':''}></option>
              <option value="technician" data-i18n="role_technician" ${editing && u.role==='technician'?'selected':''}></option>
            </select>
          </div>
          <div class="field" id="fCanViewAllWrap" style="${editing && u.role==='technician' ? '' : 'display:none;'}">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" id="fCanViewAll" style="width:auto;" ${editing && u.canViewAllVisits ? 'checked' : ''}>
              <span data-i18n="can_view_all_visits"></span>
            </label>
            <p class="hint" data-i18n="can_view_all_visits_hint" style="margin-top:4px;"></p>
          </div>
          <div class="field">
            <label data-i18n="user_status"></label>
            <select id="fStatus">
              <option value="approved" data-i18n="status_approved" ${editing && u.status==='approved'?'selected':''}></option>
              <option value="pending" data-i18n="status_pending" ${editing && u.status==='pending'?'selected':''}></option>
            </select>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
          <button class="btn btn-primary" id="mSave" data-i18n="save"></button>
        </div>
      `);
      I18N.apply(overlay);
      overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
      overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
      overlay.querySelector('#fRole').addEventListener('change', (e)=>{
        overlay.querySelector('#fCanViewAllWrap').style.display = e.target.value==='technician' ? '' : 'none';
      });
      overlay.querySelector('#mSave').addEventListener('click', ()=>{
        const name = overlay.querySelector('#fName').value.trim();
        const email = overlay.querySelector('#fEmail').value.trim();
        const phone = overlay.querySelector('#fPhone').value.trim();
        const username = overlay.querySelector('#fUsername').value.trim();
        const password = overlay.querySelector('#fPassword').value;
        const role = overlay.querySelector('#fRole').value;
        const status = overlay.querySelector('#fStatus').value;
        const canViewAllVisits = role==='technician' ? overlay.querySelector('#fCanViewAll').checked : false;
        if(!name || (!editing && !email)){ UI.toast(I18N.t('err_required'), 'error'); return; }
        if(username && DB.all('users').some(x=>x.id!==(u&&u.id) && (x.username||'').toLowerCase()===username.toLowerCase())){
          UI.toast(I18N.t('err_username_taken'), 'error'); return;
        }

        if(editing){
          const patch = { name, phone, username, role, status, canViewAllVisits };
          if(password) patch.password = password;
          DB.update('users', u.id, patch);
          DB.logActivity('تم تعديل بيانات المستخدم ' + name, 'User updated: ' + name, 'user');
        } else {
          if(DB.all('users').some(x=>x.email.toLowerCase()===email.toLowerCase())){
            UI.toast(I18N.t('err_login'), 'error'); return;
          }
          DB.insert('users', { id: DB.uid('u'), name, email, username, phone, password: password||'123456', role, status, canViewAllVisits });
          DB.logActivity('تمت إضافة مستخدم جديد ' + name, 'New user added: ' + name, 'user');
        }
        UI.closeModal(); UI.toast(I18N.t('saved_ok'), 'success'); render();
      });
    }

    function renderApprovals(){
      const body = contentEl.querySelector('#approvalsBody');
      const list = DB.all('users').filter(u=>u.status==='pending');
      if(!list.length){ body.innerHTML = `<div class="empty-state">${I18N.t('no_pending')}</div>`; return; }
      body.innerHTML = `
        <div class="table-wrap"><table>
          <thead><tr><th data-i18n="full_name"></th><th data-i18n="email"></th><th data-i18n="phone"></th><th data-i18n="account_type"></th><th data-i18n="actions"></th></tr></thead>
          <tbody>
          ${list.map(u=>`<tr>
            <td class="cell-name"><div class="avatar">${UI.initials(u.name)}</div>${u.name}</td>
            <td>${u.email}</td><td>${u.phone}</td><td>${AUTH.roleLabel(u.role)}</td>
            <td class="row-actions">
              <button class="btn btn-sm btn-accent" data-approve="${u.id}" data-i18n="approve"></button>
              <button class="btn btn-sm btn-danger" data-reject="${u.id}" data-i18n="reject"></button>
            </td>
          </tr>`).join('')}
          </tbody>
        </table></div>`;
      I18N.apply(body);
      body.querySelectorAll('[data-approve]').forEach(b=>b.addEventListener('click', ()=>{
        const target = DB.get('users', b.dataset.approve);
        DB.update('users', b.dataset.approve, { status:'approved' });
        DB.logActivity('تم قبول حساب ' + (target?target.name:''), 'Account approved: ' + (target?target.name:''), 'user');
        UI.toast(I18N.t('saved_ok'),'success'); render();
      }));
      body.querySelectorAll('[data-reject]').forEach(b=>b.addEventListener('click', ()=>{
        const target = DB.get('users', b.dataset.reject);
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          DB.remove('users', b.dataset.reject);
          DB.logActivity('تم رفض حساب ' + (target?target.name:''), 'Account rejected: ' + (target?target.name:''), 'user');
          UI.toast(I18N.t('deleted_ok'),'success'); render();
        });
      }));
    }

    function renderLog(){
      const body = contentEl.querySelector('#logBody');
      const typeSel = contentEl.querySelector('#logTypeFilter');
      const fromEl = contentEl.querySelector('#logFromDate');
      const toEl = contentEl.querySelector('#logToDate');
      const typeColors = { client:'#2E77BC', technician:'#7C4DBB', contract:'#0B2545', visit:'#2F9E63', payment:'#E0A32C', invoice:'#C0587A', user:'#3AA0B0', settings:'#6B7280', other:'#9CA3AF' };
      function draw(){
        const type = typeSel.value;
        const from = fromEl.value;
        const to = toEl.value;
        const list = DB.all('activity').filter(a=>{
          if(type && (a.type||'other')!==type) return false;
          const d = (a.at||'').slice(0,10);
          if(from && d < from) return false;
          if(to && d > to) return false;
          return true;
        });
        if(!list.length){ body.innerHTML = `<div class="empty-state">${I18N.t('no_activity')}</div>`; return; }
        body.innerHTML = list.map(a=>`
          <div style="display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);">
            <div style="width:8px;height:8px;border-radius:50%;background:${typeColors[a.type||'other']};margin-top:6px;flex-shrink:0;"></div>
            <div style="flex:1;">
              <div style="display:flex; justify-content:space-between; gap:10px;">
                <div style="font-size:13px;">${I18N.getLang()==='ar' ? a.text_ar : a.text_en}</div>
                <span class="badge" style="background:${typeColors[a.type||'other']}22; color:${typeColors[a.type||'other']}; flex-shrink:0;" data-i18n="activity_type_${a.type||'other'}"></span>
              </div>
              <div class="text-muted" style="font-size:11px;">${UI.fmtDate(a.at)}</div>
            </div>
          </div>`).join('');
        I18N.apply(body);
      }
      typeSel.addEventListener('change', draw);
      fromEl.addEventListener('change', draw);
      toEl.addEventListener('change', draw);
      draw();
    }

    renderUsers();
    renderApprovals();
    renderLog();
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
