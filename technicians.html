<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Technicians</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191d">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191d"></script>
<script src="assets/js/lists.js?v=202607191d"></script>
<script src="assets/js/config.js?v=202607191d"></script>
<script src="assets/js/db.js?v=202607191d"></script>
<script src="assets/js/billing.js?v=202607191d"></script>
<script src="assets/js/auth.js?v=202607191d"></script>
<script src="assets/js/ui.js?v=202607191d"></script>
<script src="assets/js/layout.js?v=202607191d"></script>
<script>
const ctx = LAYOUT.render('technicians');
if(ctx){
  const { contentEl } = ctx;

  function render(){
    const techs = DB.all('technicians');
    const visits = DB.all('visits');
    const specialties = Array.from(new Set(techs.map(t=>t.specialty).filter(Boolean))).sort();
    contentEl.innerHTML = `
      <div class="filters-bar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" data-i18n-ph="search">
        </div>
        <select id="specialtyFilter">
          <option value="" data-i18n="all"></option>
          ${specialties.map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
        <button type="button" class="btn btn-primary" id="addBtn" data-i18n="add_technician"></button>
      </div>
      <div id="techSummary" class="table-summary-bar" style="border-radius:var(--radius-sm); margin-bottom:16px;"></div>
      <div class="grid grid-3" id="cards"></div>
      <div id="emptyState" class="empty-state hidden"><div data-i18n="no_data"></div></div>
    `;
    I18N.apply(contentEl);
    const cardsEl = contentEl.querySelector('#cards');

    function draw(filter){
      const f = (filter||'').toLowerCase();
      const specVal = contentEl.querySelector('#specialtyFilter').value;
      const list = techs.filter(t=>{
        const matchesText = !f || t.name.toLowerCase().includes(f) || (t.specialty||'').toLowerCase().includes(f);
        const matchesSpecialty = !specVal || t.specialty === specVal;
        return matchesText && matchesSpecialty;
      });
      // overall summary — always reflects ALL technicians, not the current filter
      const summaryEl = contentEl.querySelector('#techSummary');
      if(summaryEl){
        const bySpecialty = {};
        techs.forEach(t=>{ const s = t.specialty || I18N.t('tech_specialty_unspecified'); bySpecialty[s] = (bySpecialty[s]||0)+1; });
        const breakdown = Object.keys(bySpecialty).sort().map(s=>`<span>${s}: <strong>${bySpecialty[s]}</strong></span>`).join('');
        summaryEl.innerHTML = `<span><strong>${techs.length}</strong> ${I18N.t('technicians')}</span>${breakdown}`;
      }
      contentEl.querySelector('#emptyState').classList.toggle('hidden', list.length>0);
      cardsEl.innerHTML = list.map((t,idx)=>{
        const count = visits.filter(v=>v.techId===t.id).length;
        const openCount = visits.filter(v=>v.techId===t.id && (v.status==='requested'||v.status==='scheduled'||v.status==='ongoing')).length;
        return `<div class="card" style="position:relative;">
          <span class="text-muted" style="position:absolute; top:14px; inset-inline-end:16px; font-size:11.5px;">#${idx+1}</span>
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
            <div class="avatar" style="width:46px;height:46px;font-size:15px;">${UI.initials(t.name)}</div>
            <div>
              <div style="font-weight:700;">${t.name}</div>
              ${t.nameEn ? `<div class="text-muted" style="font-size:11.5px;">${t.nameEn}</div>` : ''}
              <div class="text-muted" style="font-size:12.5px;">${t.specialty||'—'}</div>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px;">
            <span class="text-muted" data-i18n="phone"></span><span>${t.phone||'—'}</span>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px;">
            <span class="text-muted" data-i18n="tech_nationality"></span><span>${t.nationality||'—'}</span>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px;">
            <span class="text-muted" data-i18n="tech_visits_count"></span><a href="visits.html?tech=${t.id}" class="badge badge-info" style="text-decoration:none;">${count}</a>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px;">
            <span class="text-muted" data-i18n="tech_open_workload"></span><span class="badge ${openCount>3?'badge-warning':'badge-mute'}">${openCount}</span>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:14px;">
            <span class="text-muted" data-i18n="tech_rating"></span><span>⭐ ${t.rating||'—'}</span>
          </div>
          <div class="row-actions">
            <button type="button" class="btn btn-sm btn-outline w-full" data-edit="${t.id}" data-i18n="edit"></button>
            <button type="button" class="btn btn-sm btn-danger" data-del="${t.id}" data-i18n="delete"></button>
          </div>
        </div>`;
      }).join('');
      I18N.apply(cardsEl);
      wireActions();
    }
    function wireActions(){
      cardsEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openForm(DB.get('technicians', b.dataset.edit))));
      cardsEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          const target = DB.get('technicians', b.dataset.del);
          DB.remove('technicians', b.dataset.del);
          DB.logActivity('تم حذف الفني ' + (target?target.name:''), 'Technician deleted: ' + (target?target.name:''), 'technician');
          UI.toast(I18N.t('deleted_ok'),'success'); render();
        });
      }));
    }
    contentEl.querySelector('#searchInput').addEventListener('input', e=>draw(e.target.value));
    contentEl.querySelector('#specialtyFilter').addEventListener('change', ()=>draw(contentEl.querySelector('#searchInput').value));
    contentEl.querySelector('#addBtn').addEventListener('click', ()=>openForm(null));
    draw('');
  }

  function openForm(t){
    const editing = !!t;
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="${editing?'edit':'add_technician'}"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field"><label data-i18n="tech_name_ar"></label><input type="text" id="fNameAr" value="${t?(t.nameAr||t.name||''):''}"></div>
          <div class="field"><label data-i18n="tech_name_en"></label><input type="text" id="fNameEn" value="${t?(t.nameEn||''):''}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="phone"></label><input type="tel" id="fPhone" value="${t?t.phone:''}"></div>
          <div class="field"><label data-i18n="email"></label><input type="email" id="fEmail" value="${t?t.email:''}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="tech_specialty"></label><input type="text" id="fSpec" value="${t?t.specialty:''}"></div>
          <div class="field"><label data-i18n="tech_nationality"></label><select id="fNationality">${LISTS.nationalityOptions(t?(t.nationality||''):'')}</select></div>
        </div>
        <div class="field"><label data-i18n="tech_rating"></label><input type="number" id="fRating" min="0" max="5" step="0.1" value="${t?(t.rating||0):0}"></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button type="button" class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      const nameAr = overlay.querySelector('#fNameAr').value.trim();
      const data = {
        nameAr,
        name: nameAr,
        nameEn: overlay.querySelector('#fNameEn').value.trim(),
        phone: overlay.querySelector('#fPhone').value.trim(),
        email: overlay.querySelector('#fEmail').value.trim(),
        specialty: overlay.querySelector('#fSpec').value.trim(),
        nationality: overlay.querySelector('#fNationality').value,
        rating: Number(overlay.querySelector('#fRating').value || 0),
      };
      if(!data.name){ UI.toast(I18N.t('err_required'), 'error'); return; }
      if(editing){
        DB.update('technicians', t.id, data);
        DB.logActivity('تم تعديل بيانات الفني ' + data.name, 'Technician updated: ' + data.name, 'technician');
      } else {
        const newTech = DB.insert('technicians', data);
        DB.logActivity('تمت إضافة فني جديد ' + data.name, 'New technician added: ' + data.name, 'technician');

        // Every technician added from this screen automatically gets a
        // login account too, same as clients.
        const email = (data.email || '').trim();
        const existingUser = email ? DB.all('users').find(x=>x.email.toLowerCase()===email.toLowerCase()) : null;
        if(email && !existingUser){
          DB.insert('users', {
            id: DB.uid('u'), name: nameAr, email, username:'', password:'123456',
            phone: data.phone, role:'technician', status:'approved', techId: newTech.id, canViewAllVisits:false,
          });
          DB.logActivity('تم إنشاء حساب دخول تلقائيًا للفني ' + nameAr, 'Login account auto-created for technician ' + nameAr, 'user');
          UI.toast(I18N.t('tech_user_created').replace('{email}', email));
        } else if(!email){
          UI.toast(I18N.t('tech_user_skipped_no_email'), 'warning');
        }
      }
      UI.closeModal(); UI.toast(I18N.t('saved_ok'),'success'); render();
    });
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
