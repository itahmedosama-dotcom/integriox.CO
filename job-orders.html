<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Job Orders</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191l">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191l"></script>
<script src="assets/js/lists.js?v=202607191l"></script>
<script src="assets/js/config.js?v=202607191l"></script>
<script src="assets/js/db.js?v=202607191l"></script>
<script src="assets/js/billing.js?v=202607191l"></script>
<script src="assets/js/auth.js?v=202607191l"></script>
<script src="assets/js/ui.js?v=202607191l"></script>
<script src="assets/js/layout.js?v=202607191l"></script>
<script>
const ctx = LAYOUT.render('job-orders');
if(ctx && LAYOUT.guardRoles(ctx, ['admin','client'])){
  const { user, contentEl } = ctx;
  const isAdmin = user.role === 'admin';

  const execStatusBadge = { pending:'badge-warning', in_progress:'badge-info', done:'badge-success', cancelled:'badge-mute' };

  function render(){
    if(!isAdmin) return renderClientView();
    const jobs = DB.all('jobOrders');
    const payments = DB.all('payments');
    const techs = DB.all('technicians');

    contentEl.innerHTML = `
      <div class="filters-bar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" data-i18n-ph="search">
        </div>
        <select id="statusFilter">
          <option value="" data-i18n="all"></option>
          <option value="pending" data-i18n="job_status_pending"></option>
          <option value="in_progress" data-i18n="job_status_in_progress"></option>
          <option value="done" data-i18n="job_status_done"></option>
          <option value="cancelled" data-i18n="job_status_cancelled"></option>
        </select>
        <button type="button" class="btn btn-primary" id="addBtn" data-i18n="add_job_order"></button>
      </div>
      <div id="jobsSummary" class="table-summary-bar" style="border-radius:var(--radius-sm); margin-bottom:16px;"></div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th data-i18n="job_id"></th><th data-i18n="job_client"></th><th data-i18n="job_service"></th>
              <th data-i18n="job_duration"></th><th data-i18n="job_amount"></th><th data-i18n="job_technician"></th>
              <th data-i18n="job_exec_status"></th><th data-i18n="job_payment_status"></th><th data-i18n="actions"></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state hidden">
          <div style="font-size:32px; margin-bottom:8px;">🧰</div>
          <div data-i18n="no_job_orders_yet"></div>
        </div>
      </div>
    `;
    I18N.apply(contentEl);
    const rowsEl = contentEl.querySelector('#rows');

    function draw(filter){
      const f = (filter||'').toLowerCase();
      const st = contentEl.querySelector('#statusFilter').value;
      const list = jobs.filter(j=>{
        const matchesText = !f || (j.clientName||'').toLowerCase().includes(f) || (j.clientPhone||'').includes(f) || j.id.toLowerCase().includes(f);
        const matchesStatus = !st || j.execStatus === st;
        return matchesText && matchesStatus;
      }).sort((a,b)=> (b.requestDate||'').localeCompare(a.requestDate||''));

      const summaryEl = contentEl.querySelector('#jobsSummary');
      if(summaryEl){
        const totalValue = jobs.reduce((s,j)=>s+Number(j.amount||0),0);
        summaryEl.innerHTML = `<span><strong>${jobs.length}</strong> ${I18N.t('job_orders_count_label')}</span><span><strong>${UI.fmtMoney(totalValue)}</strong> ${I18N.t('contracts_total_value_label')}</span>`;
      }

      contentEl.querySelector('#emptyState').classList.toggle('hidden', list.length>0);
      rowsEl.innerHTML = list.map((j,idx)=>{
        const tech = techs.find(t=>t.id===j.techId);
        const payment = payments.find(p=>p.id===j.paymentId);
        const durationLabel = j.durationUnit === 'days' ? I18N.t('job_duration_days') : I18N.t('job_duration_hours');
        const waHref = j.clientPhone ? (()=>{
          const phone = j.clientPhone.replace(/^0/, '966').replace(/\D/g,'');
          const idSafe = UI.ltrToken(j.id);
          const text = encodeURIComponent(I18N.getLang()==='ar'
            ? `\u200Fمرحبًا ${j.clientName} | طلب حل مشكلة برقم ${idSafe} | نود تذكيركم بموعد سداد مستحقات الطلب لتنفيذ الخدمة | علمًا بأن تاريخ السداد المستحق هو ${UI.fmtDate(j.requestDate)}`
            : `Hello ${j.clientName} | Service request No. ${j.id} | This is a reminder about the payment due for this service request | The due date is ${UI.fmtDate(j.requestDate)}`);
          return `https://wa.me/${phone}?text=${text}`;
        })() : null;
        return `<tr>
          <td class="table-row-num">${idx+1}</td>
          <td><strong>${j.id}</strong><div class="text-muted" style="font-size:11px;">${UI.fmtDate(j.requestDate)}</div></td>
          <td>${j.clientName||'—'}<div class="text-muted" style="font-size:11px;">${j.clientPhone||''}</div></td>
          <td>${j.serviceName||'—'}</td>
          <td>${j.durationValue||'—'} ${j.durationValue?durationLabel:''}</td>
          <td><strong>${j.amount ? UI.fmtMoney(j.amount) : '—'}</strong></td>
          <td>${tech?tech.name:'—'}</td>
          <td><span class="badge ${execStatusBadge[j.execStatus]||'badge-mute'}" data-i18n="job_status_${j.execStatus||'pending'}"></span></td>
          <td>${payment ? `<span class="badge ${payment.status==='confirmed'?'badge-success':(payment.status==='review'?'badge-warning':'badge-danger')}" data-i18n="pay_${payment.status}"></span>` : '—'}</td>
          <td class="row-actions">
            ${payment ? `<a class="btn btn-sm btn-outline" href="payment-template.html?id=${payment.id}" data-i18n="print_receipt_action"></a>` : ''}
            ${waHref ? `<a class="btn btn-sm btn-outline" href="${waHref}" target="_blank" rel="noopener" title="WhatsApp">💬</a>` : ''}
            <button type="button" class="btn btn-sm btn-outline" data-edit="${j.id}" data-i18n="edit"></button>
            <button type="button" class="btn btn-sm btn-danger" data-del="${j.id}" data-i18n="delete"></button>
          </td>
        </tr>`;
      }).join('');
      I18N.apply(rowsEl);

      rowsEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openForm(jobs.find(j=>j.id===b.dataset.edit))));
      rowsEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        const job = jobs.find(j=>j.id===b.dataset.del);
        const linkedPayment = job && job.paymentId ? payments.find(p=>p.id===job.paymentId) : null;
        if(linkedPayment && linkedPayment.invoiceId){
          UI.toast(I18N.t('err_payment_has_invoice'), 'error');
          return;
        }
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          DB.remove('jobOrders', b.dataset.del);
          if(linkedPayment) DB.remove('payments', linkedPayment.id);
          DB.logActivity('تم حذف تنفيذ بالطلب ' + b.dataset.del, 'Job order deleted ' + b.dataset.del, 'other');
          UI.toast(I18N.t('deleted_ok'), 'success'); render();
        });
      }));
    }
    contentEl.querySelector('#searchInput').addEventListener('input', e=>draw(e.target.value));
    contentEl.querySelector('#statusFilter').addEventListener('change', ()=>draw(contentEl.querySelector('#searchInput').value));
    contentEl.querySelector('#addBtn').addEventListener('click', ()=>openForm());
    draw();
  }

  function renderClientView(){
    const myJobs = DB.all('jobOrders').filter(j=>j.clientId===user.clientId).sort((a,b)=>(b.requestDate||'').localeCompare(a.requestDate||''));
    const payments = DB.all('payments');

    contentEl.innerHTML = `
      <div class="filters-bar">
        <button type="button" class="btn btn-primary" id="addBtn" data-i18n="add_job_order"></button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th data-i18n="job_id"></th><th data-i18n="job_service"></th>
              <th data-i18n="job_exec_status"></th><th data-i18n="job_payment_status"></th><th data-i18n="actions"></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state ${myJobs.length?'hidden':''}">
          <div style="font-size:32px; margin-bottom:8px;">🧰</div>
          <div data-i18n="no_job_orders_yet"></div>
        </div>
      </div>
    `;
    I18N.apply(contentEl);
    const rowsEl = contentEl.querySelector('#rows');
    rowsEl.innerHTML = myJobs.map((j,idx)=>{
      const payment = payments.find(p=>p.id===j.paymentId);
      return `<tr>
        <td class="table-row-num">${idx+1}</td>
        <td><strong>${j.id}</strong><div class="text-muted" style="font-size:11px;">${UI.fmtDate(j.requestDate)}</div></td>
        <td>${j.serviceName||'—'}</td>
        <td><span class="badge ${execStatusBadge[j.execStatus]||'badge-mute'}" data-i18n="job_status_${j.execStatus||'pending'}"></span></td>
        <td>${payment ? `<span class="badge ${payment.status==='confirmed'?'badge-success':(payment.status==='review'?'badge-warning':'badge-danger')}" data-i18n="pay_${payment.status}"></span>` : '—'}</td>
        <td class="row-actions">
          ${payment ? `<a class="btn btn-sm btn-outline" href="payment-template.html?id=${payment.id}" data-i18n="print_receipt_action"></a>` : ''}
        </td>
      </tr>`;
    }).join('');
    I18N.apply(rowsEl);
    contentEl.querySelector('#addBtn').addEventListener('click', ()=>openForm());
  }

  function openForm(job){
    const editing = !!job;
    const clients = DB.all('clients');
    const techs = DB.all('technicians');
    const myClient = !isAdmin ? DB.get('clients', user.clientId) : null;

    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="${editing?'edit':'add_job_order'}"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        ${isAdmin ? `
        <div class="field">
          <label data-i18n="job_pick_existing_client"></label>
          <select id="fExistingClient">
            <option value="" data-i18n="job_client_walkin"></option>
            ${clients.map(c=>`<option value="${c.id}" ${editing && job.clientId===c.id?'selected':''}>${c.name} — ${c.phone||''}</option>`).join('')}
          </select>
          <p class="hint" data-i18n="job_pick_existing_client_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="full_name"></label><input type="text" id="fName" value="${editing?(job.clientName||''):''}"></div>
          <div class="field"><label data-i18n="phone"></label><input type="tel" id="fPhone" value="${editing?(job.clientPhone||''):''}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="email"></label><input type="email" id="fClientEmail" value="${editing && job.clientId ? ((clients.find(c=>c.id===job.clientId)||{}).email||'') : ''}"></div>
          <div class="field"></div>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="client_cr"></label><input type="text" id="fClientCr" value="${editing && job.clientId ? ((clients.find(c=>c.id===job.clientId)||{}).crNumber||'') : ''}"></div>
          <div class="field"><label data-i18n="client_tax_number"></label><input type="text" id="fClientTax" value="${editing && job.clientId ? ((clients.find(c=>c.id===job.clientId)||{}).taxNumber||'') : ''}"></div>
        </div>
        ` : `
        <div class="field">
          <label data-i18n="job_client"></label>
          <div style="font-size:13.5px; font-weight:700;">${myClient?myClient.name:user.name}</div>
          <div class="text-muted" style="font-size:12px;">${myClient?myClient.phone:''}</div>
        </div>
        `}

        <div class="field">
          <label data-i18n="job_service"></label>
          <div style="display:flex; gap:8px;">
            <select id="fService" style="flex:1;"></select>
            ${isAdmin ? `<button type="button" class="btn btn-outline btn-sm" id="addServiceBtn">+</button>` : ''}
          </div>
          ${!isAdmin ? `<p class="hint" data-i18n="job_service_client_hint" style="margin-top:4px;"></p>` : ''}
        </div>

        <div class="field-row">
          <div class="field"><label data-i18n="job_request_date"></label><input type="date" id="fDate" value="${editing?(job.requestDate||DB.todayISO()):DB.todayISO()}"></div>
          ${isAdmin ? `<div class="field"><label data-i18n="job_amount"></label><input type="number" id="fAmount" min="0" value="${editing?job.amount:''}"></div>` : '<div class="field"></div>'}
        </div>
        ${isAdmin ? `
        <div class="field-row">
          <div class="field"><label data-i18n="job_duration_value"></label><input type="number" id="fDurationValue" min="0" value="${editing?(job.durationValue||''):''}"></div>
          <div class="field">
            <label data-i18n="job_duration_unit"></label>
            <select id="fDurationUnit">
              <option value="hours" data-i18n="job_duration_hours" ${!editing || job.durationUnit==='hours'?'selected':''}></option>
              <option value="days" data-i18n="job_duration_days" ${editing && job.durationUnit==='days'?'selected':''}></option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label data-i18n="job_technician"></label>
            <select id="fTech"><option value="" data-i18n="job_no_technician"></option>${techs.map(t=>`<option value="${t.id}" ${editing && job.techId===t.id?'selected':''}>${t.name}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label data-i18n="job_exec_status"></label>
            <select id="fExecStatus">
              <option value="pending" data-i18n="job_status_pending" ${!editing || job.execStatus==='pending'?'selected':''}></option>
              <option value="in_progress" data-i18n="job_status_in_progress" ${editing && job.execStatus==='in_progress'?'selected':''}></option>
              <option value="done" data-i18n="job_status_done" ${editing && job.execStatus==='done'?'selected':''}></option>
              <option value="cancelled" data-i18n="job_status_cancelled" ${editing && job.execStatus==='cancelled'?'selected':''}></option>
            </select>
          </div>
        </div>
        ` : ''}
        <div class="field"><label data-i18n="job_location"></label><input type="text" id="fLocation" value="${editing?(job.location||''):''}"></div>
        <div class="field"><label data-i18n="job_notes"></label><textarea id="fNotes" style="min-height:80px;">${editing?(job.notes||''):''}</textarea></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button type="button" class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    I18N.apply(overlay);

    const serviceSelect = overlay.querySelector('#fService');
    function drawServices(selectedId){
      const services = DB.getSettings().serviceTypes || [];
      serviceSelect.innerHTML = services.map(s=>`
        <option value="${s.id}" data-name="${I18N.getLang()==='ar'?s.nameAr:s.nameEn}" ${(editing && job.serviceId===s.id) || selectedId===s.id ?'selected':''}>
          ${I18N.getLang()==='ar'?s.nameAr:s.nameEn}
        </option>`).join('');
    }
    drawServices();
    if(isAdmin){
      overlay.querySelector('#addServiceBtn').addEventListener('click', ()=>{
        const nameAr = (window.prompt(I18N.t('job_new_service_prompt'))||'').trim();
        if(!nameAr) return;
        const services = DB.getSettings().serviceTypes || [];
        const newService = { id: 'svc_' + Math.random().toString(36).slice(2,8), nameAr, nameEn: nameAr, defaultPrice: 0 };
        DB.saveSettings({ serviceTypes: services.concat([newService]) });
        DB.logActivity('تمت إضافة نوع خدمة جديد: ' + nameAr, 'New service type added: ' + nameAr, 'settings');
        drawServices(newService.id);
      });
      overlay.querySelector('#fExistingClient').addEventListener('change', (e)=>{
        const c = clients.find(x=>x.id===e.target.value);
        if(c){
          overlay.querySelector('#fName').value = c.name || '';
          overlay.querySelector('#fPhone').value = c.phone || '';
          overlay.querySelector('#fClientEmail').value = c.email || '';
          overlay.querySelector('#fClientCr').value = c.crNumber || '';
          overlay.querySelector('#fClientTax').value = c.taxNumber || '';
        }
      });
    }

    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      let clientId, clientName, clientPhone;

      if(isAdmin){
        clientName = overlay.querySelector('#fName').value.trim();
        clientPhone = overlay.querySelector('#fPhone').value.trim();
        const clientEmail = overlay.querySelector('#fClientEmail').value.trim();
        const clientCr = overlay.querySelector('#fClientCr').value.trim();
        const clientTax = overlay.querySelector('#fClientTax').value.trim();
        if(!clientName || !clientPhone){ UI.toast(I18N.t('err_required'), 'error'); return; }

        // Every job-order client is always a real, permanent client
        // record — reuse the one explicitly picked, or one matching this
        // phone number, or create a brand new one.
        clientId = overlay.querySelector('#fExistingClient').value || null;
        if(!clientId){
          const existingByPhone = DB.all('clients').find(c=>c.phone && c.phone===clientPhone);
          if(existingByPhone) clientId = existingByPhone.id;
        }
        const clientPatch = {
          name: clientName, nameAr: clientName, phone: clientPhone,
          email: clientEmail, crNumber: clientCr, taxNumber: clientTax,
        };
        if(clientId){
          DB.update('clients', clientId, clientPatch);
        } else {
          const newClient = DB.insert('clients', Object.assign({}, clientPatch, { country:'', address:'', createdAt: DB.todayISO() }));
          clientId = newClient.id;
          DB.logActivity('تم تسجيل عميل جديد من تنفيذ بالطلب: ' + clientName, 'New client registered from a job order: ' + clientName, 'client');
        }
      } else {
        // Client submitting their own request — always themselves, never
        // anyone else's account.
        clientId = user.clientId;
        clientName = myClient ? myClient.name : user.name;
        clientPhone = myClient ? myClient.phone : '';
      }
      DB.markClientType(clientId, 'on_demand');

      const serviceOpt = serviceSelect.selectedOptions[0];
      if(!serviceOpt){ UI.toast(I18N.t('err_required'), 'error'); return; }
      const requestDate = overlay.querySelector('#fDate').value;
      const amount = isAdmin ? Number(overlay.querySelector('#fAmount').value || 0) : (editing ? job.amount : 0);
      if(isAdmin && !amount){ UI.toast(I18N.t('err_required'), 'error'); return; }

      const data = {
        clientId, clientName, clientPhone,
        serviceId: serviceSelect.value, serviceName: serviceOpt ? serviceOpt.dataset.name : '',
        requestDate, amount,
        durationValue: isAdmin ? Number(overlay.querySelector('#fDurationValue').value || 0) : (editing ? job.durationValue : 0),
        durationUnit: isAdmin ? overlay.querySelector('#fDurationUnit').value : (editing ? job.durationUnit : 'hours'),
        techId: isAdmin ? (overlay.querySelector('#fTech').value || null) : (editing ? job.techId : null),
        execStatus: isAdmin ? overlay.querySelector('#fExecStatus').value : (editing ? job.execStatus : 'pending'),
        location: overlay.querySelector('#fLocation').value.trim(),
        notes: overlay.querySelector('#fNotes').value.trim(),
      };

      if(editing){
        DB.update('jobOrders', job.id, data);
        // keep the linked pending payment's amount/description in sync if it hasn't been confirmed yet
        if(job.paymentId){
          const payment = DB.get('payments', job.paymentId);
          if(payment && payment.status === 'review'){
            DB.update('payments', payment.id, {
              amount, clientId, clientName, clientPhone,
              description: I18N.t('job_payment_desc_prefix') + ' ' + data.serviceName + ' — ' + clientName,
            });
          }
        } else if(amount > 0){
          // an admin has just set a price for a request that came in
          // without one (e.g. a client's own submission) — send it to
          // Payments for confirmation now.
          const payment = {
            id: DB.nextSeqId('PAY', 'payments'),
            contractId: null, jobOrderId: job.id,
            clientId, clientName, clientPhone,
            amount, method: 'cash', date: DB.todayISO(), status: 'review',
            description: I18N.t('job_payment_desc_prefix') + ' ' + data.serviceName + ' — ' + clientName,
          };
          DB.insert('payments', payment);
          DB.update('jobOrders', job.id, { paymentId: payment.id });
          DB.logActivity('تم إنشاء دفعة بانتظار التأكيد لتنفيذ بالطلب ' + job.id, 'Pending payment created for job order ' + job.id, 'payment');
        }
        DB.logActivity('تم تعديل تنفيذ بالطلب ' + job.id, 'Job order updated ' + job.id, 'other');
      } else {
        data.id = DB.nextSeqId('JOB', 'jobOrders');
        data.createdAt = DB.todayISO();
        // Only send it to Payments if a price is already known (admin
        // entry). A client's own submission has no price yet — an admin
        // sets one later when editing it, which is what creates the
        // payment (see above).
        if(amount > 0){
          const payment = {
            id: DB.nextSeqId('PAY', 'payments'),
            contractId: null, jobOrderId: data.id,
            clientId, clientName, clientPhone,
            amount, method: 'cash', date: requestDate, status: 'review',
            description: I18N.t('job_payment_desc_prefix') + ' ' + data.serviceName + ' — ' + clientName,
          };
          DB.insert('payments', payment);
          data.paymentId = payment.id;
        }
        DB.insert('jobOrders', data);
        if(isAdmin){
          DB.logActivity('تم تسجيل تنفيذ بالطلب جديد ' + data.id, 'New job order recorded ' + data.id, 'other');
        } else {
          DB.logActivity('تم تقديم طلب تنفيذ بالطلب جديد من العميل ' + clientName, 'New job order request submitted by client ' + clientName, 'other');
        }
      }
      UI.closeModal(); UI.toast(I18N.t('saved_ok'), 'success'); render();
    });
  }

  document.addEventListener('lang-changed', render);
  render();
  if(new URLSearchParams(window.location.search).get('new') === '1'){
    openForm();
  }
}
</script>
</body>
</html>
