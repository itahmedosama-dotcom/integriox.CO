<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Visits</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191ae">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191ae"></script>
<script src="assets/js/lists.js?v=202607191ae"></script>
<script src="assets/js/config.js?v=202607191ae"></script>
<script src="assets/js/db.js?v=202607191ae"></script>
<script src="assets/js/billing.js?v=202607191ae"></script>
<script src="assets/js/auth.js?v=202607191ae"></script>
<script src="assets/js/ui.js?v=202607191ae"></script>
<script src="assets/js/layout.js?v=202607191ae"></script>
<script>
const ctx = LAYOUT.render('visits');
if(ctx){
  const { user, contentEl } = ctx;
  const isAdmin = user.role === 'admin';
  const isTech = user.role === 'technician';
  const isClient = user.role === 'client';

  const statusBadge = { requested:'badge-danger', scheduled:'badge-info', ongoing:'badge-warning', done:'badge-success', cancelled:'badge-mute' };
  const typeLabelMap = { periodic:'issue_periodic', fault:'issue_fault', urgent:'issue_urgent' };
  // Guards against corrupted time values (e.g. a record round-tripped
  // through an Excel export/import can end up with a full ISO datetime
  // instead of "HH:MM") — only show it if it actually looks like a time.
  function safeTime(t){ return /^\d{1,2}:\d{2}$/.test(t||'') ? t : ''; }

  function render(){
    let visits = DB.all('visits');
    if(isTech){
      if(!user.canViewAllVisits){
        visits = visits.filter(v=>v.techId===user.techId);
      }
      // technicians with the permission see every visit already (all techs +
      // unassigned/new requests), so no extra filtering needed in that case.
    }
    if(isClient) visits = visits.filter(v=>v.clientId===user.clientId);
    const qParams = new URLSearchParams(window.location.search);
    const qClientId = qParams.get('client');
    const qTechId = qParams.get('tech');
    if(qClientId) visits = visits.filter(v=>v.clientId===qClientId);
    if(qTechId) visits = visits.filter(v=>v.techId===qTechId);
    const clients = DB.all('clients');
    const techs = DB.all('technicians');

    contentEl.innerHTML = `
      <div class="filters-bar no-print">
        <select id="statusFilter">
          <option value="" data-i18n="all"></option>
          <option value="requested" data-i18n="visit_requested"></option>
          <option value="scheduled" data-i18n="visit_scheduled"></option>
          <option value="ongoing" data-i18n="visit_ongoing"></option>
          <option value="done" data-i18n="visit_done"></option>
          <option value="cancelled" data-i18n="visit_cancelled"></option>
        </select>
        <button type="button" class="btn btn-outline no-print" id="printSelectedBtn" disabled>🖨️ <span data-i18n="print_selected"></span> (<span id="selectedCount">0</span>)</button>
      </div>
      <div class="card no-print">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th class="no-print"><input type="checkbox" id="selectAll" style="width:auto;"></th>
              <th>#</th><th data-i18n="job_id"></th>
              <th data-i18n="visit_date"></th><th data-i18n="contract_client"></th><th data-i18n="visit_technician"></th>
              <th data-i18n="visit_type"></th><th data-i18n="visit_status"></th><th data-i18n="details"></th><th data-i18n="actions"></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state hidden"><div data-i18n="no_data"></div></div>
      </div>
      <div id="bulkPrintArea" class="print-only"></div>
    `;
    I18N.apply(contentEl);
    const rowsEl = contentEl.querySelector('#rows');

    function draw(){
      const st = contentEl.querySelector('#statusFilter').value;
      const list = visits.filter(v=> !st || v.status===st).sort((a,b)=> b.date.localeCompare(a.date));
      contentEl.querySelector('#emptyState').classList.toggle('hidden', list.length>0);
      rowsEl.innerHTML = list.map((v,idx)=>{
        const client = clients.find(c=>c.id===v.clientId);
        const tech = techs.find(t=>t.id===v.techId);
        return `<tr>
          <td class="no-print"><input type="checkbox" class="rowCheck" value="${v.id}" style="width:auto;"></td>
          <td class="table-row-num">${idx+1}</td>
          <td><strong>${v.id}</strong></td>
          <td>${UI.fmtDate(v.date)} <span class="text-muted">${safeTime(v.time)}</span></td>
          <td>${client?client.name:'—'}</td>
          <td>${tech?tech.name:`<span class="text-muted">—</span>`}</td>
          <td><span data-i18n="${typeLabelMap[v.type]||'issue_periodic'}"></span></td>
          <td><span class="badge ${statusBadge[v.status]}" data-i18n="visit_${v.status}"></span></td>
          <td class="text-muted" style="max-width:220px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${v.description||'—'}</td>
          <td class="row-actions">
            <button type="button" class="btn btn-sm btn-outline" data-view="${v.id}" title="${I18N.t('details')}">👁️</button>
            <button type="button" class="btn btn-sm btn-outline no-print" data-print="${v.id}" title="${I18N.t('print_selected')}">🖨️</button>
            ${isAdmin && !tech ? `<button type="button" class="btn btn-sm btn-accent" data-assign="${v.id}" title="${I18N.t('assign_tech')}">🔧</button>` : ''}
            ${(isAdmin || (isTech && v.techId===user.techId)) && v.status!=='done' && v.status!=='cancelled' ? `<button type="button" class="btn btn-sm btn-outline" data-complete="${v.id}" title="${I18N.t('visit_done')}">✅</button>` : ''}
            ${isAdmin && v.status==='done' ? `<button type="button" class="btn btn-sm btn-outline" data-edit-report="${v.id}" title="${I18N.t('visit_report')}">📝</button>` : ''}
            ${isAdmin && v.status==='done' ? (()=>{
              const c2 = clients.find(c=>c.id===v.clientId);
              if(!c2 || !c2.phone) return '';
              return `<button type="button" class="btn btn-sm btn-outline" data-wa-visit="${v.id}" title="WhatsApp">💬</button>`;
            })() : ''}
            ${isAdmin ? `<button type="button" class="btn btn-sm btn-outline" data-edit="${v.id}" title="${I18N.t('edit')}">✏️</button>` : ''}
            ${isAdmin ? `<button type="button" class="btn btn-sm btn-danger" data-del="${v.id}" title="${I18N.t('delete')}">🗑️</button>` : ''}
          </td>
        </tr>`;
      }).join('');
      I18N.apply(rowsEl);
      wireBulkPrint(list);
      rowsEl.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click', ()=>openDetails(visits.find(v=>v.id===b.dataset.view), clients, techs)));
      rowsEl.querySelectorAll('[data-print]').forEach(b=>b.addEventListener('click', ()=>printVisits([visits.find(v=>v.id===b.dataset.print)], clients, techs)));
      rowsEl.querySelectorAll('[data-assign]').forEach(b=>b.addEventListener('click', ()=>openAssign(b.dataset.assign, techs)));
      rowsEl.querySelectorAll('[data-wa-visit]').forEach(b=>b.addEventListener('click', ()=>{
        try{
          const v = visits.find(x=>x.id===b.dataset.waVisit);
          const c2 = clients.find(x=>x.id===v.clientId);
          if(!v || !c2 || !c2.phone) return;
          const phone = String(c2.phone).replace(/^0/, '966').replace(/\D/g,'');
          const token = DB.ensurePublicToken('visits', v.id, 'viewToken');
          const link = window.location.origin + window.location.pathname.replace('visits.html','') + 'visit-view.html?id=' + v.id + '&token=' + token;
          const idSafe = UI.ltrToken(v.id);
          const text = encodeURIComponent(I18N.getLang()==='ar'
            ? `\u200Fمرحبًا ${c2.name} | تم إنهاء زيارتكم رقم ${idSafe} | ${link}`
            : `Hello ${c2.name} | Your visit ${v.id} has been completed | ${link}`);
          UI.sendWhatsApp(phone, text);
        }catch(err){
          UI.toast(I18N.t('wa_send_error') + (err && err.message ? (': ' + err.message) : ''), 'error');
        }
      }));
      rowsEl.querySelectorAll('[data-complete]').forEach(b=>b.addEventListener('click', ()=>{
        openCompleteReportModal(visits.find(v=>v.id===b.dataset.complete));
      }));
      rowsEl.querySelectorAll('[data-edit-report]').forEach(b=>b.addEventListener('click', ()=>{
        openCompleteReportModal(visits.find(v=>v.id===b.dataset.editReport));
      }));
      rowsEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openForm(visits.find(v=>v.id===b.dataset.edit))));
      rowsEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          DB.remove('visits', b.dataset.del);
          DB.logActivity('تم حذف الزيارة ' + b.dataset.del, 'Visit deleted ' + b.dataset.del, 'visit');
          UI.toast(I18N.t('deleted_ok'), 'success'); render();
        });
      }));
    }

    function wireBulkPrint(list){
      const printBtn = contentEl.querySelector('#printSelectedBtn');
      const countEl = contentEl.querySelector('#selectedCount');
      const selectAll = contentEl.querySelector('#selectAll');
      function updateCount(){
        const checked = rowsEl.querySelectorAll('.rowCheck:checked').length;
        countEl.textContent = checked;
        printBtn.disabled = checked === 0;
      }
      rowsEl.querySelectorAll('.rowCheck').forEach(cb=> cb.addEventListener('change', updateCount));
      if(selectAll){
        selectAll.checked = false;
        selectAll.addEventListener('change', ()=>{
          rowsEl.querySelectorAll('.rowCheck').forEach(cb=> cb.checked = selectAll.checked);
          updateCount();
        });
      }
      printBtn.onclick = ()=>{
        const ids = Array.from(rowsEl.querySelectorAll('.rowCheck:checked')).map(cb=>cb.value);
        const selected = list.filter(v=>ids.includes(v.id));
        printVisits(selected, clients, techs);
      };
      updateCount();
    }

    // Renders full details for one or more visits into a print-only area
    // and triggers the browser print dialog — used for both the
    // single-row print button and "طباعة المحدد" (print selected).
    function printVisits(visitList, clientsList, techsList){
      const area = contentEl.querySelector('#bulkPrintArea');
      const settings = DB.getSettings();
      area.innerHTML = visitList.map(v=>{
        const client = clientsList.find(c=>c.id===v.clientId);
        const tech = techsList.find(t=>t.id===v.techId);
        return `
        <div style="page-break-after:always; padding:24px; font-family:inherit;">
          <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--navy); padding-bottom:14px; margin-bottom:20px;">
            <div style="display:flex; align-items:center; gap:10px;">
              <img src="assets/images/logo.png" style="width:44px;height:44px;">
              <div>
                <div style="font-weight:800; font-size:16px; color:var(--navy);">${settings.companyName||'Integriox'}</div>
                <div class="text-muted" style="font-size:11px;">${settings.companyAddress||''}</div>
              </div>
            </div>
            <div style="text-align:end;">
              <div style="font-weight:800; font-size:16px;" data-i18n="visit_details_title"></div>
              <div class="text-muted" style="font-size:12px;">${v.id}</div>
            </div>
          </div>

          <div class="grid grid-2" style="margin-bottom:22px;">
            <div>
              <h4 data-i18n="party_a" style="margin:0 0 8px;"></h4>
              <div style="display:flex; align-items:flex-start; gap:10px;">
                <img src="assets/images/logo.png" style="width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">
                <div style="font-size:13px; line-height:1.9;">
                  ${settings.companyName||'Integriox'}<br>${settings.companyPhone||''}<br>${settings.companyEmail||''}
                </div>
              </div>
            </div>
            <div>
              <h4 data-i18n="party_b" style="margin:0 0 8px;"></h4>
              <div style="display:flex; align-items:flex-start; gap:10px;">
                ${client && client.logo ? `<img src="${client.logo}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">` : ''}
                <div style="font-size:13px; line-height:1.9;">
                  <strong>${client?client.name:'—'}</strong><br>${client?(client.phone||''):''}<br>${client?(client.address||''):''}
                </div>
              </div>
            </div>
          </div>

          <div class="grid grid-3" style="margin-bottom:16px;">
            <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_date"></div><div style="font-weight:700;">${UI.fmtDate(v.date)} ${safeTime(v.time)}</div></div>
            <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_technician"></div><div style="font-weight:700;">${tech?tech.name:'—'}</div></div>
            <div><div class="text-muted" style="font-size:11px;" data-i18n="invoice_contract"></div><div style="font-weight:700;">${v.contractId||'—'}</div></div>
            <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_type"></div><div style="font-weight:700;" data-i18n="${typeLabelMap[v.type]||'issue_periodic'}"></div></div>
            <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_status"></div><div style="font-weight:700;" data-i18n="visit_${v.status}"></div></div>
          </div>

          <div class="text-muted" style="font-size:11px;" data-i18n="visit_description"></div>
          <div style="margin-bottom:14px; border:1px solid var(--line); border-radius:8px; padding:10px 12px; min-height:40px;">${v.description||'—'}</div>
          ${v.report ? `
          <div class="text-muted" style="font-size:11px;" data-i18n="visit_report"></div>
          <div style="margin-bottom:14px; border:1px solid var(--line); border-radius:8px; padding:10px 12px; min-height:40px; white-space:pre-wrap;">${v.report}</div>` : ''}
          ${v.contactName || v.contactPhone ? `
          <div class="text-muted" style="font-size:11px;" data-i18n="visit_contact"></div>
          <div style="margin-bottom:6px;">${v.contactName||''} ${v.contactPhone||''}</div>` : ''}

          ${(v.techSignature && v.techSignature.length>1000) || (v.clientSignature && v.clientSignature.length>1000) ? `
          <div class="grid grid-2" style="margin-top:20px;">
            <div>
              <div class="text-muted" style="font-size:11px; margin-bottom:6px;" data-i18n="tech_signature"></div>
              ${v.techSignature && v.techSignature.length>1000 ? `<img src="${v.techSignature}" style="max-height:80px;">` : ''}
            </div>
            <div>
              <div class="text-muted" style="font-size:11px; margin-bottom:6px;" data-i18n="client_signature"></div>
              ${v.clientSignature && v.clientSignature.length>1000 ? `<img src="${v.clientSignature}" style="max-height:80px;">` : ''}
            </div>
          </div>` : ''}

          ${settings.companyStamp ? `<div style="display:flex; justify-content:center; margin-top:20px;"><img src="${settings.companyStamp}" style="width:90px;height:90px;object-fit:contain;" alt="stamp"></div>` : ''}
        </div>`;
      }).join('');
      I18N.apply(area);
      setTimeout(()=>window.print(), 60);
    }
    contentEl.querySelector('#statusFilter').addEventListener('change', draw);
    draw();

    const viewId = new URLSearchParams(window.location.search).get('view');
    if(viewId){
      const target = visits.find(v=>v.id===viewId);
      if(target) openDetails(target, clients, techs);
    }
  }

  function openCompleteReportModal(v){
    const hasValidTechSig = !!(v.techSignature && v.techSignature.length > 1000);
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="visit_complete_title"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        <p class="hint" style="margin-bottom:10px;" data-i18n="visit_complete_hint"></p>
        <div class="field"><label data-i18n="visit_report"></label><textarea id="fReport" style="min-height:110px;">${v.report||''}</textarea></div>
        <div class="field">
          <label data-i18n="tech_signature"></label>
          ${hasValidTechSig ? `
            <img id="techSigImg" src="${v.techSignature}" style="max-height:100px; border:1px solid var(--line); border-radius:8px; padding:6px; background:#fff;">
          ` : `
            <canvas id="techSigCanvas" class="signature-pad" width="500" height="130" style="width:100%; height:110px; border:1.5px dashed var(--line); border-radius:8px;"></canvas>
            <div class="row-actions" style="margin-top:6px;">
              <button type="button" class="btn btn-sm btn-outline" id="clearTechSig" data-i18n="clear_signature"></button>
            </div>
          `}
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button type="button" class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    I18N.apply(overlay);
    let techPad = null;
    if(!hasValidTechSig){
      const canvas = overlay.querySelector('#techSigCanvas');
      techPad = UI.SignaturePad(canvas);
      overlay.querySelector('#clearTechSig').addEventListener('click', ()=>techPad.clear());
    }
    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      const report = overlay.querySelector('#fReport').value.trim();
      const patch = { status:'done', report, completedAt: DB.todayISO() };
      if(techPad && !techPad.isEmpty()){
        patch.techSignature = techPad.toDataURL();
      }
      DB.update('visits', v.id, patch);
      DB.logActivity('تم إنهاء الزيارة ' + v.id + ' مع كتابة تقرير', 'Visit completed with report ' + v.id, 'visit');
      UI.closeModal();
      UI.toast(I18N.t('saved_ok'), 'success');
      render();
    });
  }

  function openDetails(v, clients, techs){
    if(!v) return;
    const client = clients.find(c=>c.id===v.clientId);
    const tech = techs.find(t=>t.id===v.techId);
    const hasRemote = v.remoteAccess && (v.remoteAccess.app || v.remoteAccess.code);
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="visit_details_title"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field"><label data-i18n="contract_client"></label><div>${client?client.name:'—'}</div></div>
          <div class="field"><label data-i18n="visit_technician"></label><div>${tech?tech.name:'—'}</div></div>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="visit_date"></label><div>${UI.fmtDate(v.date)} ${safeTime(v.time)}</div></div>
          <div class="field"><label data-i18n="visit_type"></label><div data-i18n="${typeLabelMap[v.type]||'issue_periodic'}"></div></div>
        </div>
        <div class="field"><label data-i18n="issue_desc"></label><div>${v.description||'—'}</div></div>
        <div class="field-row">
          <div class="field"><label data-i18n="contact_name"></label><div>${v.contactName||'—'}</div></div>
          <div class="field"><label data-i18n="contact_phone"></label><div>${v.contactPhone||'—'}</div></div>
        </div>
        <div class="field">
          <label data-i18n="remote_access_toggle"></label>
          ${hasRemote ? `
            <div class="field-row">
              <div class="field"><label data-i18n="remote_app_name"></label><div>${v.remoteAccess.app||'—'}</div></div>
              <div class="field"><label data-i18n="remote_access_code"></label><div>${v.remoteAccess.code||'—'}</div></div>
            </div>` : `<div class="text-muted" data-i18n="no_remote_access"></div>`}
        </div>
        ${v.photos && v.photos.length ? `<div class="field"><label data-i18n="attach_photos"></label><div style="display:flex; flex-wrap:wrap; gap:8px;">${v.photos.map(p=>{
          const src = typeof p === 'string' ? p : (p && p.data);
          return src ? `<a href="${src}" target="_blank" rel="noopener"><img src="${src}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--line);"></a>` : '';
        }).join('')}</div></div>` : ''}
        ${v.report ? `<div class="field"><label data-i18n="visit_report"></label><div style="white-space:pre-wrap;">${v.report}</div></div>` : ''}
        ${(v.techSignature && v.techSignature.length>1000) || (v.clientSignature && v.clientSignature.length>1000) ? `
        <div class="field-row">
          ${v.techSignature && v.techSignature.length>1000 ? `<div class="field"><label data-i18n="tech_signature"></label><img src="${v.techSignature}" style="max-height:80px; border:1px solid var(--line); border-radius:8px; padding:6px; background:#fff;"></div>` : ''}
          ${v.clientSignature && v.clientSignature.length>1000 ? `<div class="field"><label data-i18n="client_signature"></label><img src="${v.clientSignature}" style="max-height:80px; border:1px solid var(--line); border-radius:8px; padding:6px; background:#fff;"></div>` : ''}
        </div>` : ''}
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-primary" id="mClose2" data-i18n="close"></button>
      </div>
    `);
    I18N.apply(overlay);
    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mClose2').addEventListener('click', UI.closeModal);
  }

  function openAssign(visitId, techs){
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="assign_tech"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        <div class="field">
          <label data-i18n="visit_technician"></label>
          <select id="fTech">${techs.map(t=>`<option value="${t.id}">${t.name} — ${t.specialty||''}</option>`).join('')}</select>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button type="button" class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      DB.update('visits', visitId, { techId: overlay.querySelector('#fTech').value, status:'scheduled' });
      UI.closeModal(); UI.toast(I18N.t('saved_ok'),'success'); render();
    });
  }

  function openForm(visit){
    const editing = !!visit;
    const clients = DB.all('clients');
    const contracts = DB.all('contracts');
    const techs = DB.all('technicians');
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="${editing?'edit':'add_visit'}"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        <div class="field">
          <label data-i18n="contract_client"></label>
          <select id="fClient">${clients.map(c=>`<option value="${c.id}" ${editing && visit.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label data-i18n="related_contract"></label>
          <select id="fContract"></select>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="visit_date"></label><input type="date" id="fDate" value="${editing?visit.date:DB.todayISO()}"></div>
          <div class="field"><label data-i18n="preferred_time"></label><input type="time" id="fTime" value="${editing?(visit.time||'10:00'):'10:00'}"></div>
        </div>
        <div class="field">
          <label data-i18n="visit_type"></label>
          <select id="fType">
            <option value="periodic" data-i18n="issue_periodic" ${editing && visit.type==='periodic'?'selected':''}></option>
            <option value="fault" data-i18n="issue_fault" ${editing && visit.type==='fault'?'selected':''}></option>
            <option value="urgent" data-i18n="issue_urgent" ${editing && visit.type==='urgent'?'selected':''}></option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="visit_technician"></label>
          <select id="fTech"><option value="">—</option>${techs.map(t=>`<option value="${t.id}" ${editing && visit.techId===t.id?'selected':''}>${t.name}</option>`).join('')}</select>
        </div>
        ${editing ? `
        <div class="field">
          <label data-i18n="visit_status"></label>
          <select id="fStatus">
            <option value="requested" data-i18n="visit_requested" ${visit.status==='requested'?'selected':''}></option>
            <option value="scheduled" data-i18n="visit_scheduled" ${visit.status==='scheduled'?'selected':''}></option>
            <option value="ongoing" data-i18n="visit_ongoing" ${visit.status==='ongoing'?'selected':''}></option>
            <option value="done" data-i18n="visit_done" ${visit.status==='done'?'selected':''}></option>
            <option value="cancelled" data-i18n="visit_cancelled" ${visit.status==='cancelled'?'selected':''}></option>
          </select>
        </div>` : ''}
        <div class="field"><label data-i18n="issue_desc"></label><textarea id="fDesc">${editing?(visit.description||''):''}</textarea></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button type="button" class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    I18N.apply(overlay);
    const vClientSel = overlay.querySelector('#fClient');
    const vContractSel = overlay.querySelector('#fContract');
    function drawVisitContracts(){
      const relevant = contracts.filter(c=>c.clientId===vClientSel.value);
      vContractSel.innerHTML = relevant.map(c=>
        `<option value="${c.id}" ${editing && visit.contractId===c.id?'selected':''}>${c.id}</option>`
      ).join('');
    }
    drawVisitContracts();
    vClientSel.addEventListener('change', drawVisitContracts);
    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      const data = {
        contractId: overlay.querySelector('#fContract').value,
        clientId: overlay.querySelector('#fClient').value,
        techId: overlay.querySelector('#fTech').value || null,
        date: overlay.querySelector('#fDate').value,
        time: overlay.querySelector('#fTime').value,
        type: overlay.querySelector('#fType').value,
        description: overlay.querySelector('#fDesc').value.trim(),
      };
      if(editing){
        data.status = overlay.querySelector('#fStatus').value;
        DB.update('visits', visit.id, data);
        DB.logActivity('تم تعديل الزيارة ' + visit.id, 'Visit updated ' + visit.id, 'visit');
      } else {
        data.id = 'V-' + (5000 + DB.all('visits').length + 1);
        data.status = 'scheduled';
        DB.insert('visits', data);
        DB.logActivity('تمت جدولة زيارة جديدة ' + data.id, 'New visit scheduled ' + data.id, 'visit');
      }
      UI.closeModal(); UI.toast(I18N.t('saved_ok'),'success'); render();
    });
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
