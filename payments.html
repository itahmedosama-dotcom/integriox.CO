<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Payments</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191o">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191o"></script>
<script src="assets/js/lists.js?v=202607191o"></script>
<script src="assets/js/config.js?v=202607191o"></script>
<script src="assets/js/db.js?v=202607191o"></script>
<script src="assets/js/billing.js?v=202607191o"></script>
<script src="assets/js/auth.js?v=202607191o"></script>
<script src="assets/js/ui.js?v=202607191o"></script>
<script src="assets/js/layout.js?v=202607191o"></script>
<script>
const ctx = LAYOUT.render('payments');
if(ctx && LAYOUT.guardRoles(ctx, ['admin','client'])){
  const { user, contentEl } = ctx;
  const isAdmin = user.role === 'admin';
  let proofFile = null;

  const statusBadge = { review:'badge-warning', confirmed:'badge-success', rejected:'badge-danger', not_paid:'badge-danger' };
  const execStatusBadge = { pending:'badge-warning', in_progress:'badge-info', done:'badge-success', cancelled:'badge-mute' };
  const methodLabel = { bank:'method_bank', cash:'method_cash', other:'method_other' };

  function render(){
    let payments = DB.all('payments');
    if(!isAdmin) payments = payments.filter(p=>p.clientId===user.clientId);
    const clients = DB.all('clients');
    const contracts = DB.all('contracts');
    const jobOrders = DB.all('jobOrders');

    contentEl.innerHTML = `
      <div class="filters-bar">
        <select id="statusFilter">
          <option value="" data-i18n="all"></option>
          <option value="review" data-i18n="pay_review"></option>
          <option value="confirmed" data-i18n="pay_confirmed"></option>
          <option value="not_paid" data-i18n="pay_not_paid"></option>
          <option value="rejected" data-i18n="pay_rejected"></option>
        </select>
        ${isAdmin ? `<button type="button" class="btn btn-outline" id="bulkReminderBtn">💬 <span data-i18n="bulk_remind_overdue"></span></button>` : ''}
        ${isAdmin ? `<button type="button" class="btn btn-primary" id="addBtn" data-i18n="add_payment"></button>` : ''}
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th data-i18n="payment_date"></th><th data-i18n="contract_client"></th><th data-i18n="contract_id"></th>
              <th data-i18n="payment_amount"></th><th data-i18n="payment_method"></th><th data-i18n="attach_proof"></th>
              <th data-i18n="payment_status_col"></th><th data-i18n="job_exec_status"></th><th data-i18n="actions"></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state hidden"><div data-i18n="no_data"></div></div>
      </div>
    `;
    I18N.apply(contentEl);
    const rowsEl = contentEl.querySelector('#rows');

    function draw(){
      const st = contentEl.querySelector('#statusFilter').value;
      const list = payments.filter(p=> !st || p.status===st).sort((a,b)=>b.date.localeCompare(a.date));
      contentEl.querySelector('#emptyState').classList.toggle('hidden', list.length>0);
      rowsEl.innerHTML = list.map(p=>{
        const client = clients.find(c=>c.id===p.clientId);
        const displayName = client ? client.name : (p.clientName || '—');
        const displayPhone = client ? client.phone : (p.clientPhone || '');
        const contract = contracts.find(c=>c.id===p.contractId);
        const jobOrder = p.jobOrderId ? jobOrders.find(j=>j.id===p.jobOrderId) : null;
        const dueDateText = contract && contract.paymentDueDay
          ? (I18N.getLang()==='ar' ? `يوم ${contract.paymentDueDay} من كل شهر` : `day ${contract.paymentDueDay} of every month`)
          : UI.fmtDate(p.date);
        const waHref = displayPhone ? (()=>{
          const phone = displayPhone.replace(/^0/, '966').replace(/\D/g,'');
          const refSafe = UI.ltrToken(p.contractId || p.jobOrderId || '—');
          const text = encodeURIComponent(I18N.getLang()==='ar'
            ? (p.jobOrderId
                ? `\u200Fمرحبًا ${displayName} | طلب حل مشكلة برقم ${refSafe} | نود تذكيركم بموعد سداد مستحقات الطلب لتنفيذ الخدمة | علمًا بأن تاريخ السداد المستحق هو ${UI.fmtDate(p.date)}`
                : `\u200Fمرحبًا ${displayName} | العقد رقم ${refSafe} | نود تذكيركم بموعد سداد مستحقات عقد الصيانة | علمًا بأن تاريخ السداد المستحق هو ${dueDateText}`)
            : (p.jobOrderId
                ? `Hello ${displayName} | Service request No. ${p.jobOrderId} | This is a reminder about the payment due for this service request | The due date is ${UI.fmtDate(p.date)}`
                : `Hello ${displayName} | Contract No. ${p.contractId||'—'} | This is a reminder about your maintenance contract payment | The due date is ${dueDateText}`));
          return `https://wa.me/${phone}?text=${text}`;
        })() : null;
        return `<tr>
          <td>${UI.fmtDate(p.date)}</td>
          <td>${displayName}</td>
          <td>${p.contractId || p.jobOrderId || '—'}</td>
          <td><strong>${UI.fmtMoney(p.amount)}</strong></td>
          <td><span data-i18n="${methodLabel[p.method]}"></span></td>
          <td>${p.proofData ? `<button type="button" class="btn btn-sm btn-outline" data-proof="${p.id}" data-i18n="view_document"></button>` : (p.proofName ? `📎 ${p.proofName}` : '—')}</td>
          <td><span class="badge ${statusBadge[p.status]}" data-i18n="pay_${p.status}"></span></td>
          <td>${jobOrder ? `<span class="badge ${execStatusBadge[jobOrder.execStatus]||'badge-mute'}" data-i18n="job_status_${jobOrder.execStatus||'pending'}"></span>` : '—'}</td>
          <td class="row-actions">
            <a class="btn btn-sm btn-outline" href="payment-template.html?id=${p.id}" data-i18n="print_receipt_action"></a>
            ${isAdmin && p.status==='review' ? `
              <button type="button" class="btn btn-sm btn-accent" data-confirm="${p.id}" data-i18n="confirm_payment"></button>
              <button type="button" class="btn btn-sm btn-danger" data-reject="${p.id}" data-i18n="reject_payment"></button>` : ''}
            ${isAdmin ? (waHref
              ? `<a class="btn btn-sm btn-outline" href="${waHref}" target="_blank" rel="noopener" title="WhatsApp">💬</a>`
              : `<button type="button" class="btn btn-sm btn-outline" data-wa-missing="${p.clientId}" title="WhatsApp">💬</button>`) : ''}
            ${isAdmin ? `<button type="button" class="btn btn-sm btn-outline" data-edit="${p.id}" data-i18n="edit"></button>` : ''}
            ${isAdmin ? `<button type="button" class="btn btn-sm btn-danger" data-del="${p.id}" data-i18n="delete"></button>` : ''}
          </td>
        </tr>`;
      }).join('');
      I18N.apply(rowsEl);
      rowsEl.querySelectorAll('[data-confirm]').forEach(b=>b.addEventListener('click', ()=>{
        const payment = payments.find(p=>p.id===b.dataset.confirm);
        DB.update('payments', b.dataset.confirm, { status:'confirmed' });
        DB.logActivity('تم تأكيد الدفعة ' + b.dataset.confirm, 'Payment confirmed ' + b.dataset.confirm, 'payment');
        if(payment && !payment.invoiceId){
          const invoice = {
            id: DB.nextSeqId('INV', 'invoices'),
            contractId: payment.contractId, jobOrderId: payment.jobOrderId || null, clientId: payment.clientId,
            clientName: payment.clientName || null, clientPhone: payment.clientPhone || null,
            amount: payment.amount, date: DB.todayISO(), status: 'paid',
            description: payment.contractId
              ? BILLING.invoiceDescription(payment.contractId, payment.date, payment.id)
              : `${payment.description || ''} — ${I18N.t('job_payment_desc_voucher_suffix')} ${payment.id}`,
            createdAt: DB.todayISO(),
          };
          DB.insert('invoices', invoice);
          DB.update('payments', payment.id, { invoiceId: invoice.id });
          DB.logActivity('تم إصدار فاتورة مؤكدة تلقائيًا للدفعة ' + payment.id, 'Auto-issued confirmed invoice for payment ' + payment.id, 'invoice');
        }
        UI.toast(I18N.t('saved_ok'),'success'); render();
      }));
      rowsEl.querySelectorAll('[data-reject]').forEach(b=>b.addEventListener('click', ()=>{
        DB.update('payments', b.dataset.reject, { status:'rejected' });
        UI.toast(I18N.t('saved_ok'),'success'); render();
      }));
      rowsEl.querySelectorAll('[data-wa-missing]').forEach(b=>b.addEventListener('click', ()=>{
        UI.toast(I18N.t('client_no_phone'), 'error');
      }));
      rowsEl.querySelectorAll('[data-proof]').forEach(b=>b.addEventListener('click', ()=>{
        openProofViewer(payments.find(p=>p.id===b.dataset.proof));
      }));
      rowsEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openForm(clients, contracts, payments.find(p=>p.id===b.dataset.edit))));
      rowsEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        const payment = payments.find(p=>p.id===b.dataset.del);
        if(payment && payment.invoiceId){
          UI.toast(I18N.t('err_payment_has_invoice'), 'error');
          return;
        }
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          DB.remove('payments', b.dataset.del);
          DB.logActivity('تم حذف الدفعة ' + b.dataset.del, 'Payment deleted ' + b.dataset.del, 'payment');
          UI.toast(I18N.t('deleted_ok'), 'success'); render();
        });
      }));
    }
    contentEl.querySelector('#statusFilter').addEventListener('change', draw);
    if(isAdmin){
      contentEl.querySelector('#addBtn').addEventListener('click', ()=>openForm(clients, contracts));
      contentEl.querySelector('#bulkReminderBtn').addEventListener('click', sendBulkReminders);
    }
    draw();
  }

  function sendBulkReminders(){
    const overdue = BILLING.overdueInvoices();
    if(!overdue.length){ UI.toast(I18N.t('no_overdue_to_remind'), 'success'); return; }
    const clients = DB.all('clients');
    const contracts = DB.all('contracts');
    const byClient = {};
    overdue.forEach(i=>{ if(!byClient[i.clientId]) byClient[i.clientId] = []; byClient[i.clientId].push(i); });
    const targets = Object.keys(byClient).map(cid=>clients.find(c=>c.id===cid)).filter(c=>c && c.phone);
    if(!targets.length){ UI.toast(I18N.t('no_overdue_to_remind'), 'success'); return; }
    UI.confirmAction(I18N.t('bulk_remind_confirm').replace('{count}', targets.length), ()=>{
      targets.forEach((client, idx)=>{
        setTimeout(()=>{
          const firstInvoice = byClient[client.id][0];
          const contract = contracts.find(c=>c.id===firstInvoice.contractId);
          const contractLabel = firstInvoice.contractId || firstInvoice.jobOrderId || '—';
          const dueDateText = contract && contract.paymentDueDay
            ? (I18N.getLang()==='ar' ? `يوم ${contract.paymentDueDay} من كل شهر` : `day ${contract.paymentDueDay} of every month`)
            : UI.fmtDate(firstInvoice.date);
          const phone = client.phone.replace(/^0/, '966').replace(/\D/g,'');
          const contractLabelSafe = UI.ltrToken(contractLabel);
          const text = encodeURIComponent(I18N.getLang()==='ar'
            ? (firstInvoice.jobOrderId
                ? `\u200Fمرحبًا ${client.name} | طلب حل مشكلة برقم ${contractLabelSafe} | نود تذكيركم بموعد سداد مستحقات الطلب لتنفيذ الخدمة | علمًا بأن تاريخ السداد المستحق هو ${dueDateText}`
                : `\u200Fمرحبًا ${client.name} | العقد رقم ${contractLabelSafe} | نود تذكيركم بموعد سداد مستحقات عقد الصيانة | علمًا بأن تاريخ السداد المستحق هو ${dueDateText}`)
            : (firstInvoice.jobOrderId
                ? `Hello ${client.name} | Service request No. ${contractLabel} | This is a reminder about the payment due for this service request | The due date is ${dueDateText}`
                : `Hello ${client.name} | Contract No. ${contractLabel} | This is a reminder about your maintenance contract payment | The due date is ${dueDateText}`));
          window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        }, idx * 400); // stagger so the browser doesn't block a burst of popups
      });
      DB.logActivity('تم إرسال تذكيرات جماعية لـ ' + targets.length + ' عميل', 'Sent bulk reminders to ' + targets.length + ' clients', 'payment');
    });
  }

  function openProofViewer(p){
    if(!p || !p.proofData) return;
    const isPdf = /^data:application\/pdf/.test(p.proofData) || /\.pdf$/i.test(p.proofName||'');
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="attach_proof"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body" style="text-align:center;">
        ${isPdf
          ? `<iframe src="${p.proofData}" style="width:100%; height:60vh; border:1px solid var(--line); border-radius:8px;"></iframe>`
          : `<img src="${p.proofData}" style="max-width:100%; max-height:60vh; border-radius:8px;">`}
        <div class="text-muted" style="margin-top:10px; font-size:12.5px;">${p.proofName||''}</div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-primary" id="mClose2" data-i18n="close"></button>
      </div>
    `);
    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mClose2').addEventListener('click', UI.closeModal);
  }

  function openForm(clients, contracts, payment){
    proofFile = null;
    const editing = !!payment;
    const relevantContracts = isAdmin ? contracts : contracts.filter(c=>c.clientId===user.clientId);
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="${editing?'edit':'add_payment'}"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        ${isAdmin ? `
        <div class="field">
          <label data-i18n="contract_client"></label>
          <select id="fClient">${clients.map(c=>`<option value="${c.id}" ${editing && payment.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
        </div>`:''}
        <div class="field">
          <label data-i18n="related_contract"></label>
          <select id="fContract"></select>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="payment_amount"></label><input type="number" id="fAmount" min="0" value="${editing?payment.amount:''}"></div>
          <div class="field"><label data-i18n="payment_date"></label><input type="date" id="fDate" value="${editing?payment.date:DB.todayISO()}"></div>
        </div>
        <div class="field">
          <label data-i18n="payment_method"></label>
          <div class="radio-group">
            <label class="radio-card ${!editing || payment.method==='bank'?'active':''}"><input type="radio" name="fMethod" value="bank" ${!editing || payment.method==='bank'?'checked':''}><span data-i18n="method_bank"></span></label>
            <label class="radio-card ${editing && payment.method==='cash'?'active':''}"><input type="radio" name="fMethod" value="cash" ${editing && payment.method==='cash'?'checked':''}><span data-i18n="method_cash"></span></label>
            <label class="radio-card ${editing && payment.method==='other'?'active':''}"><input type="radio" name="fMethod" value="other" ${editing && payment.method==='other'?'checked':''}><span data-i18n="method_other"></span></label>
          </div>
        </div>
        ${editing ? `
        <div class="field">
          <label data-i18n="payment_status_col"></label>
          <select id="fStatus">
            <option value="review" data-i18n="pay_review" ${payment.status==='review'?'selected':''}></option>
            <option value="confirmed" data-i18n="pay_confirmed" ${payment.status==='confirmed'?'selected':''}></option>
            <option value="not_paid" data-i18n="pay_not_paid" ${payment.status==='not_paid'?'selected':''}></option>
            <option value="rejected" data-i18n="pay_rejected" ${payment.status==='rejected'?'selected':''}></option>
          </select>
        </div>` : ''}
        <div class="field">
          <label data-i18n="attach_proof"></label>
          <div class="file-drop" id="dropZone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5M12 3v12"/></svg>
            <div class="text-muted" style="font-size:12.5px;" data-i18n="proof_hint"></div>
          </div>
          <input type="file" id="fProof" accept="image/*,.pdf" class="hidden">
          <div id="proofPreview">${editing && payment.proofName ? `<div class="file-preview"><span>📎 ${payment.proofName}</span></div>` : ''}</div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button type="button" class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    I18N.apply(overlay);

    const contractSel0 = overlay.querySelector('#fContract');
    function drawPaymentContracts(){
      const cId = isAdmin ? overlay.querySelector('#fClient').value : user.clientId;
      const relevant = relevantContracts.filter(c=>c.clientId===cId);
      contractSel0.innerHTML = relevant.map(c=>
        `<option value="${c.id}" ${editing && payment.contractId===c.id?'selected':''}>${c.id}</option>`
      ).join('');
    }
    drawPaymentContracts();
    if(isAdmin) overlay.querySelector('#fClient').addEventListener('change', drawPaymentContracts);
    overlay.querySelectorAll('.radio-card').forEach(card=>{
      card.addEventListener('click', ()=>{
        const group = card.closest('.radio-group');
        group.querySelectorAll('.radio-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active');
        card.querySelector('input').checked = true;
      });
    });
    const dropZone = overlay.querySelector('#dropZone');
    const fileInput = overlay.querySelector('#fProof');
    const preview = overlay.querySelector('#proofPreview');
    dropZone.addEventListener('click', ()=>fileInput.click());
    fileInput.addEventListener('change', async ()=>{
      const file = fileInput.files[0];
      if(!file) return;
      proofFile = { name:file.name, data: await UI.fileToDataURL(file) };
      preview.innerHTML = `<div class="file-preview"><span>📎 ${file.name}</span><span class="rm" id="rmProof">✕</span></div>`;
      preview.querySelector('#rmProof').addEventListener('click', ()=>{ proofFile=null; preview.innerHTML=''; });
    });

    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      const contractSel = overlay.querySelector('#fContract');
      const clientId = isAdmin ? overlay.querySelector('#fClient').value : user.clientId;
      const amount = Number(overlay.querySelector('#fAmount').value||0);
      if(!amount){ UI.toast(I18N.t('err_required'), 'error'); return; }
      const data = {
        contractId: contractSel.value, clientId, amount,
        method: overlay.querySelector('input[name=fMethod]:checked').value,
        date: overlay.querySelector('#fDate').value,
        description: BILLING.paymentDescription(contractSel.value, overlay.querySelector('#fDate').value),
      };
      if(proofFile){ data.proofName = proofFile.name; data.proofData = proofFile.data; }
      if(editing){
        data.status = overlay.querySelector('#fStatus').value;
        DB.update('payments', payment.id, data);
        DB.logActivity('تم تعديل الدفعة ' + payment.id, 'Payment updated ' + payment.id, 'payment');
      } else {
        data.id = DB.nextSeqId('PAY', 'payments');
        data.status = 'review';
        if(!proofFile){ data.proofName = null; data.proofData = null; }
        DB.insert('payments', data);
        DB.logActivity('تم تسجيل دفعة جديدة ' + data.id, 'New payment recorded ' + data.id, 'payment');
      }
      UI.closeModal(); UI.toast(I18N.t('saved_ok'),'success'); render();
    });
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
