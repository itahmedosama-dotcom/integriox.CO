<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Contracts</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191ae">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191ae"></script>
<script src="assets/js/lists.js?v=202607191ae"></script>
<script src="assets/js/config.js?v=202607191ae"></script>
<script src="assets/js/db.js?v=202607191ae"></script>
<script src="assets/js/billing.js?v=202607191ae"></script>
<script src="assets/js/auth.js?v=202607191ae"></script>
<script src="assets/js/ui.js?v=202607191ae"></script>
<script src="assets/js/layout.js?v=202607191ae"></script>
<script>
const ctx = LAYOUT.render('contracts');
if(ctx){
  const { user, contentEl } = ctx;
  const isAdmin = user.role === 'admin';

  const statusBadge = { active:'badge-success', closed:'badge-mute', renewal:'badge-warning', cancelled:'badge-danger' };
  const typeLabel = { onsite:'type_onsite', remote:'type_remote', visits:'type_visits', all:'type_all' };

  function render(){
    let contracts = DB.all('contracts');
    if(!isAdmin) contracts = contracts.filter(c=>c.clientId===user.clientId);
    const clients = DB.all('clients');
    const qClientId = new URLSearchParams(window.location.search).get('client');
    const qClient = qClientId ? clients.find(c=>c.id===qClientId) : null;

    contentEl.innerHTML = `
      <div class="filters-bar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" data-i18n-ph="search" value="${qClient ? qClient.name : ''}">
        </div>
        <select id="statusFilter">
          <option value="" data-i18n="all"></option>
          <option value="active" data-i18n="status_active"></option>
          <option value="renewal" data-i18n="status_renewal"></option>
          <option value="closed" data-i18n="status_closed"></option>
          <option value="cancelled" data-i18n="status_cancelled"></option>
        </select>
        ${isAdmin ? `<button type="button" class="btn btn-primary" id="addBtn" data-i18n="add_contract"></button>` : ''}
      </div>
      ${isAdmin ? `<div id="contractsStats" class="grid grid-3" style="margin-bottom:18px;"></div>` : ''}
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th data-i18n="contract_id"></th><th data-i18n="contract_client"></th><th data-i18n="contract_amount"></th>
              <th data-i18n="contract_type"></th><th data-i18n="contract_duration"></th><th data-i18n="contract_start"></th><th data-i18n="contract_end"></th>
              <th data-i18n="contract_status"></th><th data-i18n="actions"></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state hidden"><div data-i18n="no_data"></div></div>
      </div>
    `;
    I18N.apply(contentEl);
    const rowsEl = contentEl.querySelector('#rows');

    function draw(){
      const f = (contentEl.querySelector('#searchInput').value||'').toLowerCase();
      const st = contentEl.querySelector('#statusFilter').value;
      const list = contracts.filter(c=>{
        const client = clients.find(x=>x.id===c.clientId);
        const matchesText = !f || c.id.toLowerCase().includes(f) || (client && client.name.toLowerCase().includes(f));
        const matchesStatus = !st || c.status===st;
        return matchesText && matchesStatus;
      });
      contentEl.querySelector('#emptyState').classList.toggle('hidden', list.length>0);

      // overview stats — always reflect ALL contracts, independent of the
      // current search/status filter, so they read as a stable summary.
      const statsEl = contentEl.querySelector('#contractsStats');
      if(statsEl){
        // clients by type, among clients who have at least one contract
        const clientTypeLabels = { contract:'client_type_contract', on_demand:'client_type_on_demand', both:'client_type_both', none:'client_type_none' };
        const clientIdsWithContracts = Array.from(new Set(contracts.map(c=>c.clientId)));
        const byClientType = {};
        clientIdsWithContracts.forEach(cid=>{
          const cl = clients.find(x=>x.id===cid);
          const t = (cl && cl.clientType) || 'none';
          byClientType[t] = (byClientType[t]||0) + 1;
        });

        // total contract amounts by contract type (grouped by currency too,
        // to avoid summing different currencies together)
        const byContractType = {};
        contracts.forEach(c=>{
          const t = c.contractType || 'all';
          const cur = c.currency || 'SAR';
          byContractType[t] = byContractType[t] || {};
          byContractType[t][cur] = (byContractType[t][cur]||0) + Number(c.amount||0);
        });

        const activeCount = contracts.filter(c=>c.status==='active').length;
        const inactiveCount = contracts.length - activeCount;
        const totalClientsWithContracts = clientIdsWithContracts.length;
        const totalByCurrency = {};
        contracts.forEach(c=>{
          const cur = c.currency || 'SAR';
          totalByCurrency[cur] = (totalByCurrency[cur]||0) + Number(c.amount||0);
        });
        const totalAmountText = Object.keys(totalByCurrency).length
          ? Object.keys(totalByCurrency).map(cur=>UI.fmtMoney(totalByCurrency[cur], cur)).join(' + ')
          : UI.fmtMoney(0);

        statsEl.innerHTML = `
          <div class="card">
            <h4 style="margin:0 0 12px; font-size:13px;" data-i18n="stats_clients_by_type"></h4>
            ${Object.keys(clientTypeLabels).map(t=>`
              <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:13px;">
                <span data-i18n="${clientTypeLabels[t]}"></span><strong>${byClientType[t]||0}</strong>
              </div>`).join('')}
            <div style="display:flex; justify-content:space-between; padding:9px 0 0; margin-top:4px; border-top:1px solid var(--line); font-size:13px;">
              <span data-i18n="stats_total"></span><strong>${totalClientsWithContracts}</strong>
            </div>
          </div>
          <div class="card">
            <h4 style="margin:0 0 12px; font-size:13px;" data-i18n="stats_amount_by_contract_type"></h4>
            ${Object.keys(byContractType).length ? Object.keys(byContractType).map(t=>`
              <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:13px;">
                <span data-i18n="${typeLabel[t]}"></span>
                <strong>${Object.keys(byContractType[t]).map(cur=>UI.fmtMoney(byContractType[t][cur], cur)).join(' + ')}</strong>
              </div>`).join('') : `<div class="text-muted" style="font-size:12.5px;">${I18N.t('no_data')}</div>`}
            <div style="display:flex; justify-content:space-between; padding:9px 0 0; margin-top:4px; border-top:1px solid var(--line); font-size:13px;">
              <span data-i18n="stats_total"></span><strong>${totalAmountText}</strong>
            </div>
          </div>
          <div class="card">
            <h4 style="margin:0 0 12px; font-size:13px;" data-i18n="stats_contracts_status"></h4>
            <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:13px;">
              <span data-i18n="stats_active_contracts"></span><strong style="color:var(--success);">${activeCount}</strong>
            </div>
            <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:13px;">
              <span data-i18n="stats_inactive_contracts"></span><strong style="color:var(--ink-mute);">${inactiveCount}</strong>
            </div>
            <div style="display:flex; justify-content:space-between; padding:5px 0; font-size:13px; border-top:1px solid var(--line); margin-top:4px; padding-top:9px;">
              <span data-i18n="contracts_count_label"></span><strong>${contracts.length}</strong>
            </div>
          </div>
        `;
        I18N.apply(statsEl);
      }

      rowsEl.innerHTML = list.map((c,idx)=>{
        const client = clients.find(x=>x.id===c.clientId);
        const renewalInfo = BILLING.contractsNearingRenewal().find(r=>r.id===c.id);
        const nearRenewal = !!renewalInfo;
        const daysLeft = renewalInfo ? renewalInfo.daysLeft : null;
        const visitsLeftText = (nearRenewal && renewalInfo.visitsRemaining !== null) ? ` · ${I18N.t('visits_remaining')}: ${renewalInfo.visitsRemaining}` : '';
        return `<tr ${nearRenewal ? 'class="row-flash" style="background:var(--warning-bg);"' : ''}>
          <td class="text-muted">${idx+1}</td>
          <td><strong>${c.id}</strong></td>
          <td>${client?client.name:'—'}</td>
          <td>${UI.fmtMoney(c.amount, c.currency)}</td>
          <td><span data-i18n="${typeLabel[c.contractType]}"></span></td>
          <td>${c.durationMonths} <span data-i18n="months"></span> · <span data-i18n="${c.periodType==='open'?'period_open':'period_fixed'}"></span></td>
          <td>${UI.fmtDate(c.startDate)}</td>
          <td>${c.endDate ? UI.fmtDate(c.endDate) : '—'}</td>
          <td>
            <span class="badge ${statusBadge[c.status]}" data-i18n="status_${c.status==='active'?'active':c.status}"></span>
            ${nearRenewal ? `<span class="badge" style="background:#F5C244; color:#5a3d00;">⚠️ ${I18N.t('contract_renewal_soon')} (${daysLeft} ${I18N.t('days_late')})${visitsLeftText}</span>` : ''}
          </td>
          <td class="row-actions">
            <a class="btn btn-sm btn-outline" href="contract-template.html?id=${c.id}" title="${I18N.t('view_contract')}">👁️</a>
            ${isAdmin ? (()=>{
              const cl = clients.find(x=>x.id===c.clientId);
              if(!cl || !cl.phone) return '';
              return `<button type="button" class="btn btn-sm btn-outline" data-wa-contract="${c.id}" title="WhatsApp">💬</button>`;
            })() : ''}
            ${isAdmin?`<button type="button" class="btn btn-sm btn-outline" data-edit="${c.id}" title="${I18N.t('edit')}">✏️</button>`:''}
            ${isAdmin?`<button type="button" class="btn btn-sm btn-danger" data-del="${c.id}" title="${I18N.t('delete')}">🗑️</button>`:''}
          </td>
        </tr>`;
      }).join('');
      I18N.apply(rowsEl);
      rowsEl.querySelectorAll('[data-wa-contract]').forEach(b=>b.addEventListener('click', ()=>{
        try{
          const c = contracts.find(x=>x.id===b.dataset.waContract);
          const cl = clients.find(x=>x.id===c.clientId);
          if(!c || !cl || !cl.phone) return;
          const phone = String(cl.phone).replace(/^0/, '966').replace(/\D/g,'');
          const token = DB.ensurePublicToken('contracts', c.id, 'signToken');
          const link = window.location.origin + window.location.pathname.replace('contracts.html','') + 'contract-sign.html?id=' + c.id + '&token=' + token;
          const idSafe = UI.ltrToken(c.id);
          const text = encodeURIComponent(I18N.getLang()==='ar'
            ? `\u200Fمرحبًا ${cl.name} | مرفق رابط عقد الصيانة رقم ${idSafe} للاطلاع والتوقيع الإلكتروني | ${link}`
            : `Hello ${cl.name} | Here is the link to maintenance contract ${c.id} for review and e-signature | ${link}`);
          UI.sendWhatsApp(phone, text);
        }catch(err){
          UI.toast(I18N.t('wa_send_error') + (err && err.message ? (': ' + err.message) : ''), 'error');
        }
      }));
      rowsEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openForm(clients, contracts.find(c=>c.id===b.dataset.edit))));
      rowsEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          const target = contracts.find(c=>c.id===b.dataset.del);
          DB.remove('contracts', b.dataset.del);
          DB.logActivity('تم حذف العقد ' + b.dataset.del, 'Contract deleted ' + b.dataset.del, 'contract');
          UI.toast(I18N.t('deleted_ok'),'success'); render();
        });
      }));
    }

    contentEl.querySelector('#searchInput').addEventListener('input', draw);
    contentEl.querySelector('#statusFilter').addEventListener('change', draw);
    if(isAdmin) contentEl.querySelector('#addBtn').addEventListener('click', ()=>openForm(clients));
    draw();
  }

  function openForm(clients, contract){
    const editing = !!contract;
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="${editing?'edit':'add_contract'}"></h3><button type="button" class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        <h4 style="margin:0 0 12px; font-size:12.5px; color:var(--ink-mute); text-transform:uppercase; letter-spacing:.5px;" data-i18n="contract_section_basic"></h4>
        <div class="field">
          <label data-i18n="contract_client"></label>
          <select id="fClient">${clients.filter(c => c.clientType==='contract' || c.clientType==='both' || (editing && contract.clientId===c.id)).map(c=>`<option value="${c.id}" ${editing && contract.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
          <p class="hint" data-i18n="contract_client_filter_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="contract_amount"></label><input type="number" id="fAmount" min="0" value="${editing?contract.amount:''}"></div>
          <div class="field">
            <label data-i18n="contract_currency"></label>
            <div style="display:flex; gap:8px;">
              <select id="fCurrency" style="flex:1;"></select>
              <button type="button" class="btn btn-outline btn-sm" id="addCurrencyBtn">+</button>
            </div>
          </div>
        </div>
        <h4 style="margin:18px 0 12px; font-size:12.5px; color:var(--ink-mute); text-transform:uppercase; letter-spacing:.5px;" data-i18n="contract_section_period"></h4>
        <div class="field">
          <label data-i18n="contract_duration"></label>
          <input type="number" id="fDuration" min="1" value="${editing?contract.durationMonths:12}">
          <p class="hint" data-i18n="contract_duration_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field">
          <label data-i18n="contract_period_type"></label>
          <div class="radio-group">
            <label class="radio-card ${!editing || contract.periodType==='fixed'?'active':''}"><input type="radio" name="fPeriod" value="fixed" ${!editing || contract.periodType==='fixed'?'checked':''}><span data-i18n="period_fixed"></span></label>
            <label class="radio-card ${editing && contract.periodType==='open'?'active':''}"><input type="radio" name="fPeriod" value="open" ${editing && contract.periodType==='open'?'checked':''}><span data-i18n="period_open"></span></label>
          </div>
        </div>
        <div class="field" id="renewalNoticeWrap" style="${editing && contract.periodType==='open' ? 'display:none;' : ''}">
          <label data-i18n="renewal_notice_days"></label>
          <input type="number" id="fRenewalNotice" min="1" value="${editing?(contract.renewalNoticeDays||60):60}">
          <p class="hint" data-i18n="renewal_notice_days_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field">
          <label data-i18n="contract_type"></label>
          <select id="fType">
            <option value="all" data-i18n="type_all" ${editing && contract.contractType==='all'?'selected':''}></option>
            <option value="onsite" data-i18n="type_onsite" ${editing && contract.contractType==='onsite'?'selected':''}></option>
            <option value="remote" data-i18n="type_remote" ${editing && contract.contractType==='remote'?'selected':''}></option>
            <option value="visits" data-i18n="type_visits" ${editing && contract.contractType==='visits'?'selected':''}></option>
          </select>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="contract_start"></label><input type="date" id="fStart" value="${editing?contract.startDate:DB.todayISO()}"></div>
          <div class="field"><label data-i18n="contract_end"></label><input type="date" id="fEnd" value="${editing?(contract.endDate||''):''}"></div>
        </div>
        <div class="field">
          <label data-i18n="visit_frequency"></label>
          <select id="fFrequency">
            <option value="weekly" data-i18n="freq_weekly" ${editing && contract.visitFrequency==='weekly'?'selected':''}></option>
            <option value="monthly" data-i18n="freq_monthly" ${!editing || !contract || !contract.visitFrequency || contract.visitFrequency==='monthly'?'selected':''}></option>
            <option value="bimonthly" data-i18n="freq_bimonthly" ${editing && contract.visitFrequency==='bimonthly'?'selected':''}></option>
            <option value="quarterly" data-i18n="freq_quarterly" ${editing && contract.visitFrequency==='quarterly'?'selected':''}></option>
            <option value="custom" data-i18n="freq_custom" ${editing && contract.visitFrequency==='custom'?'selected':''}></option>
          </select>
          <p class="hint" data-i18n="visit_frequency_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field">
          <label data-i18n="contract_visits_total"></label>
          <div style="display:flex; gap:10px; align-items:center;">
            <input type="number" id="fVisits" min="0" value="${editing?(contract.visitsTotal||0):12}" style="flex:1;" ${editing && contract.visitsUnlimited?'disabled':''}>
            <label style="display:flex; align-items:center; gap:6px; white-space:nowrap; cursor:pointer;">
              <input type="checkbox" id="fVisitsUnlimited" style="width:auto;" ${editing && contract.visitsUnlimited?'checked':''}>
              <span data-i18n="visits_unlimited"></span>
            </label>
          </div>
        </div>
        <div class="field">
          <label data-i18n="payment_terms"></label>
          <div class="radio-group">
            <label class="radio-card ${!editing || contract.paymentTerms==='upfront'?'active':''}"><input type="radio" name="fPay" value="upfront" ${!editing || contract.paymentTerms==='upfront'?'checked':''}><span data-i18n="pay_upfront"></span></label>
            <label class="radio-card ${editing && contract.paymentTerms==='deferred'?'active':''}"><input type="radio" name="fPay" value="deferred" ${editing && contract.paymentTerms==='deferred'?'checked':''}><span data-i18n="pay_deferred"></span></label>
          </div>
        </div>
        <h4 style="margin:6px 0 12px; font-size:12.5px; color:var(--ink-mute); text-transform:uppercase; letter-spacing:.5px;" data-i18n="contract_section_payment"></h4>
        <div class="field ${editing && contract.paymentTerms==='deferred' ? 'hidden' : ''}" id="upfrontDueWrap">
          <label data-i18n="upfront_due_date"></label>
          <input type="date" id="fUpfrontDue" value="${editing?(contract.upfrontDueDate||DB.todayISO()):DB.todayISO()}">
          <p class="hint" data-i18n="upfront_due_date_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field ${editing && contract.paymentTerms==='deferred' ? '' : 'hidden'}" id="dueDayWrap">
          <label data-i18n="billing_cycle"></label>
          <div class="radio-group" style="margin-bottom:12px;">
            <label class="radio-card ${!editing || (contract.billingCycle||'monthly')==='monthly'?'active':''}"><input type="radio" name="fCycle" value="monthly" ${!editing || (contract.billingCycle||'monthly')==='monthly'?'checked':''}><span data-i18n="cycle_monthly"></span></label>
            <label class="radio-card ${editing && contract.billingCycle==='yearly'?'active':''}"><input type="radio" name="fCycle" value="yearly" ${editing && contract.billingCycle==='yearly'?'checked':''}><span data-i18n="cycle_yearly"></span></label>
          </div>
          <label data-i18n="payment_due_day"></label>
          <input type="number" id="fDueDay" min="1" max="28" value="${editing?(contract.paymentDueDay||1):1}">
          <p class="hint" data-i18n="payment_due_day_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field">
          <label data-i18n="contract_taxes"></label>
          <div id="taxCheckboxes" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
          <p class="hint" data-i18n="select_taxes_hint" style="margin-top:6px;"></p>
        </div>
        <div class="field">
          <label data-i18n="agreement_details"></label>
          <textarea id="fAgreementDetails" style="min-height:90px;">${editing?(contract.agreementDetails||''):''}</textarea>
          <p class="hint" data-i18n="agreement_details_hint" style="margin-top:4px;"></p>
        </div>
        ${editing ? `
        <div class="field">
          <label data-i18n="contract_status"></label>
          <select id="fStatus">
            <option value="active" data-i18n="status_active" ${contract.status==='active'?'selected':''}></option>
            <option value="renewal" data-i18n="status_renewal" ${contract.status==='renewal'?'selected':''}></option>
            <option value="closed" data-i18n="status_closed" ${contract.status==='closed'?'selected':''}></option>
            <option value="cancelled" data-i18n="status_cancelled" ${contract.status==='cancelled'?'selected':''}></option>
          </select>
        </div>` : ''}
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button type="button" class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    I18N.apply(overlay);

    const currencySelect = overlay.querySelector('#fCurrency');
    function drawCurrencies(selected){
      const currencies = DB.getSettings().currencies || [];
      currencySelect.innerHTML = currencies.map(c=>`
        <option value="${c.code}" ${c.code===(selected||'SAR')?'selected':''}>
          ${c.code} — ${I18N.getLang()==='ar'?c.nameAr:c.nameEn}
        </option>`).join('');
    }
    drawCurrencies(editing ? (contract.currency||'SAR') : 'SAR');
    overlay.querySelector('#addCurrencyBtn').addEventListener('click', ()=>{
      const code = (window.prompt(I18N.t('currency_code_prompt'))||'').trim().toUpperCase();
      if(!code) return;
      const currencies = DB.getSettings().currencies || [];
      if(currencies.some(c=>c.code===code)){ drawCurrencies(code); return; }
      const nameAr = (window.prompt(I18N.t('currency_name_prompt'))||code).trim();
      const symbol = (window.prompt(I18N.t('currency_symbol_prompt'))||code).trim();
      const updated = currencies.concat([{ code, nameAr, nameEn:nameAr, symbol }]);
      DB.saveSettings({ currencies: updated });
      DB.logActivity('تمت إضافة عملة جديدة ' + code, 'New currency added ' + code, 'settings');
      drawCurrencies(code);
    });

    const enabledTaxes = (DB.getSettings().taxes || []).filter(t=>t.enabled);
    const taxBox = overlay.querySelector('#taxCheckboxes');
    function currentCurrencyCountry(){
      const cur = (DB.getSettings().currencies || []).find(c=>c.code===currencySelect.value);
      return cur ? cur.country : '';
    }
    function drawTaxes(selectedTaxIds){
      if(!enabledTaxes.length){
        taxBox.innerHTML = `<span class="text-muted" style="font-size:12.5px;" data-i18n="contract_no_tax"></span>`;
        I18N.apply(taxBox);
        return;
      }
      const matchCountry = currentCurrencyCountry();
      taxBox.innerHTML = enabledTaxes.map(t=>{
        const isMatch = matchCountry && t.countryAr === matchCountry;
        return `<label style="display:flex; align-items:center; gap:6px; border:1.5px solid ${isMatch?'var(--blue)':'var(--line)'}; background:${isMatch?'var(--sky-50)':'transparent'}; border-radius:99px; padding:6px 12px; cursor:pointer; font-size:12.5px;">
          <input type="checkbox" value="${t.id}" style="width:auto;" ${selectedTaxIds.includes(t.id)?'checked':''}>
          ${I18N.getLang()==='ar' ? t.countryAr : (t.countryEn||t.countryAr)} — ${t.nameAr} ${t.rate}%
        </label>`;
      }).join('');
    }
    // initial render keeps whatever the contract already had saved (or
    // nothing, for a new contract)
    drawTaxes(editing ? (contract.taxIds||[]) : []);
    // ...but changing the currency re-suggests the matching country's tax
    // automatically — the admin can still tick/untick anything manually.
    currencySelect.addEventListener('change', ()=>{
      const matchCountry = currentCurrencyCountry();
      const autoSelected = matchCountry ? enabledTaxes.filter(t=>t.countryAr===matchCountry).map(t=>t.id) : [];
      drawTaxes(autoSelected);
    });

    const dueDayWrap = overlay.querySelector('#dueDayWrap');
    const upfrontDueWrap = overlay.querySelector('#upfrontDueWrap');

    const visitsInput = overlay.querySelector('#fVisits');
    const frequencySelect = overlay.querySelector('#fFrequency');
    const durationInput = overlay.querySelector('#fDuration');
    const visitsPerMonth = { weekly:4, monthly:1, bimonthly:0.5, quarterly:1/3 };
    function recalcVisits(){
      const freq = frequencySelect.value;
      if(freq === 'custom') return; // admin controls the number directly
      const months = Number(durationInput.value || 0);
      visitsInput.value = Math.max(0, Math.round(months * (visitsPerMonth[freq] || 1)));
    }
    frequencySelect.addEventListener('change', recalcVisits);
    durationInput.addEventListener('input', recalcVisits);
    if(!editing) recalcVisits(); // seed the default (monthly × 12 months) right away
    overlay.querySelector('#fVisitsUnlimited').addEventListener('change', (e)=>{
      visitsInput.disabled = e.target.checked;
    });
    overlay.querySelectorAll('.radio-card').forEach(card=>{
      card.addEventListener('click', ()=>{
        const group = card.closest('.radio-group');
        group.querySelectorAll('.radio-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active');
        const input = card.querySelector('input');
        input.checked = true;
        if(input.name === 'fPay'){
          dueDayWrap.classList.toggle('hidden', input.value !== 'deferred');
          upfrontDueWrap.classList.toggle('hidden', input.value !== 'upfront');
        }
        if(input.name === 'fPeriod'){
          overlay.querySelector('#renewalNoticeWrap').style.display = input.value === 'open' ? 'none' : '';
        }
      });
    });
    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      const visitsUnlimited = overlay.querySelector('#fVisitsUnlimited').checked;
      const payTerms = overlay.querySelector('input[name=fPay]:checked').value;
      const cycleInput = overlay.querySelector('input[name=fCycle]:checked');
      const taxIds = Array.from(taxBox.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.value);
      const data = {
        clientId: overlay.querySelector('#fClient').value,
        amount: Number(overlay.querySelector('#fAmount').value||0),
        currency: currencySelect.value,
        durationMonths: Number(overlay.querySelector('#fDuration').value||12),
        periodType: overlay.querySelector('input[name=fPeriod]:checked').value,
        renewalNoticeDays: Number(overlay.querySelector('#fRenewalNotice').value || 60),
        contractType: overlay.querySelector('#fType').value,
        startDate: overlay.querySelector('#fStart').value,
        endDate: overlay.querySelector('#fEnd').value,
        visitsTotal: visitsUnlimited ? null : Number(visitsInput.value||0),
        visitFrequency: frequencySelect.value,
        visitsUnlimited,
        paymentTerms: payTerms,
        billingCycle: payTerms==='deferred' ? (cycleInput ? cycleInput.value : 'monthly') : null,
        upfrontDueDate: payTerms==='upfront' ? overlay.querySelector('#fUpfrontDue').value : null,
        agreementDetails: overlay.querySelector('#fAgreementDetails').value.trim(),
        paymentDueDay: payTerms==='deferred' ? Number(overlay.querySelector('#fDueDay').value||1) : null,
        taxIds,
      };
      if(editing){
        data.status = overlay.querySelector('#fStatus').value;
        DB.update('contracts', contract.id, data);
        DB.logActivity('تم تعديل العقد ' + contract.id, 'Contract updated ' + contract.id, 'contract');
      } else {
        data.id = 'CT-' + (1001 + DB.all('contracts').length);
        data.visitsUsed = 0;
        data.status = 'active';
        data.signature = null;
        data.createdAt = DB.todayISO();
        DB.insert('contracts', data);
        DB.logActivity('تم إنشاء عقد جديد رقم ' + data.id, 'New contract created: ' + data.id, 'contract');
        DB.markClientType(data.clientId, 'contract');

        // Every new contract's first charge goes to Payments for
        // confirmation — confirming it there is what actually issues the
        // invoice (see payments.html). Nothing reaches Invoices on its own.
        if(data.paymentTerms === 'upfront' && data.amount > 0){
          const dueDate = data.upfrontDueDate || DB.todayISO();
          const payment = {
            id: DB.nextSeqId('PAY', 'payments'),
            contractId: data.id, clientId: data.clientId,
            amount: data.amount, method: 'bank', date: dueDate, status: 'review',
            description: BILLING.paymentDescription(data.id, dueDate),
          };
          DB.insert('payments', payment);
          DB.logActivity('تم إنشاء دفعة بانتظار التأكيد للعقد ' + data.id, 'Pending payment created for contract ' + data.id, 'payment');
        } else if(data.paymentTerms === 'deferred' && data.amount > 0){
          const months = Number(data.durationMonths || 12) || 12;
          const perMonth = Number(data.amount||0) / months;
          const cycle = data.billingCycle === 'yearly' ? 'yearly' : 'monthly';
          const firstAmount = Math.round(perMonth * (cycle==='yearly' ? 12 : 1) * 100) / 100;
          const periodKey = cycle==='yearly' ? String(new Date().getFullYear()) : DB.todayISO().slice(0,7);
          if(firstAmount > 0){
            const payment = {
              id: DB.nextSeqId('PAY', 'payments'),
              contractId: data.id, clientId: data.clientId,
              amount: firstAmount, method: 'bank', date: DB.todayISO(), status: 'review',
              description: BILLING.paymentDescription(data.id, DB.todayISO()),
            };
            DB.insert('payments', payment);
            DB.logActivity('تم إنشاء أول دفعة دورية بانتظار التأكيد للعقد ' + data.id, 'First recurring pending payment created for contract ' + data.id, 'payment');
          }
          // Mark this period as already handled so the recurring
          // auto-billing system (BILLING.runAutoInvoices) doesn't create a
          // duplicate the moment the admin next opens the dashboard.
          DB.update('contracts', data.id, { lastAutoInvoiceMonth: periodKey });
        }
      }
      UI.closeModal(); UI.toast(I18N.t('saved_ok'),'success'); render();
    });
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
