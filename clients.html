<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Clients</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=20260719h">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=20260719h"></script>
<script src="assets/js/lists.js?v=20260719h"></script>
<script src="assets/js/config.js?v=20260719h"></script>
<script src="assets/js/db.js?v=20260719h"></script>
<script src="assets/js/auth.js?v=20260719h"></script>
<script src="assets/js/ui.js?v=20260719h"></script>
<script src="assets/js/layout.js?v=20260719h"></script>
<script>
const ctx = LAYOUT.render('clients');
if(ctx){
  const { contentEl } = ctx;

  function render(){
    const clients = DB.all('clients');
    const contracts = DB.all('contracts');
    contentEl.innerHTML = `
      <div class="filters-bar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" data-i18n-ph="search">
        </div>
        <button class="btn btn-primary" id="addBtn" data-i18n="add_client"></button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th data-i18n="client_name_ar"></th><th data-i18n="client_name_en"></th><th data-i18n="client_country"></th>
              <th data-i18n="client_phone"></th><th data-i18n="client_email"></th>
              <th data-i18n="client_address"></th><th data-i18n="client_location"></th><th data-i18n="client_contracts_count"></th><th data-i18n="actions"></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state hidden">
          <div data-i18n="no_data"></div>
        </div>
      </div>
    `;
    I18N.apply(contentEl);
    const rowsEl = contentEl.querySelector('#rows');

    function draw(filter){
      const f = (filter||'').toLowerCase();
      const list = clients.filter(c=>{
        const nameAr = (c.nameAr||c.name||'');
        const nameEn = (c.nameEn||'');
        return !f || nameAr.toLowerCase().includes(f) || nameEn.toLowerCase().includes(f) ||
          (c.country||'').toLowerCase().includes(f) || (c.phone||'').includes(f) || (c.email||'').toLowerCase().includes(f);
      });
      contentEl.querySelector('#emptyState').classList.toggle('hidden', list.length>0);
      rowsEl.innerHTML = list.map(c=>{
        const count = contracts.filter(k=>k.clientId===c.id).length;
        const nameAr = c.nameAr || c.name || '—';
        return `<tr>
          <td class="cell-name">${UI.avatarHtml(nameAr, c.logo)}${nameAr}</td>
          <td>${c.nameEn||'—'}</td>
          <td>${c.country||'—'}</td>
          <td>${c.phone||'—'}</td>
          <td>${c.email||'—'}</td>
          <td>${c.address||'—'}</td>
          <td>${c.locationLink ? `<a href="${c.locationLink}" target="_blank" rel="noopener">📍</a>` : '—'}</td>
          <td><span class="badge badge-info">${count}</span></td>
          <td class="row-actions">
            <button class="btn btn-sm btn-outline" data-edit="${c.id}" data-i18n="edit"></button>
            <button class="btn btn-sm btn-danger" data-del="${c.id}" data-i18n="delete"></button>
          </td>
        </tr>`;
      }).join('');
      I18N.apply(rowsEl);
      wireRowActions();
    }

    function wireRowActions(){
      rowsEl.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openForm(DB.get('clients', b.dataset.edit))));
      rowsEl.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        const target = DB.get('clients', b.dataset.del);
        const hasContracts = DB.all('contracts').some(c=>c.clientId===b.dataset.del);
        if(hasContracts){ UI.toast(I18N.t('err_client_has_contracts'), 'error'); return; }
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          DB.remove('clients', b.dataset.del);
          DB.logActivity('تم حذف العميل ' + (target?(target.nameAr||target.name):''), 'Client deleted: ' + (target?(target.nameAr||target.name):''), 'client');
          UI.toast(I18N.t('deleted_ok'), 'success');
          render();
        });
      }));
    }

    contentEl.querySelector('#searchInput').addEventListener('input', (e)=>draw(e.target.value));
    contentEl.querySelector('#addBtn').addEventListener('click', ()=>openForm(null));
    draw('');
  }

  function openForm(client){
    const editing = !!client;
    const branches = editing ? (client.branches||[]) : [];
    const overlay = UI.openModal(`
      <div class="modal-head"><h3 data-i18n="${editing?'edit':'add_client'}"></h3><button class="close-x" id="mClose">&times;</button></div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field"><label data-i18n="client_name_ar"></label><input type="text" id="fNameAr" value="${client?(client.nameAr||client.name||''):''}"></div>
          <div class="field"><label data-i18n="client_name_en"></label><input type="text" id="fNameEn" value="${client?(client.nameEn||''):''}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="client_phone"></label><input type="tel" id="fPhone" value="${client?client.phone:''}"></div>
          <div class="field"><label data-i18n="client_email"></label><input type="email" id="fEmail" value="${client?client.email:''}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="client_country"></label><select id="fCountry">${LISTS.countryOptions(client?(client.country||''):'')}</select></div>
          <div class="field"><label data-i18n="client_address"></label><input type="text" id="fAddress" value="${client?client.address:''}"></div>
        </div>
        <div class="field">
          <label data-i18n="client_location"></label>
          <input type="text" id="fLocation" placeholder="https://maps.google.com/..." value="${client?(client.locationLink||''):''}">
          <p class="hint" data-i18n="client_location_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field-row">
          <div class="field"><label data-i18n="client_cr"></label><input type="text" id="fCr" value="${client?(client.crNumber||''):''}"></div>
          <div class="field"><label data-i18n="client_tax_number"></label><input type="text" id="fTax" value="${client?(client.taxNumber||''):''}"></div>
        </div>
        <div class="field">
          <label data-i18n="client_logo"></label>
          <div style="display:flex; align-items:center; gap:12px;">
            <div id="logoPreviewWrap">${client && client.logo ? `<img src="${client.logo}" style="width:52px;height:52px;border-radius:10px;object-fit:cover;border:1px solid var(--line);">` : ''}</div>
            <button type="button" class="btn btn-outline btn-sm" id="uploadLogoBtn" data-i18n="upload_logo"></button>
            <button type="button" class="btn btn-danger btn-sm ${client && client.logo ? '' : 'hidden'}" id="removeLogoBtn" data-i18n="remove_logo"></button>
          </div>
          <input type="file" id="fLogo" accept="image/*" class="hidden">
          <p class="hint" data-i18n="client_logo_hint" style="margin-top:4px;"></p>
        </div>
        <div class="field">
          <label data-i18n="client_branches"></label>
          <div id="branchRows"></div>
          <button type="button" class="btn btn-outline btn-sm" id="addBranchBtn" data-i18n="add_branch" style="margin-top:6px;"></button>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" id="mCancel" data-i18n="cancel"></button>
        <button class="btn btn-primary" id="mSave" data-i18n="save"></button>
      </div>
    `);
    I18N.apply(overlay);

    const branchRowsEl = overlay.querySelector('#branchRows');
    function drawBranches(){
      if(!branches.length){ branchRowsEl.innerHTML = `<div class="text-muted" style="font-size:12.5px; padding:4px 0;" data-i18n="no_branches"></div>`; I18N.apply(branchRowsEl); return; }
      branchRowsEl.innerHTML = branches.map((b,i)=>`
        <div class="field-row" style="align-items:flex-end; margin-bottom:8px;" data-branch-row="${i}">
          <div class="field" style="margin-bottom:0;"><input type="text" data-branch-name="${i}" placeholder="${I18N.t('branch_name')}" value="${b.name||''}"></div>
          <div class="field" style="margin-bottom:0; display:flex; gap:6px;">
            <input type="text" data-branch-link="${i}" placeholder="${I18N.t('branch_map_link')}" value="${b.link||''}">
            <button type="button" class="btn btn-sm btn-danger" data-branch-del="${i}">×</button>
          </div>
        </div>`).join('');
      branchRowsEl.querySelectorAll('[data-branch-del]').forEach(btn=>{
        btn.addEventListener('click', ()=>{ branches.splice(Number(btn.dataset.branchDel),1); drawBranches(); });
      });
    }
    drawBranches();
    overlay.querySelector('#addBranchBtn').addEventListener('click', ()=>{ branches.push({ name:'', link:'' }); drawBranches(); });

    let logoData = client ? (client.logo || '') : '';
    const logoPreviewWrap = overlay.querySelector('#logoPreviewWrap');
    const removeLogoBtn = overlay.querySelector('#removeLogoBtn');
    overlay.querySelector('#uploadLogoBtn').addEventListener('click', ()=> overlay.querySelector('#fLogo').click());
    overlay.querySelector('#fLogo').addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      logoData = await UI.resizeImageFile(file, 320);
      logoPreviewWrap.innerHTML = `<img src="${logoData}" style="width:52px;height:52px;border-radius:10px;object-fit:cover;border:1px solid var(--line);">`;
      removeLogoBtn.classList.remove('hidden');
    });
    removeLogoBtn.addEventListener('click', ()=>{
      logoData = '';
      logoPreviewWrap.innerHTML = '';
      removeLogoBtn.classList.add('hidden');
    });

    overlay.querySelector('#mClose').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mCancel').addEventListener('click', UI.closeModal);
    overlay.querySelector('#mSave').addEventListener('click', ()=>{
      const nameAr = overlay.querySelector('#fNameAr').value.trim();
      // collect current branch inputs (name/link may have been edited)
      const finalBranches = branches.map((b,i)=>({
        name: (overlay.querySelector(`[data-branch-name="${i}"]`)||{value:b.name}).value.trim(),
        link: (overlay.querySelector(`[data-branch-link="${i}"]`)||{value:b.link}).value.trim(),
      })).filter(b=>b.name || b.link);
      const data = {
        nameAr,
        name: nameAr, // kept for backward-compat with pages that read client.name
        nameEn: overlay.querySelector('#fNameEn').value.trim(),
        country: overlay.querySelector('#fCountry').value,
        phone: overlay.querySelector('#fPhone').value.trim(),
        email: overlay.querySelector('#fEmail').value.trim(),
        address: overlay.querySelector('#fAddress').value.trim(),
        locationLink: overlay.querySelector('#fLocation').value.trim(),
        crNumber: overlay.querySelector('#fCr').value.trim(),
        taxNumber: overlay.querySelector('#fTax').value.trim(),
        logo: logoData,
        branches: finalBranches,
      };
      if(!data.nameAr){ UI.toast(I18N.t('err_required'), 'error'); return; }
      if(editing){
        DB.update('clients', client.id, data);
        DB.logActivity('تم تعديل بيانات العميل ' + nameAr, 'Client updated: ' + nameAr, 'client');
      } else {
        const newClient = DB.insert('clients', { ...data, createdAt: DB.todayISO() });
        DB.logActivity('تمت إضافة عميل جديد ' + nameAr, 'New client added: ' + nameAr, 'client');

        // Every client added from this screen automatically gets a login
        // account too, so they don't need to self-register separately.
        const email = (data.email || '').trim();
        const existingUser = email ? DB.all('users').find(u=>u.email.toLowerCase()===email.toLowerCase()) : null;
        if(email && !existingUser){
          DB.insert('users', {
            id: DB.uid('u'), name: nameAr, email, username:'', password:'123456',
            phone: data.phone, role:'client', status:'approved', clientId: newClient.id,
          });
          DB.logActivity('تم إنشاء حساب دخول تلقائيًا للعميل ' + nameAr, 'Login account auto-created for client ' + nameAr, 'user');
          UI.toast(I18N.t('client_user_created').replace('{email}', email));
        } else if(!email){
          UI.toast(I18N.t('client_user_skipped_no_email'), 'warning');
        }
      }
      UI.closeModal();
      UI.toast(I18N.t('saved_ok'), 'success');
      render();
    });
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
