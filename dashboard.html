<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Dashboard</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191h">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191h"></script>
<script src="assets/js/lists.js?v=202607191h"></script>
<script src="assets/js/config.js?v=202607191h"></script>
<script src="assets/js/db.js?v=202607191h"></script>
<script src="assets/js/billing.js?v=202607191h"></script>
<script src="assets/js/auth.js?v=202607191h"></script>
<script src="assets/js/ui.js?v=202607191h"></script>
<script src="assets/js/layout.js?v=202607191h"></script>
<script>
const ctx = LAYOUT.render('dashboard');
if(ctx){
  const { user, contentEl } = ctx;
  const isAdmin = user.role === 'admin';

  function computeKPIs(f){
    f = f || {};
    let clients = DB.all('clients');
    let contracts = DB.all('contracts');
    let visits = DB.all('visits');
    let payments = DB.all('payments');
    if(f.clientId){
      clients = clients.filter(c=>c.id===f.clientId);
      contracts = contracts.filter(c=>c.clientId===f.clientId);
      visits = visits.filter(v=>v.clientId===f.clientId);
      payments = payments.filter(p=>p.clientId===f.clientId);
    }
    if(f.contractId){
      contracts = contracts.filter(c=>c.id===f.contractId);
      visits = visits.filter(v=>v.contractId===f.contractId);
      payments = payments.filter(p=>p.contractId===f.contractId);
    }
    if(f.from){ visits = visits.filter(v=>v.date>=f.from); payments = payments.filter(p=>p.date>=f.from); }
    if(f.to){ visits = visits.filter(v=>v.date<=f.to); payments = payments.filter(p=>p.date<=f.to); }
    const activeContracts = contracts.filter(c=>c.status==='active').length;
    const openVisits = visits.filter(v=>v.status==='requested'||v.status==='scheduled'||v.status==='ongoing').length;
    const revenue = payments.filter(p=>p.status==='confirmed').reduce((s,p)=>s+Number(p.amount),0);
    return { clientsCount: clients.length, activeContracts, openVisits, revenue };
  }

  function renderPending(){
    if(!isAdmin) return '';
    const pending = DB.all('users').filter(u=>u.status==='pending');
    if(!pending.length) return '';
    return `
    <div class="card" style="margin-bottom:22px;">
      <div class="card-header">
        <h3 class="card-title" data-i18n="pending_approvals"></h3>
        <span class="badge badge-warning">${pending.length}</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th data-i18n="full_name"></th><th data-i18n="email"></th><th data-i18n="account_type"></th><th data-i18n="actions"></th></tr></thead>
          <tbody>
          ${pending.map(u=>`
            <tr>
              <td class="cell-name"><div class="avatar">${UI.initials(u.name)}</div>${u.name}</td>
              <td>${u.email}</td>
              <td>${AUTH.roleLabel(u.role)}</td>
              <td class="row-actions">
                <button type="button" class="btn btn-sm btn-accent" data-approve="${u.id}" data-i18n="approve"></button>
                <button type="button" class="btn btn-sm btn-danger" data-reject="${u.id}" data-i18n="reject"></button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  function render(){
    if(user.role === 'client') return renderClient();
    if(user.role === 'technician') return renderTechnician();

    // Check once per visit whether any deferred-payment contract has
    // reached its monthly due day and needs a fresh invoice.
    BILLING.runAutoInvoices();

    const clientsList = DB.all('clients');
    const k = computeKPIs();
    contentEl.innerHTML = `
      <div class="filters-bar no-print">
        <div class="field" style="margin:0;"><label style="font-size:11px;" data-i18n="from_date"></label><input type="date" id="dFrom"></div>
        <div class="field" style="margin:0;"><label style="font-size:11px;" data-i18n="to_date"></label><input type="date" id="dTo"></div>
        <select id="dClient">
          <option value="" data-i18n="dashboard_filter_client"></option>
          ${clientsList.map(c=>`<option value="${c.id}">${c.nameAr||c.name}</option>`).join('')}
        </select>
        <select id="dContract">
          <option value="" data-i18n="dashboard_filter_contract"></option>
          ${DB.all('contracts').map(c=>`<option value="${c.id}">${c.id}</option>`).join('')}
        </select>
        <button type="button" class="btn btn-outline" id="dPrint">🖨️ <span data-i18n="dashboard_print"></span></button>
        <button type="button" class="btn btn-outline" id="dExport">🖼️ <span data-i18n="dashboard_export_image"></span></button>
      </div>
      <div id="dashPrintArea">
      <p class="text-muted" style="margin:-6px 0 22px;" data-i18n="dashboard_sub"></p>
      ${renderPending()}
      <div class="grid grid-4" style="margin-bottom:22px;">
        <div class="stat-card">
          <div class="stat-icon">${LAYOUT_ICON('clients')}</div>
          <div class="stat-value" id="kClients">${k.clientsCount}</div>
          <div class="stat-label" data-i18n="kpi_clients"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">${LAYOUT_ICON('contracts')}</div>
          <div class="stat-value" id="kContracts">${k.activeContracts}</div>
          <div class="stat-label" data-i18n="kpi_contracts_active"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">${LAYOUT_ICON('visits')}</div>
          <div class="stat-value" id="kVisits">${k.openVisits}</div>
          <div class="stat-label" data-i18n="kpi_visits_open"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">${LAYOUT_ICON('payments')}</div>
          <div class="stat-value" id="kRevenue">${UI.fmtMoney(k.revenue)}</div>
          <div class="stat-label" data-i18n="kpi_revenue"></div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom:22px; align-items:stretch;">
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="visits_by_client"></h3></div>
          <div class="chart-box"><canvas id="chartVisits"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="annual_overview"></h3></div>
          <div class="chart-box"><canvas id="chartAnnual"></canvas></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:22px;">
        <div class="card-header"><h3 class="card-title" data-i18n="monthly_payment_matrix_title"></h3></div>
        <p class="hint" style="margin-bottom:14px;" data-i18n="monthly_payment_matrix_hint"></p>
        <div class="table-wrap">
          <table id="paymentMatrixTable"></table>
        </div>
      </div>

      <div class="card" id="overdueCard" style="display:none; margin-bottom:22px; background:var(--warning-bg); border-color:var(--warning);">
        <div class="card-header"><h3 class="card-title" style="color:#8a5a00;">⚠️ <span data-i18n="overdue_invoices_title"></span></h3></div>
        <div id="overdueList"></div>
      </div>

      <div class="grid grid-3" style="align-items:start;">
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="payment_status"></h3></div>
          <div class="chart-box" style="height:200px;"><canvas id="chartOnTime"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="upcoming_payments"></h3></div>
          <div id="upcomingList"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="recent_activity"></h3></div>
          <div id="activityList"></div>
        </div>
      </div>
      </div>
    `;
    I18N.apply(contentEl);
    wireApprovals();

    function currentFilters(){
      return {
        from: contentEl.querySelector('#dFrom').value,
        to: contentEl.querySelector('#dTo').value,
        clientId: contentEl.querySelector('#dClient').value,
        contractId: contentEl.querySelector('#dContract').value,
      };
    }
    function applyFilters(){
      const f = currentFilters();
      const kf = computeKPIs(f);
      contentEl.querySelector('#kClients').textContent = kf.clientsCount;
      contentEl.querySelector('#kContracts').textContent = kf.activeContracts;
      contentEl.querySelector('#kVisits').textContent = kf.openVisits;
      contentEl.querySelector('#kRevenue').textContent = UI.fmtMoney(kf.revenue);
      drawCharts(f);
      renderUpcoming(f);
    }
    ['#dFrom','#dTo','#dClient','#dContract'].forEach(sel=>{
      contentEl.querySelector(sel).addEventListener('change', applyFilters);
    });
    contentEl.querySelector('#dPrint').addEventListener('click', ()=>window.print());
    contentEl.querySelector('#dExport').addEventListener('click', ()=>exportDashboardImage());

    drawCharts();
    renderUpcoming();
    renderActivity();
    renderOverdue();
    renderPaymentMatrix();
  }

  function exportDashboardImage(){
    const area = document.getElementById('dashPrintArea');
    loadHtml2Canvas().then(()=>{
      html2canvas(area, { backgroundColor:'#ffffff', scale:2 }).then(canvas=>{
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `integriox-dashboard-${DB.todayISO()}.png`;
        a.click();
      });
    });
  }
  function loadHtml2Canvas(){
    if(window.html2canvas) return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  // Client view: only this client's own contract(s) and visits — never other
  // clients' data (no shared KPIs, revenue, or activity feed).
  function renderClient(){
    const contracts = DB.all('contracts').filter(c=>c.clientId===user.clientId);
    const visits = DB.all('visits').filter(v=>v.clientId===user.clientId)
      .filter(v=>v.status==='requested'||v.status==='scheduled'||v.status==='ongoing')
      .sort((a,b)=>a.date.localeCompare(b.date));

    contentEl.innerHTML = `
      <p class="text-muted" style="margin:-6px 0 22px;" data-i18n="dashboard_sub"></p>
      <div class="card" id="overdueCard" style="display:none; margin-bottom:22px; background:var(--warning-bg); border-color:var(--warning);">
        <div class="card-header"><h3 class="card-title" style="color:#8a5a00;">⚠️ <span data-i18n="overdue_invoices_title"></span></h3></div>
        <div id="overdueList"></div>
      </div>
      <div class="grid grid-2" style="margin-bottom:22px; align-items:start;">
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="my_contract_title"></h3></div>
          ${contracts.length ? `
            <div style="display:flex; flex-direction:column; gap:14px;">
              ${contracts.map(c=>`
                <div style="${contracts.length>1?'padding-bottom:14px; border-bottom:1px solid var(--line);':''}">
                  <div style="display:flex;justify-content:space-between;"><span class="text-muted" data-i18n="contract_id"></span><strong>${c.id}</strong></div>
                  <div style="display:flex;justify-content:space-between;"><span class="text-muted" data-i18n="contract_amount"></span><strong>${UI.fmtMoney(c.amount, c.currency)}</strong></div>
                  <div style="display:flex;justify-content:space-between;"><span class="text-muted" data-i18n="contract_status"></span><span class="badge ${c.status==='active'?'badge-success':'badge-mute'}" data-i18n="status_${c.status}"></span></div>
                  <div style="display:flex;justify-content:space-between;"><span class="text-muted" data-i18n="contract_visits_total"></span><span>${c.visitsUsed||0} ${I18N.t('visits_used_of')} ${c.visitsUnlimited ? I18N.t('visits_unlimited') : c.visitsTotal}</span></div>
                  <a class="btn btn-outline btn-block" style="margin-top:6px;" href="contract-template.html?id=${c.id}" data-i18n="view_my_contract"></a>
                </div>`).join('')}
            </div>` : `<div class="empty-state" data-i18n="no_contract"></div>`}
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="quick_actions"></h3></div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <a class="btn btn-primary btn-block" href="visit-request.html" data-i18n="request_new_visit"></a>
            <a class="btn btn-outline btn-block" href="contracts.html" data-i18n="view_my_contract"></a>
            <a class="btn btn-outline btn-block" href="payments.html" data-i18n="view_my_payments"></a>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title" data-i18n="my_visits_title"></h3></div>
        <div id="myVisitsList"></div>
      </div>
    `;
    I18N.apply(contentEl);
    renderOverdue(user.clientId);
    const el = contentEl.querySelector('#myVisitsList');
    if(!visits.length){ el.innerHTML = `<div class="empty-state">${I18N.t('no_data')}</div>`; return; }
    el.innerHTML = visits.map(v=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);">
        <div>
          <div style="font-weight:700;font-size:13.5px;">${v.id}</div>
          <div class="text-muted" style="font-size:12px;">${v.description||''}</div>
        </div>
        <div style="text-align:end;">
          <div style="font-weight:700;font-size:13.5px;">${UI.fmtDate(v.date)}</div>
          <div class="text-muted" style="font-size:11.5px;">${v.time||''}</div>
        </div>
      </div>`).join('');
  }

  // Technician view: only their own assigned visits — no revenue or other
  // clients' contract data.
  function renderTechnician(){
    const visits = DB.all('visits').filter(v=>v.techId===user.techId);
    const upcoming = visits.filter(v=>v.status==='requested'||v.status==='scheduled'||v.status==='ongoing').sort((a,b)=>a.date.localeCompare(b.date));
    const done = visits.filter(v=>v.status==='done').length;

    contentEl.innerHTML = `
      <p class="text-muted" style="margin:-6px 0 22px;" data-i18n="dashboard_sub"></p>
      <div class="grid grid-3" style="margin-bottom:22px;">
        <div class="stat-card">
          <div class="stat-icon">${LAYOUT_ICON('visits')}</div>
          <div class="stat-value">${upcoming.length}</div>
          <div class="stat-label" data-i18n="kpi_visits_open"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">${LAYOUT_ICON('visits')}</div>
          <div class="stat-value">${done}</div>
          <div class="stat-label" data-i18n="visit_done"></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">${LAYOUT_ICON('visits')}</div>
          <div class="stat-value">${visits.length}</div>
          <div class="stat-label" data-i18n="visits"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title" data-i18n="my_visits_assigned"></h3></div>
        <div id="myVisitsList"></div>
      </div>
    `;
    I18N.apply(contentEl);
    const el = contentEl.querySelector('#myVisitsList');
    if(!upcoming.length){ el.innerHTML = `<div class="empty-state">${I18N.t('no_data')}</div>`; return; }
    el.innerHTML = upcoming.map(v=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);">
        <div>
          <div style="font-weight:700;font-size:13.5px;">${v.id}</div>
          <div class="text-muted" style="font-size:12px;">${v.description||''}</div>
        </div>
        <div style="text-align:end;">
          <div style="font-weight:700;font-size:13.5px;">${UI.fmtDate(v.date)}</div>
          <div class="text-muted" style="font-size:11.5px;">${v.time||''}</div>
        </div>
      </div>`).join('');
  }

  function LAYOUT_ICON(key){
    const icons = {
      clients:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.5 2.7-6 6-6s6 2.5 6 6"/></svg>',
      contracts:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M6 3h9l4 4v14H6z"/><path d="M14 3v5h5M9 12h7M9 16h7"/></svg>',
      visits:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>',
      payments:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="2.5" y="6" width="19" height="13" rx="2"/><path d="M2.5 10h19"/></svg>',
    };
    return icons[key]||'';
  }

  function wireApprovals(){
    contentEl.querySelectorAll('[data-approve]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const target = DB.get('users', btn.dataset.approve);
        DB.update('users', btn.dataset.approve, { status:'approved' });
        DB.logActivity('تم قبول حساب ' + (target?target.name:''), 'Account approved: ' + (target?target.name:''), 'user');
        UI.toast(I18N.t('saved_ok'), 'success');
        render();
      });
    });
    contentEl.querySelectorAll('[data-reject]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        UI.confirmAction(I18N.t('confirm_delete'), ()=>{
          const target = DB.get('users', btn.dataset.reject);
          DB.remove('users', btn.dataset.reject);
          DB.logActivity('تم رفض حساب ' + (target?target.name:''), 'Account rejected: ' + (target?target.name:''), 'user');
          UI.toast(I18N.t('deleted_ok'), 'success');
          render();
        });
      });
    });
  }

  let charts = [];
  function drawCharts(f){
    f = f || {};
    charts.forEach(c=>c.destroy()); charts = [];
    let clients = DB.all('clients');
    let visits = DB.all('visits');
    let payments = DB.all('payments');
    if(f.clientId){ clients = clients.filter(c=>c.id===f.clientId); visits = visits.filter(v=>v.clientId===f.clientId); payments = payments.filter(p=>p.clientId===f.clientId); }
    if(f.contractId){ visits = visits.filter(v=>v.contractId===f.contractId); payments = payments.filter(p=>p.contractId===f.contractId); }
    if(f.from){ visits = visits.filter(v=>v.date>=f.from); payments = payments.filter(p=>p.date>=f.from); }
    if(f.to){ visits = visits.filter(v=>v.date<=f.to); payments = payments.filter(p=>p.date<=f.to); }

    // visits by client
    const byClient = clients.map(c=>({ name:c.name, count: visits.filter(v=>v.clientId===c.id).length }));
    charts.push(new Chart(document.getElementById('chartVisits'), {
      type:'bar',
      data:{ labels: byClient.map(c=>c.name), datasets:[{ data: byClient.map(c=>c.count), backgroundColor:'#2E77BC', borderRadius:6, maxBarThickness:34 }] },
      options:{ plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } }
    }));

    // annual overview (monthly payments total, demo distribution across the year)
    const monthKeys = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const monthLabels = monthKeys.map(k=>I18N.t(k));
    const monthlyTotals = new Array(12).fill(0);
    payments.forEach(p=>{ const m = new Date(p.date).getMonth(); if(!isNaN(m)) monthlyTotals[m]+=Number(p.amount); });
    charts.push(new Chart(document.getElementById('chartAnnual'), {
      type:'line',
      data:{ labels: monthLabels, datasets:[{ data: monthlyTotals, borderColor:'#0B2545', backgroundColor:'rgba(111,168,220,.25)', fill:true, tension:.35, pointRadius:3 }] },
      options:{ plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true } } }
    }));

    // on-time vs late
    const onTime = payments.filter(p=>p.status==='confirmed').length;
    const late = payments.filter(p=>p.status==='review'||p.status==='rejected').length;
    charts.push(new Chart(document.getElementById('chartOnTime'), {
      type:'doughnut',
      data:{ labels:[I18N.t('on_time'), I18N.t('late')], datasets:[{ data:[onTime, late], backgroundColor:['#2F9E63','#E0A32C'] }] },
      options:{ plugins:{legend:{position:'bottom', labels:{boxWidth:10, font:{size:11}}}}, cutout:'65%' }
    }));
  }

  function renderUpcoming(f){
    f = f || {};
    let contracts = DB.all('contracts').filter(c=>c.status==='active');
    if(f.clientId) contracts = contracts.filter(c=>c.clientId===f.clientId);
    if(f.contractId) contracts = contracts.filter(c=>c.id===f.contractId);
    contracts = contracts.slice(0,5);
    const clients = DB.all('clients');
    const el = document.getElementById('upcomingList');
    if(!contracts.length){ el.innerHTML = `<div class="empty-state" style="padding:20px;">${I18N.t('no_data')}</div>`; return; }
    el.innerHTML = contracts.map(c=>{
      const client = clients.find(x=>x.id===c.clientId);
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);">
        <div>
          <div style="font-weight:700;font-size:13.5px;">${client?client.name:'—'}</div>
          <div class="text-muted" style="font-size:12px;">${c.id}</div>
        </div>
        <div style="text-align:end;">
          <div style="font-weight:700;font-size:13.5px;">${UI.fmtMoney(c.amount, c.currency)}</div>
          <div class="text-muted" style="font-size:11.5px;">${UI.fmtDate(c.endDate || c.startDate)}</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderActivity(){
    const acts = DB.all('activity');
    const el = document.getElementById('activityList');
    if(!acts.length){ el.innerHTML = `<div class="empty-state" style="padding:20px;">${I18N.t('no_data')}</div>`; return; }
    el.innerHTML = acts.map(a=>`
      <div style="display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--blue);margin-top:6px;flex-shrink:0;"></div>
        <div>
          <div style="font-size:13px;">${I18N.getLang()==='ar' ? a.text_ar : a.text_en}</div>
          <div class="text-muted" style="font-size:11px;">${UI.fmtDate(a.at)}</div>
        </div>
      </div>`).join('');
  }

  function renderPaymentMatrix(){
    const table = document.getElementById('paymentMatrixTable');
    if(!table) return;
    const clientsWithContracts = DB.all('clients').filter(c=>
      DB.all('contracts').some(k=>k.clientId===c.id && k.status==='active')
    );
    if(!clientsWithContracts.length){
      table.innerHTML = `<tr><td style="text-align:center; color:var(--ink-mute); padding:20px;">${I18N.t('no_data')}</td></tr>`;
      return;
    }
    // Last 6 months, oldest first.
    const months = [];
    const now = new Date();
    for(let i=5; i>=0; i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      months.push({ key: d.toISOString().slice(0,7), label: BILLING.monthYearLabel(d.toISOString()) });
    }
    const invoices = DB.all('invoices');
    const headerHtml = `<thead><tr><th data-i18n="client_name_ar"></th>${months.map(m=>`<th style="text-align:center;">${m.label}</th>`).join('')}</tr></thead>`;
    const bodyHtml = clientsWithContracts.map(c=>{
      const cells = months.map(m=>{
        const paid = invoices.some(i=>i.clientId===c.id && i.status==='paid' && (i.date||'').slice(0,7)===m.key);
        return `<td style="text-align:center; font-size:16px;">${paid ? '<span style="color:var(--success);">✓</span>' : '<span style="color:var(--danger);">✗</span>'}</td>`;
      }).join('');
      return `<tr><td>${c.name}</td>${cells}</tr>`;
    }).join('');
    table.innerHTML = headerHtml + `<tbody>${bodyHtml}</tbody>`;
    I18N.apply(table);
  }

  function renderOverdue(clientId){
    const card = document.getElementById('overdueCard');
    const el = document.getElementById('overdueList');
    if(!card) return;
    const clients = DB.all('clients');
    const list = BILLING.overdueInvoices(clientId);
    card.style.display = list.length ? '' : 'none';
    if(!list.length) return;
    el.innerHTML = list.map(i=>{
      const client = clients.find(c=>c.id===i.clientId);
      return `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(0,0,0,0.08);">
        <div>
          <div style="font-weight:700; font-size:13px;">${i.id} — ${client?client.name:'—'}</div>
          <div style="font-size:11.5px; color:#8a5a00;">${UI.fmtDate(i.date)} · ${i.daysLate} ${I18N.t('days_late')}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="badge" style="background:#F5C244; color:#5a3d00;">${I18N.t('overdue_badge')}</span>
          <strong>${UI.fmtMoney(i.amount)}</strong>
          <a class="btn btn-sm btn-outline" href="invoice-template.html?id=${i.id}" data-i18n="view_invoice"></a>
        </div>
      </div>`;
    }).join('');
    I18N.apply(el);
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
