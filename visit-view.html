<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Visit Details</title>
<link rel="icon" href="assets/images/logo.png">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191y">
</head>
<body style="background:var(--bg);">
<div class="page" style="max-width:820px; padding:26px 16px;" id="pageContent"></div>

<script src="assets/js/i18n.js?v=202607191y"></script>
<script src="assets/js/lists.js?v=202607191y"></script>
<script src="assets/js/config.js?v=202607191y"></script>
<script src="assets/js/db.js?v=202607191y"></script>
<script src="assets/js/billing.js?v=202607191y"></script>
<script src="assets/js/ui.js?v=202607191y"></script>
<script>
// Standalone public page — no login required. Access is gated by a
// per-visit token in the URL, not a user session.
const contentEl = document.getElementById('pageContent');
const params = new URLSearchParams(window.location.search);
const visitId = params.get('id');
const token = params.get('token');
const typeLabelMap = { periodic:'issue_periodic', fault:'issue_fault', urgent:'issue_urgent' };

function render(){
  const visit = visitId ? DB.get('visits', visitId) : null;
  const settings = DB.getSettings();

  if(!visit || !token || visit.viewToken !== token){
    contentEl.innerHTML = `
      <div class="card" style="text-align:center; padding:40px 20px;">
        <div style="font-size:36px; margin-bottom:10px;">🔒</div>
        <h3 style="margin-bottom:8px;" data-i18n="public_link_invalid_title"></h3>
        <p class="text-muted" data-i18n="public_link_invalid_desc"></p>
      </div>`;
    I18N.apply(contentEl);
    return;
  }

  const client = DB.get('clients', visit.clientId);
  const tech = DB.get('technicians', visit.techId);

  contentEl.innerHTML = `
    <div style="display:flex; justify-content:center; margin-bottom:18px;">
      <img src="assets/images/logo.png" style="width:46px;height:46px;">
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--navy); padding-bottom:14px; margin-bottom:20px;">
        <div>
          <div style="font-weight:800; font-size:16px; color:var(--navy);">${settings.companyName||'Integriox'}</div>
        </div>
        <div style="text-align:end;">
          <div style="font-weight:800;" data-i18n="visit_details_title"></div>
          <div class="text-muted" style="font-size:12px;">${visit.id}</div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom:20px;">
        <div><div class="text-muted" style="font-size:11px;" data-i18n="contract_client"></div><div style="font-weight:700;">${client?client.name:'—'}</div></div>
        <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_technician"></div><div style="font-weight:700;">${tech?tech.name:'—'}</div></div>
        <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_date"></div><div style="font-weight:700;">${UI.fmtDate(visit.date)} ${visit.time||''}</div></div>
        <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_type"></div><div style="font-weight:700;" data-i18n="${typeLabelMap[visit.type]||'issue_periodic'}"></div></div>
        <div><div class="text-muted" style="font-size:11px;" data-i18n="visit_status"></div><span class="badge badge-success" data-i18n="visit_${visit.status}"></span></div>
      </div>

      <h4 data-i18n="visit_description" style="margin:0 0 8px;"></h4>
      <div class="terms-box" style="max-height:none; margin-bottom:18px;">${visit.description||'—'}</div>

      ${visit.report ? `
      <h4 data-i18n="visit_report" style="margin:0 0 8px;"></h4>
      <div class="terms-box" style="max-height:none;">${visit.report}</div>` : ''}
    </div>
  `;
  I18N.apply(contentEl);
}

render();
</script>
</body>
</html>
