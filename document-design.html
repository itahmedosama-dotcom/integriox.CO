<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Document Design</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191al">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191al"></script>
<script src="assets/js/lists.js?v=202607191al"></script>
<script src="assets/js/config.js?v=202607191al"></script>
<script src="assets/js/db.js?v=202607191al"></script>
<script src="assets/js/billing.js?v=202607191al"></script>
<script src="assets/js/auth.js?v=202607191al"></script>
<script src="assets/js/ui.js?v=202607191al"></script>
<script src="assets/js/layout.js?v=202607191al"></script>
<script>
const ctx = LAYOUT.render('document-design');
if(ctx && LAYOUT.guardRoles(ctx, ['admin'])){
  const { contentEl } = ctx;
  const FONTS = ['Cairo', 'Tajawal', 'Almarai'];

  function render(){
    const settings = DB.getSettings();
    const theme = Object.assign({ accentColor:'#0B2545', font:'Cairo', showQr:true, showStamp:true, showWatermark:true }, settings.documentTheme || {});

    contentEl.innerHTML = `
      <div class="grid grid-2" style="align-items:start; gap:22px;">
        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="doc_design_settings"></h3></div>
          <div class="field">
            <label data-i18n="doc_accent_color"></label>
            <div style="display:flex; align-items:center; gap:10px;">
              <input type="color" id="fAccentColor" value="${theme.accentColor}" style="width:52px; height:38px; padding:2px; cursor:pointer;">
              <input type="text" id="fAccentColorText" value="${theme.accentColor}" dir="ltr" style="flex:1;">
            </div>
          </div>
          <div class="field">
            <label data-i18n="doc_font"></label>
            <select id="fFont">
              ${FONTS.map(f=>`<option value="${f}" ${theme.font===f?'selected':''}>${f}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" id="fShowQr" style="width:auto;" ${theme.showQr?'checked':''}>
              <span data-i18n="doc_show_qr"></span>
            </label>
          </div>
          <div class="field">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" id="fShowStamp" style="width:auto;" ${theme.showStamp?'checked':''}>
              <span data-i18n="doc_show_stamp"></span>
            </label>
          </div>
          <div class="field">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" id="fShowWatermark" style="width:auto;" ${theme.showWatermark?'checked':''}>
              <span data-i18n="doc_show_watermark"></span>
            </label>
          </div>
          <button type="button" class="btn btn-primary" id="saveTheme" data-i18n="save_changes" style="margin-top:6px;"></button>
          <p class="hint" style="margin-top:10px;" data-i18n="doc_design_hint"></p>
        </div>

        <div class="card">
          <div class="card-header"><h3 class="card-title" data-i18n="doc_live_preview"></h3></div>
          <div id="previewArea" style="border:1px solid var(--line); border-radius:10px; padding:18px; background:#fff; position:relative; overflow:hidden;"></div>
        </div>
      </div>
    `;
    I18N.apply(contentEl);

    const accentColor = contentEl.querySelector('#fAccentColor');
    const accentColorText = contentEl.querySelector('#fAccentColorText');
    const fontSel = contentEl.querySelector('#fFont');
    const showQr = contentEl.querySelector('#fShowQr');
    const showStamp = contentEl.querySelector('#fShowStamp');
    const showWatermark = contentEl.querySelector('#fShowWatermark');

    function currentTheme(){
      return {
        accentColor: accentColor.value,
        font: fontSel.value,
        showQr: showQr.checked,
        showStamp: showStamp.checked,
        showWatermark: showWatermark.checked,
      };
    }

    function drawPreview(){
      const t = currentTheme();
      const previewArea = contentEl.querySelector('#previewArea');
      previewArea.style.fontFamily = `'${t.font}', sans-serif`;
      previewArea.innerHTML = `
        ${t.showWatermark ? `
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-28deg); z-index:0; pointer-events:none;">
          <div style="font-weight:800; font-size:40px; letter-spacing:3px; text-transform:uppercase; color:#1E8E5A; opacity:0.10;">${I18N.t('inv_paid')}</div>
        </div>` : ''}
        <div style="position:relative; z-index:1;">
          <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid ${t.accentColor}; padding-bottom:12px; margin-bottom:14px;">
            <div style="display:flex; align-items:center; gap:8px;">
              <img src="assets/images/logo.png" style="width:32px;height:32px;">
              <strong style="color:${t.accentColor};">${(DB.getSettings().companyName)||'Integriox'}</strong>
            </div>
            ${t.showQr ? `<div style="width:40px;height:40px;background:repeating-linear-gradient(45deg,#0002,#0002 3px,transparent 3px,transparent 6px); border:1px solid var(--line);"></div>` : ''}
          </div>
          <div style="font-size:12px; color:var(--ink-mute); margin-bottom:10px;" data-i18n="doc_preview_sample_line"></div>
          <div style="display:flex; justify-content:space-between; padding:8px 0; border-top:1.5px solid ${t.accentColor}; font-weight:800;">
            <span data-i18n="invoice_grand_total"></span><span>1,500 ر.س</span>
          </div>
          ${t.showStamp ? `<div style="display:flex; justify-content:center; margin-top:14px;"><div style="width:60px;height:60px;border-radius:50%;border:2px solid ${t.accentColor}; display:flex; align-items:center; justify-content:center; font-size:9px; color:${t.accentColor}; text-align:center;">${I18N.t('company_stamp')}</div></div>` : ''}
        </div>
      `;
      I18N.apply(previewArea);
    }

    accentColor.addEventListener('input', ()=>{ accentColorText.value = accentColor.value; drawPreview(); });
    accentColorText.addEventListener('input', ()=>{
      if(/^#[0-9a-fA-F]{6}$/.test(accentColorText.value)){ accentColor.value = accentColorText.value; drawPreview(); }
    });
    [fontSel, showQr, showStamp, showWatermark].forEach(el=> el.addEventListener('change', drawPreview));
    drawPreview();

    contentEl.querySelector('#saveTheme').addEventListener('click', ()=>{
      DB.saveSettings({ documentTheme: currentTheme() });
      DB.logActivity('تم تحديث تصميم النماذج المطبوعة', 'Document design updated', 'settings');
      UI.toast(I18N.t('saved_ok'), 'success');
    });
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
