<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integriox — Contract</title>
<link rel="icon" href="assets/images/logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Almarai:wght@400;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=202607191ab">
</head>
<body>
<div id="app-shell"></div>

<script src="assets/js/i18n.js?v=202607191ab"></script>
<script src="assets/js/lists.js?v=202607191ab"></script>
<script src="assets/js/config.js?v=202607191ab"></script>
<script src="assets/js/db.js?v=202607191ab"></script>
<script src="assets/js/billing.js?v=202607191ab"></script>
<script src="assets/js/auth.js?v=202607191ab"></script>
<script src="assets/js/ui.js?v=202607191ab"></script>
<script src="assets/js/layout.js?v=202607191ab"></script>
<script>
const ctx = LAYOUT.render('contracts');
if(ctx){
  const { user, contentEl } = ctx;
  const isAdmin = user.role === 'admin';
  const params = new URLSearchParams(window.location.search);
  const contractId = params.get('id');
  const contract = DB.get('contracts', contractId);
  const settings = DB.getSettings();
  const theme = Object.assign({ accentColor:'#0B2545', font:'Cairo', showQr:true, showStamp:true, showWatermark:true }, settings.documentTheme || {});

  const typeLabel = { onsite:'type_onsite', remote:'type_remote', visits:'type_visits', all:'type_all' };

  function render(){
    if(!contract){
      contentEl.innerHTML = `<div class="empty-state">${I18N.t('no_data')}</div>`;
      return;
    }
    // A real hand-drawn signature PNG is at least a few KB; a blank canvas
    // (from the earlier signature-pad bug, where a tap with no drag could
    // save an empty image) compresses to well under 1KB. Treat those as
    // unsigned so the person can sign again instead of being stuck behind
    // an invisible lock.
    const hasValidSignature = !!(contract.signature && contract.signature.length > 1000);
    const client = DB.get('clients', contract.clientId);
    const steps = ['status_active','status_renewal','status_closed'];
    const currentIdx = contract.status==='cancelled' ? -1 : steps.indexOf(contract.status==='active'?'status_active':contract.status==='renewal'?'status_renewal':'status_closed');

    contentEl.innerHTML = `
      <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;">
        <div class="node-track" style="max-width:420px;">
          ${steps.map((s,i)=>`
            <div class="node-step ${i<currentIdx?'done':''} ${i===currentIdx?'current':''}">
              <div class="node-dot"></div>
              <div class="node-label" data-i18n="${s}"></div>
            </div>`).join('')}
        </div>
        <button type="button" class="btn btn-accent" id="printBtn">🖨️ <span data-i18n="print_contract"></span></button>
      </div>

      <div class="card" id="printArea" style="--navy:${theme.accentColor}; font-family:'${theme.font}', sans-serif;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:26px; padding-bottom:20px; border-bottom:2px solid var(--navy);">
          <div style="display:flex; align-items:center; gap:12px;">
            <img src="assets/images/logo.png" style="width:52px;height:52px;">
            <div>
              <div style="font-weight:800; font-size:18px; color:var(--navy);">${settings.companyName}</div>
              <div class="text-muted" style="font-size:12px;">${settings.companyAddress}</div>
            </div>
          </div>
          <div style="text-align:end;">
            <div style="font-weight:800; font-size:16px;" data-i18n="contract_template_title"></div>
            <div class="text-muted" style="font-size:13px;">${contract.id}</div>
            <div class="text-muted" style="font-size:12px;">${UI.fmtDate(contract.startDate)}</div>
          </div>
        </div>

        <div class="grid grid-2" style="margin-bottom:24px;">
          <div>
            <h4 data-i18n="party_a" style="margin:0 0 8px;"></h4>
            <div style="display:flex; align-items:flex-start; gap:10px;">
              <img src="assets/images/logo.png" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">
              <div style="font-size:13.5px; line-height:2;">
                ${settings.companyName}<br>${settings.companyPhone}<br>${settings.companyEmail}
                ${(settings.companyCr || settings.companyTaxNumber) ? `<br>${[
                  settings.companyCr ? `${I18N.t('company_cr')}: ${settings.companyCr}` : '',
                  settings.companyTaxNumber ? `${I18N.t('company_tax_number')}: ${settings.companyTaxNumber}` : '',
                ].filter(Boolean).join('   ')}` : ''}
                ${(settings.bankName || settings.iban) ? `<br>${[
                  settings.bankName ? `${I18N.t('company_bank_name')}: ${settings.bankName}` : '',
                  settings.iban ? `${I18N.t('company_iban')}: ${settings.iban}` : '',
                ].filter(Boolean).join('   ')}` : ''}
              </div>
            </div>
          </div>
          <div>
            <h4 data-i18n="party_b" style="margin:0 0 8px;"></h4>
            <div style="display:flex; align-items:flex-start; gap:10px;">
              ${client && client.logo ? `<img src="${client.logo}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">` : ''}
              <div style="font-size:13.5px; line-height:2;">
                ${client?client.name:'—'}<br>${client?client.phone:''}<br>${client?client.address:''}
                ${client && client.crNumber ? `<br>${I18N.t('client_cr')}: ${client.crNumber}` : ''}
                ${client && client.taxNumber ? `<br>${I18N.t('client_tax_number')}: ${client.taxNumber}` : ''}
              </div>
            </div>
          </div>
        </div>

        <div class="grid grid-4" style="margin-bottom:24px;">
          <div><div class="text-muted" style="font-size:12px;" data-i18n="contract_amount"></div><div style="font-weight:700;">${UI.fmtMoney(contract.amount, contract.currency)}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="contract_duration"></div><div style="font-weight:700;">${contract.durationMonths} ${I18N.t('months')} · <span data-i18n="${contract.periodType==='open'?'period_open':'period_fixed'}"></span></div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="contract_type"></div><div style="font-weight:700;" data-i18n="${typeLabel[contract.contractType]}"></div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="payment_terms"></div><div style="font-weight:700;" data-i18n="${contract.paymentTerms==='upfront'?'pay_upfront':'pay_deferred'}"></div></div>
          ${contract.paymentTerms==='deferred' && contract.paymentDueDay ? `<div><div class="text-muted" style="font-size:12px;" data-i18n="billing_cycle"></div><div style="font-weight:700;" data-i18n="${contract.billingCycle==='yearly'?'cycle_yearly':'cycle_monthly'}"></div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="payment_due_day"></div><div style="font-weight:700;">${contract.paymentDueDay}</div></div>` : ''}
          ${contract.paymentTerms==='upfront' && contract.upfrontDueDate ? `<div><div class="text-muted" style="font-size:12px;" data-i18n="upfront_due_date"></div><div style="font-weight:700;">${UI.fmtDate(contract.upfrontDueDate)}</div></div>` : ''}
          <div><div class="text-muted" style="font-size:12px;" data-i18n="contract_start"></div><div style="font-weight:700;">${UI.fmtDate(contract.startDate)}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="contract_end"></div><div style="font-weight:700;">${contract.endDate?UI.fmtDate(contract.endDate):I18N.t('period_open')}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="contract_visits_total"></div><div style="font-weight:700;">${contract.visitsUnlimited ? I18N.t('visits_unlimited') : (contract.visitsUsed + '/' + contract.visitsTotal)}${contract.visitFrequency ? ` (${I18N.t('freq_'+contract.visitFrequency)})` : ''}</div></div>
          <div><div class="text-muted" style="font-size:12px;" data-i18n="contract_status"></div><div style="font-weight:700;" data-i18n="status_${contract.status}"></div></div>
        </div>
        ${(function(){
          const { applied } = BILLING.contractTaxes(contract);
          if(!applied.length) return '';
          return `<div style="margin-bottom:24px;">
            <div class="text-muted" style="font-size:12px; margin-bottom:4px;" data-i18n="contract_taxes"></div>
            <div style="font-size:13px;">${applied.map(t=>`${t.nameAr} (${t.rate}%)`).join(' + ')}</div>
          </div>`;
        })()}

        ${contract.agreementDetails ? `
        <h4 data-i18n="agreement_details" style="margin:0 0 10px;"></h4>
        <div class="terms-box" style="max-height:none; margin-bottom:26px; white-space:pre-wrap;">${contract.agreementDetails}</div>
        ` : ''}

        <h4 data-i18n="terms_conditions" style="margin:0 0 10px;"></h4>
        <div class="terms-box" style="max-height:none; margin-bottom:26px;">${settings.terms}</div>

        <div class="grid ${(settings.companyStamp && theme.showStamp) ? 'grid-3' : 'grid-2'}">
          <div>
            <h4 data-i18n="client_signature" style="margin:0 0 10px;"></h4>
            ${hasValidSignature ? `
              <img id="sigImg" src="${contract.signature}" style="max-height:110px; border:1px solid var(--line); border-radius:8px; padding:8px; background:#fff;">
              <div class="text-muted no-print" style="font-size:11.5px; margin-top:8px;" data-i18n="signature_locked_hint"></div>
              ${isAdmin ? `<button type="button" class="btn btn-sm btn-outline no-print" id="reopenSig" style="margin-top:8px;" data-i18n="reopen_for_signature"></button>` : ''}
            ` : `
              <canvas id="sigCanvas" class="signature-pad no-print" width="500" height="150" style="width:100%; height:110px;"></canvas>
              <div class="row-actions no-print" style="margin-top:8px;">
                <button type="button" class="btn btn-sm btn-outline" id="clearSig" data-i18n="clear_signature"></button>
                <button type="button" class="btn btn-sm btn-primary" id="saveSig" data-i18n="save"></button>
              </div>
            `}
          </div>
          ${(settings.companyStamp && theme.showStamp) ? `
          <div style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <img src="${settings.companyStamp}" style="width:90px; height:90px; object-fit:contain;" alt="stamp">
          </div>` : ''}
          <div>
            <h4 data-i18n="signature" style="margin:0 0 10px;"></h4>
            <div class="text-muted" style="font-size:12px; margin-bottom:8px;">${settings.companyName} — <span data-i18n="signature"></span></div>
            ${settings.companySignature
              ? `<img src="${settings.companySignature}" style="max-height:70px; margin-bottom:4px;">`
              : `<div style="height:70px; border-bottom:1.5px solid var(--ink-mute);"></div>`}
          </div>
        </div>
      </div>
    `;
    I18N.apply(contentEl);

    contentEl.querySelector('#printBtn').addEventListener('click', ()=>window.print());

    if(hasValidSignature){
      const reopenBtn = contentEl.querySelector('#reopenSig');
      if(reopenBtn){
        reopenBtn.addEventListener('click', ()=>{
          UI.confirmAction(I18N.t('reopen_for_signature_confirm'), ()=>{
            DB.update('contracts', contract.id, { signature: null });
            DB.logActivity('تم إعادة فتح العقد ' + contract.id + ' للتوقيع', 'Contract reopened for signature ' + contract.id, 'contract');
            UI.toast(I18N.t('saved_ok'), 'success');
            render();
          });
        });
      }
    } else {
      const canvas = contentEl.querySelector('#sigCanvas');
      const pad = UI.SignaturePad(canvas);
      contentEl.querySelector('#clearSig').addEventListener('click', ()=>pad.clear());
      contentEl.querySelector('#saveSig').addEventListener('click', ()=>{
        if(pad.isEmpty()){ UI.toast(I18N.t('err_required'), 'error'); return; }
        const dataUrl = pad.toDataURL();
        DB.update('contracts', contract.id, { signature: dataUrl });
        DB.logActivity('تم توقيع العقد ' + contract.id, 'Contract signed ' + contract.id, 'contract');
        UI.toast(I18N.t('contract_saved_sign'), 'success');
        render();
      });
    }
  }

  document.addEventListener('lang-changed', render);
  render();
}
</script>
</body>
</html>
